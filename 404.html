<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IRONLOG</title>
  <script>
    // GitHub Pages SPA redirect
    // Converts /u/username into /?route=/u/username so index.html can handle it
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    // Redirect to root with path preserved as query param
    window.location.replace(
      window.location.origin + '/?route=' + encodeURIComponent(path + search + hash)
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
