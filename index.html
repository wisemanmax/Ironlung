    w.exercises.forEach(ex=>{
      const name=s.exercises.find(e=>e.id===ex.exerciseId)?.name||ex.exerciseId;
      ex.sets.forEach(st=>{const e1rm=calc1RM(st.weight,st.reps);const prev=prs[ex.exerciseId];
        if(st.weight>0&&(!prev||e1rm>prev.e1rm))detected.push({name,weight:st.weight,reps:st.reps,e1rm});});});
    setNewPRs(detected);
    if(detected.length>0)Haptic.success();
    if(editingId){d({type:"EDIT_W",w});setEditingId(null);SuccessToastCtrl.show("Workout updated");}
    else{d({type:"ADD_W",w});ActiveWorkoutStore.clear();Haptic.medium();SuccessToastCtrl.show("Workout logged");
      if(s.profile?.email){const exNames=w.exercises.map(e=>s.exercises.find(x=>x.id===e.exerciseId)?.name||e.exerciseId);
        SocialAPI.logEvent(s.profile.email,"WorkoutLogged",{exercises:exNames,sets:w.exercises.reduce((a,e)=>a+e.sets.length,0)},
          (LS.get("ft-privacy")||{}).workouts?"friends":"private").catch(()=>{});
        // Log PRs to feed for reactions
        detected.forEach(pr=>{
          SocialAPI.logEvent(s.profile.email,"PRHit",{exercise:pr.name,weight:pr.weight,reps:pr.reps,e1rm:pr.e1rm},
            (LS.get("ft-privacy")||{}).workouts?"friends":"private").catch(()=>{});
        });
      }
    }
    setStartTime(null);
    if(detected.length===0)setShow(false);
  };

  const prevBest=(eid)=>{for(const w of s.workouts){const ex=w.exercises.find(e=>e.exerciseId===eid);
    if(ex){const b=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});if(b.weight>0)return`${b.weight}×${b.reps}`;}};return null;};

  // PR celebration
  if(newPRs.length>0){
    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",gap:20}}>
        <div style={{fontSize:60}}>🏆</div>
        <div style={{fontSize:22,fontWeight:800,color:V.warn,textAlign:"center"}}>NEW PR{newPRs.length>1?"s":""}!</div>
        {newPRs.map((pr,i)=>(
          <Card key={i} glow style={{width:"100%",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:V.text}}>{pr.name}</div>
            <div style={{fontSize:24,fontWeight:800,color:V.accent,fontFamily:V.mono,marginTop:4}}>{pr.weight} × {pr.reps}</div>
            <div style={{fontSize:12,color:V.text3,marginTop:2}}>Est. 1RM: {pr.e1rm} {wUnit(s.units)}</div>
          </Card>
        ))}
        <div style={{display:"flex",gap:8,width:"100%"}}>
          <Btn full onClick={()=>{setNewPRs([]);setShow(false);}}>Done</Btn>
          <Btn v="secondary" full onClick={async()=>{
            const stats=newPRs.map(pr=>({value:`${pr.weight}×${pr.reps}`,label:pr.name,color:"#22c55e"}));
            stats.push({value:`${newPRs.length} PR${newPRs.length>1?"s":""}`,label:"NEW RECORDS",color:"#f59e0b"});
            const c=await ShareCard.generate("🏆 New PR!",stats,`${fmtFull(today())} · IRONLOG`);
            ShareCard.share(c,`ironlog-pr-${today()}.png`);
          }}>Share</Btn>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:8}}>
        <Btn full onClick={startNew}>{Icons.plus({size:16,color:V.bg})} New Workout</Btn>
        {s.workouts.length>0&&(()=>{
          const last=s.workouts[0];const exNames=last.exercises.slice(0,3).map(e=>s.exercises.find(x=>x.id===e.exerciseId)?.name||e.exerciseId);
          return <Btn v="secondary" onClick={repeatLast} s={{flexShrink:0,fontSize:10}}>
            🔄 Repeat: {exNames.join(", ")}{last.exercises.length>3?` +${last.exercises.length-3}`:""}</Btn>;
        })()}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn v="secondary" full onClick={()=>setShowTemplates(true)}>{Icons.copy({size:14,color:V.text2})} Templates</Btn>
        <Btn v="secondary" full onClick={()=>setShowPlates(true)}>{Icons.hash({size:14,color:V.text2})} Plates</Btn>
      </div>

      {showTemplates&&(
        <Sheet title="Workout Templates" onClose={()=>setShowTemplates(false)}>
          {TEMPLATES.map((t,i)=>(
            <Card key={i} onClick={()=>loadTemplate(t)} style={{marginBottom:8,padding:14}}>
              <div style={{fontSize:14,fontWeight:700,color:V.text}}>{t.name}</div>
              <div style={{fontSize:11,color:V.text3,marginTop:2}}>{t.desc}</div>
              <div style={{fontSize:10,color:V.accent,marginTop:4,fontFamily:V.mono}}>{t.exs.length} exercises</div>
            </Card>
          ))}
        </Sheet>
      )}
      {showPlates&&(<Sheet title="Plate Calculator" onClose={()=>setShowPlates(false)}><PlateCalc/></Sheet>)}

      {show&&(
        <Sheet title="Log Workout" onClose={()=>{setShow(false);setStartTime(null);}}
          footer={<Btn full onClick={save} disabled={form.exercises.length===0}>{Icons.check({size:16,color:V.bg})} Save Workout</Btn>}>
          {/* Live timer + motivation */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,
            padding:"10px 14px",background:`${V.accent}06`,borderRadius:12,border:`1px solid ${V.accent}12`}}>
            <div style={{fontSize:11,color:V.text3,fontStyle:"italic"}}>{motiv}</div>
            {startTime&&(
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:6,height:6,borderRadius:3,background:V.accent,animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:14,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{fmtElapsed(elapsed)}</span>
              </div>
            )}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
            <Field label="Duration" type="number" value={form.dur} onChange={v=>setForm(f=>({...f,dur:v}))} unit="min" placeholder="60"/>
          </div>

          <RestTimer/>

          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,fontWeight:600}}>Add Exercise</div>
            <ExercisePicker exercises={s.exercises} value={selEx} onChange={id=>{setSelEx(id);}} catFilter={catFilter} setCatFilter={setCatFilter} todayType={s.schedule?.overrides?.[today()]||s.schedule?.weekly?.[new Date().getDay()]||null}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {selEx&&(()=>{const yt=s.exercises.find(e=>e.id===selEx)?.yt;return yt?<YTBtn yt={yt} size={38}/>:null;})()}
              {selEx&&<Btn full onClick={addEx}>{Icons.plus({size:14,color:V.bg})} Add {s.exercises.find(e=>e.id===selEx)?.name||""}</Btn>}
            </div>
            {/* #5: Last workout preview for selected exercise */}
            {selEx&&(()=>{
              const sug=getOverloadSuggestion(selEx,s.workouts,s.units);
              if(!sug)return null;
              return(
                <div style={{marginTop:8,padding:"10px 12px",borderRadius:10,background:`${V.accent}05`,border:`1px solid ${V.accent}12`}}>
                  <div style={{fontSize:10,fontWeight:700,color:V.text3,marginBottom:4}}>LAST SESSION · {fmtShort(sug.date)}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {sug.allSets.split("  ").map((set,i)=>(
                      <span key={i} style={{padding:"3px 8px",borderRadius:6,background:"rgba(255,255,255,0.04)",
                        fontSize:12,fontWeight:600,color:V.text,fontFamily:V.mono}}>{set}</span>
                    ))}
                  </div>
                  <div style={{marginTop:6,fontSize:11,fontWeight:700,color:sug.type==="deload"?V.warn:V.accent}}>
                    → Today: {sug.suggest} <span style={{fontWeight:400,color:V.text3}}>({sug.reason})</span>
                  </div>
                </div>
              );
            })()}
          </div>

          {form.exercises.map((ex,ei)=>{
            const info=s.exercises.find(e=>e.id===ex.exerciseId);
            const pb=prevBest(ex.exerciseId);
            const ssLabel=getSupersetLabel(ex,ei);
            return(
              <div key={ei} style={{marginBottom:14,padding:14,background:"rgba(255,255,255,0.02)",borderRadius:14,
                border:`1px solid ${ex.supersetGroup?V.purple+"30":V.cardBorder}`,
                ...(ex.supersetGroup?{borderLeft:`3px solid ${V.purple}`}:{})}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
                    {ssLabel&&<span style={{fontSize:10,fontWeight:800,color:V.purple,background:`${V.purple}15`,padding:"2px 6px",borderRadius:4}}>{ssLabel}</span>}
                    <span style={{fontSize:14,color:V.text,fontWeight:700}}>{info?.name}</span>
                    <YTBtn yt={info?.yt} size={24}/>
                    {pb&&<span style={{fontSize:10,color:V.text3}}>PR:{pb}</span>}
                  </div>
                  <div style={{display:"flex",gap:2}}>
                    <button onClick={()=>toggleSuperset(ei)} title="Superset" style={{background:ex.supersetGroup?`${V.purple}15`:"none",border:"none",padding:4,cursor:"pointer",borderRadius:4}}>
                      <span style={{fontSize:11,color:ex.supersetGroup?V.purple:V.text3}}>SS</span></button>
                    <button onClick={()=>rmEx(ei)} aria-label="Remove exercise" style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:14,color:V.text3})}</button>
                  </div>
                </div>
                {(()=>{const sug=getOverloadSuggestion(ex.exerciseId,s.workouts,s.units);return sug?(
                  <div style={{marginBottom:10,padding:"8px 10px",
                    background:sug.type==="deload"?`${V.warn}08`:sug.type==="increase"?`${V.accent}08`:`${V.accent2}08`,
                    borderRadius:8,border:`1px solid ${sug.type==="deload"?V.warn:sug.type==="increase"?V.accent:V.accent2}15`}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {Icons.zap({size:12,color:sug.type==="deload"?V.warn:V.accent})}
                      <span style={{fontSize:11,color:sug.type==="deload"?V.warn:V.accent,fontWeight:700}}>
                        {sug.type==="increase"?"↑ Increase":sug.type==="deload"?"↓ Deload":sug.type==="repeat"?"→ Repeat":"→ +1 Rep"}
                      </span>
                      <span style={{flex:1}}/>
                      <span style={{fontSize:10,color:V.text3,fontFamily:V.mono}}>E1RM: {sug.e1rm}</span>
                    </div>
                    <div style={{fontSize:11,color:V.text2,marginTop:4}}>
                      Last: <span style={{fontFamily:V.mono}}>{sug.allSets}</span>
                    </div>
                    <div style={{fontSize:12,color:V.text,fontWeight:700,marginTop:2,fontFamily:V.mono}}>
                      → Try {sug.suggest}
                    </div>
                    <div style={{fontSize:9,color:V.text3,marginTop:2}}>{sug.reason}</div>
                  </div>
                ):null;})()}
                <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 46px",gap:4,marginBottom:6}}>
                  <span style={{fontSize:9,color:V.text3,textAlign:"center"}}>#</span>
                  <span style={{fontSize:9,color:V.text3}}>{wUnit(s.units).toUpperCase()}</span><span style={{fontSize:9,color:V.text3}}>REPS</span>
                  <span style={{fontSize:9,color:V.text3}}>RPE</span><span style={{fontSize:8,color:V.text3,textAlign:"center"}}>FLAG</span>
                </div>
                {ex.sets.map((st,si)=>(
                  <div key={si} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 46px",gap:4,marginBottom:4,alignItems:"center",
                    ...(st.warmup?{opacity:0.5}:{})}}>
                    <span style={{fontSize:12,color:st.warmup?V.warn:V.text3,textAlign:"center",fontFamily:V.mono}}>
                      {st.warmup?"W":si+1-ex.sets.filter((s2,i2)=>i2<si&&s2.warmup).length}
                    </span>
                    {["weight","reps","rpe"].map(k=>(
                      <input key={k} type="number" inputMode="decimal" value={st[k]} onChange={e=>updSet(ei,si,k,e.target.value)}
                        placeholder="0" style={{padding:"10px 8px",background:st.warmup?"rgba(255,159,67,0.06)":"rgba(255,255,255,0.04)",
                          border:`1px solid ${st.warmup?"rgba(255,159,67,0.15)":"rgba(255,255,255,0.05)"}`,
                          borderRadius:10,color:V.text,fontSize:15,fontFamily:V.mono,outline:"none",width:"100%",
                          boxSizing:"border-box",textAlign:"center",minHeight:40,WebkitAppearance:"none"}}/>
                    ))}
                    <div style={{display:"flex",gap:1,alignItems:"center",justifyContent:"center"}}>
                      {!st.warmup&&<button onClick={()=>toggleSetFlag(ei,si,"drop")} style={{background:st.drop?`${V.accent2}20`:"none",
                        border:"none",padding:2,cursor:"pointer",borderRadius:3,fontSize:8,color:st.drop?V.accent2:V.text3,fontWeight:700}}>D</button>}
                      {!st.warmup&&<button onClick={()=>toggleSetFlag(ei,si,"fail")} style={{background:st.fail?`${V.danger}20`:"none",
                        border:"none",padding:2,cursor:"pointer",borderRadius:3,fontSize:8,color:st.fail?V.danger:V.text3,fontWeight:700}}>F</button>}
                      <button onClick={()=>rmSet(ei,si)} disabled={ex.sets.length<=1}
                        style={{background:"none",border:"none",padding:2,cursor:ex.sets.length<=1?"default":"pointer",opacity:ex.sets.length<=1?.2:1}}>
                        {Icons.x({size:11,color:V.text3})}</button>
                    </div>
                  </div>
                ))}
                <div style={{display:"flex",gap:6,marginTop:8}}>
                  <Btn v="small" onClick={()=>addSet(ei)} s={{flex:1}}>{Icons.plus({size:13,color:V.accent})} Add Set</Btn>
                  {ex.sets.some(st=>parseFloat(st.weight)>0)&&!ex.sets.some(st=>st.warmup)&&(
                    <Btn v="small" onClick={()=>addWarmups(ei)} s={{flex:0,flexShrink:0,fontSize:10,padding:"6px 10px",background:`${V.warn}10`,color:V.warn,border:`1px solid ${V.warn}20`}}>🔥 Warm-up</Btn>
                  )}
                </div>
                {/* #4: Notes per exercise */}
                <input value={ex.note||""} onChange={e=>updExNote(ei,e.target.value)} placeholder="Notes (form cues, tempo...)"
                  style={{width:"100%",marginTop:8,padding:"8px 10px",background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`,
                    borderRadius:8,color:V.text3,fontSize:11,outline:"none",fontFamily:V.font,boxSizing:"border-box"}}/>
              </div>
            );
          })}

          {/* Rating */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,fontWeight:600}}>Workout Rating</div>
            <div style={{display:"flex",gap:6}}>
              {[1,2,3,4,5].map(r=>(
                <button key={r} onClick={()=>setForm(f=>({...f,rating:r}))}
                  style={{fontSize:22,background:"none",border:"none",cursor:"pointer",padding:4,
                    color:r<=form.rating?V.warn:V.text3,WebkitTapHighlightColor:"transparent"}}>★</button>
              ))}
            </div>
          </div>

          <Field label="Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} placeholder="How did it feel?"/>
          {valWarnings&&<ValidationWarning warnings={valWarnings} onConfirm={()=>{setValWarnings(null);save();}} onCancel={()=>setValWarnings(null)}/>}
        </Sheet>
      )}

      {/* Delete confirmation */}
      {confirmDel&&<ConfirmDialog msg="Delete workout?" detail={`${fmtFull(confirmDel.date)} — this cannot be undone.`}
        onConfirm={()=>{Undo.set("Workout deleted",confirmDel,"workout");d({type:"DEL_W",id:confirmDel.id});setConfirmDel(null);SuccessToastCtrl.show("Workout deleted");}}
        onCancel={()=>setConfirmDel(null)}/>}

      {/* #11: Crash recovery banner — prompt user to resume a workout saved before a crash/close */}
      {crashWorkout&&!show&&(
        <Card style={{background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.4)",padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:V.warn,marginBottom:6}}>⚡ Unsaved workout found</div>
          <div style={{fontSize:11,color:V.text3,marginBottom:10}}>
            {crashWorkout.exercises?.length||0} exercise{(crashWorkout.exercises?.length||0)!==1?"s":""} — saved {Math.round((Date.now()-new Date(crashWorkout.savedAt).getTime())/60000)} min ago
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn full onClick={()=>{setForm({date:crashWorkout.date||today(),dur:crashWorkout.dur||"",exercises:crashWorkout.exercises||[],notes:crashWorkout.notes||"",rating:crashWorkout.rating||3});setStartTime(crashWorkout.startTime||Date.now());setElapsed(0);setShow(true);setCrashWorkout(null);}}>Resume</Btn>
            <Btn v="secondary" onClick={()=>{ActiveWorkoutStore.clear();setCrashWorkout(null);}}>Discard</Btn>
          </div>
        </Card>
      )}

      {/* History */}
      {s.workouts.length===0?(
        <div style={{textAlign:"center",padding:40,color:V.text3,fontSize:13}}>No workouts yet</div>
      ):s.workouts.slice(0,showAll?999:15).map(w=>{
        const vol=w.exercises.reduce((s2,e)=>s2+e.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0);
        const expanded=expandedId===w.id;
        return(
          <Card key={w.id} onClick={()=>setExpandedId(expanded?null:w.id)} style={{padding:14,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,color:V.text2}}>{fmtFull(w.date)}</span>
                {w.rating&&<span style={{fontSize:8,color:V.warn}}>{Array.from({length:w.rating}).map(()=>"★").join("")}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,color:V.text3}}>{w.dur}min</span>
                <button onClick={async(e)=>{e.stopPropagation();
                  const exNames=w.exercises.map(ex=>s.exercises.find(e2=>e2.id===ex.exerciseId)?.name||ex.exerciseId);
                  const stats=[{value:w.exercises.length,label:"EXERCISES",color:"#22c55e"},
                    {value:w.exercises.reduce((a,e2)=>a+e2.sets.length,0),label:"SETS",color:"#06b6d4"},
                    {value:vol>1000?`${(vol/1000).toFixed(1)}k`:vol,label:"VOLUME",color:"#a78bfa"}];
                  const c=await ShareCard.generate("💪 Workout Complete",stats,`${fmtFull(w.date)} · ${exNames.slice(0,3).join(", ")}${exNames.length>3?" +more":""}`);
                  ShareCard.share(c,`ironlog-workout-${w.date}.png`);
                }} aria-label="Share workout" style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>
                  <span style={{fontSize:10,color:V.text3}}>📤</span></button>
                <button onClick={e=>{e.stopPropagation();setEditingId(w.id);setForm({date:w.date,dur:w.dur?.toString()||"",exercises:w.exercises,notes:w.notes||"",rating:w.rating||3});setShow(true);}}
                  aria-label="Edit workout" style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.edit?.({size:12,color:V.text3})||<span style={{fontSize:10,color:V.text3}}>✏️</span>}</button>
                <button onClick={e=>{e.stopPropagation();setConfirmDel(w);}} aria-label="Delete workout"
                  style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:12,color:V.text3})}</button>
              </div>
            </div>
            {w.exercises.map((ex,i)=>{
              const exInfo=s.exercises.find(e=>e.id===ex.exerciseId);
              const top=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});
              return(
                <div key={i}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",
                    borderBottom:i<w.exercises.length-1?`1px solid rgba(255,255,255,0.03)`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:12,color:V.text}}>{exInfo?.name||ex.exerciseId}</span>
                      <YTBtn yt={exInfo?.yt} size={18}/>
                    </div>
                    <span style={{fontSize:11,color:V.accent,fontFamily:V.mono}}>{top.weight}×{top.reps} · {ex.sets.length}s</span>
                  </div>
                  {/* #7 Expanded detail: all sets */}
                  {expanded&&(
                    <div style={{padding:"4px 0 8px 12px"}}>
                      {ex.sets.map((st,si)=>(
                        <div key={si} style={{display:"flex",gap:8,fontSize:10,color:V.text3,padding:"2px 0",alignItems:"center"}}>
                          <span>Set {si+1}:</span>
                          <span style={{color:V.accent,fontFamily:V.mono}}>{st.weight}×{st.reps}</span>
                          {st.rpe>0&&<span>RPE {st.rpe}</span>}
                          {st.drop&&<span style={{fontSize:8,padding:"1px 4px",borderRadius:3,background:`${V.accent2}15`,color:V.accent2,fontWeight:700}}>DROP</span>}
                          {st.fail&&<span style={{fontSize:8,padding:"1px 4px",borderRadius:3,background:`${V.danger}15`,color:V.danger,fontWeight:700}}>FAIL</span>}
                        </div>
                      ))}
                      {ex.note&&<div style={{fontSize:9,color:V.text3,fontStyle:"italic",marginTop:4}}>📝 {ex.note}</div>}
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{marginTop:4,fontSize:11,color:V.accent2,fontFamily:V.mono,textAlign:"right"}}>{vol.toLocaleString()} {wUnit(s.units)}</div>
            {expanded&&w.notes&&<div style={{fontSize:10,color:V.text3,fontStyle:"italic",marginTop:4}}>{w.notes}</div>}
            {expanded&&(
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <button onClick={e=>{e.stopPropagation();setShareWorkout(shareWorkout===w.id?null:w.id);}}
                  style={{padding:"4px 10px",borderRadius:6,background:`${V.accent}10`,border:`1px solid ${V.accent}20`,
                    cursor:"pointer",fontSize:9,fontWeight:700,color:V.accent,fontFamily:V.font}}>
                  {shareWorkout===w.id?"Hide":"Share"} Card
                </button>
              </div>
            )}
            {shareWorkout===w.id&&<div style={{marginTop:8}}><WorkoutCard workout={w} s={s}/></div>}
          </Card>
        );
      })}
      {s.workouts.length>15&&!showAll&&(
        <button onClick={()=>setShowAll(true)} style={{width:"100%",padding:12,background:"rgba(255,255,255,0.02)",
          border:`1px solid ${V.cardBorder}`,borderRadius:10,cursor:"pointer",fontSize:11,color:V.accent,fontWeight:600,fontFamily:V.font}}>
          Show all {s.workouts.length} workouts
        </button>
      )}
    </div>
  );
}


// ═══════════════════════════════════════
//  NUTRITION TAB
// ═══════════════════════════════════════
function NutritionTab({s,d}){
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),cal:"",protein:"",carbs:"",fat:"",fiber:"",water:"",sleep:"",
    meals:[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
  const [activeMeal,setActiveMeal]=useState(null);
  const [scanMeal,setScanMeal]=useState(null);
  const [valWarnings,setValWarnings]=useState(null);
  const [favName,setFavName]=useState("");
  const [showFavInput,setShowFavInput]=useState(false);
  const [editingNId,setEditingNId]=useState(null);
  const td=today();

  const start=()=>{
    const ex=s.nutrition.find(n=>n.date===today());
    if(ex){setForm({...ex,cal:ex.cal.toString(),protein:ex.protein.toString(),carbs:ex.carbs.toString(),fat:ex.fat.toString(),
      fiber:(ex.fiber||"").toString(),water:(ex.water||"").toString(),sleep:(ex.sleep||"").toString(),
      meals:ex.meals||[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
      setEditingNId(ex.id);
    }else{setForm({date:today(),cal:"",protein:"",carbs:"",fat:"",fiber:"",water:"",sleep:"",
      meals:[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
      setEditingNId(null);
    }
    setShow(true);
  };

  // #12 Copy from yesterday
  const copyYesterday=()=>{
    const yd=ago(1);
    const prev=s.nutrition.find(n=>n.date===yd);
    if(prev){
      setForm({date:today(),cal:prev.cal.toString(),protein:prev.protein.toString(),carbs:prev.carbs.toString(),
        fat:prev.fat.toString(),fiber:(prev.fiber||"").toString(),water:(prev.water||"").toString(),sleep:"",
        meals:prev.meals||[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
      setShow(true);
    }
  };

  const addFoodToMeal=(mi,food)=>{setForm(f=>{const m=[...f.meals];m[mi]={...m[mi],items:[...(m[mi].items||[]),food]};return{...f,meals:m};});};
  const rmFoodFromMeal=(mi,fi)=>{setForm(f=>{const m=[...f.meals];m[mi]={...m[mi],items:m[mi].items.filter((_,i)=>i!==fi)};return{...f,meals:m};});};

  const autoCalc=()=>{
    let cal=0,protein=0,carbs=0,fat=0;
    form.meals.forEach(m=>(m.items||[]).forEach(i=>{cal+=i.cal;protein+=i.protein;carbs+=i.carbs||0;fat+=i.fat||0;}));
    setForm(f=>({...f,cal:cal.toString(),protein:protein.toString(),carbs:carbs.toString(),fat:fat.toString()}));
  };

  const save=()=>{
    const n={id:editingNId||uid(),date:form.date,cal:parseInt(form.cal)||0,protein:parseInt(form.protein)||0,
      carbs:parseInt(form.carbs)||0,fat:parseInt(form.fat)||0,fiber:parseInt(form.fiber)||0,
      water:parseInt(form.water)||0,sleep:parseFloat(form.sleep)||0,meals:form.meals};
    const warnings=validateNutrition(n);
    if(warnings.length>0&&!valWarnings){setValWarnings(warnings);return;}
    setValWarnings(null);
    if(editingNId){d({type:"EDIT_N",n});SuccessToastCtrl.show("Nutrition updated");}
    else{d({type:"ADD_N",n});SuccessToastCtrl.show("Nutrition logged");}
    Haptic.medium();setEditingNId(null);setShow(false);
  };

  const editEntry=(n)=>{
    setForm({...n,cal:n.cal?.toString()||"",protein:n.protein?.toString()||"",carbs:n.carbs?.toString()||"",
      fat:n.fat?.toString()||"",fiber:(n.fiber||"").toString(),water:(n.water||"").toString(),sleep:(n.sleep||"").toString(),
      meals:n.meals||[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
    setEditingNId(n.id);setShow(true);
  };

  const week=s.nutrition.filter(n=>n.date>=ago(7));
  const avgCal=week.length?Math.round(week.reduce((s,n)=>s+n.cal,0)/week.length):0;
  const avgP=week.length?Math.round(week.reduce((s,n)=>s+n.protein,0)/week.length):0;
  const totalItems=form.meals.reduce((s,m)=>(m.items||[]).length+s,0);

  const macroChart=useMemo(()=>
    s.nutrition.filter(n=>n.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date))
      .map(n=>({date:fmtShort(n.date),P:n.protein,C:n.carbs,F:n.fat}))
  ,[s.nutrition,s.range]);

  const todayN=s.nutrition.find(n=>n.date===today());
  const tCal=todayN?.cal||0,tProt=todayN?.protein||0,tCarbs=todayN?.carbs||0,tFat=todayN?.fat||0;
  const calGoal=s.goals?.cal||2400,protGoal=s.goals?.protein||180;
  const calPct=Math.min(100,Math.round(tCal/calGoal*100)),protPct=Math.min(100,Math.round(tProt/protGoal*100));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Daily summary bar — enhanced */}
      <Card style={{padding:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:11,fontWeight:700,color:V.text}}>Today</span>
          {/* #3: Deficit/surplus indicator */}
          {(()=>{
            const tdee=parseInt(s.goals?.tdee)||0;
            if(!tdee||!tCal)return <span style={{fontSize:10,color:V.text3}}>{tCal} / {calGoal} cal</span>;
            const diff=tCal-tdee;
            return <span style={{fontSize:10,color:diff>0?V.warn:V.accent,fontWeight:600}}>
              {tCal} cal · {diff>0?"+":""}{diff} {diff>0?"surplus":"deficit"}
            </span>;
          })()}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <div style={{flex:1}}>
            <div style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.06)"}}>
              <div style={{height:"100%",borderRadius:2,background:calPct>=100?V.accent:V.warn,width:`${calPct}%`,transition:"width .3s"}}/>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {/* #2: Macro pie chart */}
          {tCal>0&&(()=>{
            const total=tProt+tCarbs+tFat;if(total===0)return null;
            const pPct=tProt/total*100,cPct=tCarbs/total*100;
            const r2=16,cx=20,cy=20,circ=2*Math.PI*r2;
            return(
              <svg width={40} height={40} style={{flexShrink:0}}>
                <circle cx={cx} cy={cy} r={r2} fill="none" stroke={V.accent} strokeWidth={5}
                  strokeDasharray={`${pPct/100*circ} ${circ}`} transform={`rotate(-90 ${cx} ${cy})`}/>
                <circle cx={cx} cy={cy} r={r2} fill="none" stroke={V.accent2} strokeWidth={5}
                  strokeDasharray={`${cPct/100*circ} ${circ}`} strokeDashoffset={`-${pPct/100*circ}`} transform={`rotate(-90 ${cx} ${cy})`}/>
                <circle cx={cx} cy={cy} r={r2} fill="none" stroke={V.warn} strokeWidth={5}
                  strokeDasharray={`${(100-pPct-cPct)/100*circ} ${circ}`} strokeDashoffset={`-${(pPct+cPct)/100*circ}`} transform={`rotate(-90 ${cx} ${cy})`}/>
              </svg>
            );
          })()}
          <div style={{display:"flex",gap:12,fontSize:10,fontFamily:V.mono,flex:1}}>
            <span style={{color:tProt>=protGoal?V.accent:V.text3}}>{tProt}g P</span>
            <span style={{color:V.text3}}>{tCarbs}g C</span>
            <span style={{color:V.text3}}>{tFat}g F</span>
            <span style={{marginLeft:"auto",color:protPct>=100?V.accent:V.warn}}>{protPct}%</span>
          </div>
        </div>
      </Card>

      {/* #1: Water tracking — persistent tap counter */}
      <Card style={{padding:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {Icons.droplet({size:16,color:V.accent2})}
            <span style={{fontSize:12,fontWeight:700,color:V.text}}>Water</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>{
              const cur=parseInt(LS.get("ft-water-"+td))||0;
              if(cur>0){LS.set("ft-water-"+td,cur-1);d({type:"TAB",tab:"log_nutrition"});}
            }} style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:V.text3}}>−</button>
            <div style={{minWidth:50,textAlign:"center"}}>
              <span style={{fontSize:18,fontWeight:800,color:V.accent2,fontFamily:V.mono}}>{parseInt(LS.get("ft-water-"+td))||0}</span>
              <span style={{fontSize:10,color:V.text3}}>/8</span>
            </div>
            <button onClick={()=>{
              Haptic.light();
              const cur=parseInt(LS.get("ft-water-"+td))||0;
              LS.set("ft-water-"+td,cur+1);d({type:"TAB",tab:"log_nutrition"});
              if(cur+1>=8)SuccessToastCtrl.show("💧 Hydration goal hit!");
            }} style={{width:28,height:28,borderRadius:8,background:`${V.accent2}15`,border:`1px solid ${V.accent2}25`,
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:V.accent2,fontWeight:700}}>+</button>
          </div>
          <Progress val={parseInt(LS.get("ft-water-"+td))||0} max={8} color={V.accent2} h={4}/>
        </div>
      </Card>

      <div style={{display:"flex",gap:8}}>
        <Btn full onClick={start}>{Icons.plus({size:16,color:V.bg})} Log Nutrition</Btn>
        {s.nutrition.find(n=>n.date===ago(1))&&(
          <Btn v="secondary" onClick={copyYesterday} s={{flexShrink:0,fontSize:11}}>{Icons.copy({size:14,color:V.text2})} Copy Yesterday</Btn>
        )}
      </div>

      {/* Meal Favorites */}
      {(()=>{
        const favs=LS.get("ft-meal-favs")||[];
        if(favs.length===0)return null;
        return(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:V.text3,marginBottom:6}}>SAVED MEALS</div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
              {favs.map((fav,i)=>(
                <button key={i} onClick={()=>{
                  setForm(f=>({...f,meals:fav.meals,cal:fav.cal?.toString()||"",protein:fav.protein?.toString()||"",
                    carbs:fav.carbs?.toString()||"",fat:fav.fat?.toString()||""}));
                  setShow(true);SuccessToastCtrl.show(`Loaded: ${fav.name}`);
                }} style={{padding:"8px 12px",borderRadius:8,background:`${V.accent}06`,border:`1px solid ${V.accent}15`,
                  cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,textAlign:"left"}}>
                  <div style={{fontSize:11,fontWeight:600,color:V.text}}>{fav.name}</div>
                  <div style={{fontSize:9,color:V.text3,fontFamily:V.mono}}>{fav.cal}cal · {fav.protein}P</div>
                </button>
              ))}
            </div>
          </div>
        );
      })()}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat icon={Icons.flame} label="Avg Calories" value={avgCal} unit="kcal" color={V.warn}/>
        <Stat icon={Icons.target} label="Avg Protein" value={avgP} unit="g" color={V.accent}/>
      </div>

      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Macros</span>
        <ResponsiveContainer width="100%" height={150}>
          <BarChart data={macroChart} barSize={8}>
            <CartesianGrid {...chartCfg.grid} vertical={false}/>
            <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
            <YAxis {...chartCfg.axis} width={28}/>
            <Tooltip {...chartCfg.tip}/>
            <Bar dataKey="P" stackId="a" fill={V.accent}/>
            <Bar dataKey="C" stackId="a" fill={V.accent2}/>
            <Bar dataKey="F" stackId="a" fill={V.warn} radius={[3,3,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>

      {show&&(
        <Sheet title={editingNId?"Edit Nutrition":"Log Nutrition"} onClose={()=>{setShow(false);setEditingNId(null);}}
          footer={<Btn full onClick={save}>{Icons.check({size:16,color:V.bg})} {editingNId?"Update":"Save"} Nutrition</Btn>}>
          <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>

          {/* Meals with food database search */}
          {form.meals.map((meal,mi)=>{
            const mCal=(meal.items||[]).reduce((s,i)=>s+i.cal,0);
            const mP=(meal.items||[]).reduce((s,i)=>s+i.protein,0);
            return(
              <div key={mi} style={{marginBottom:12,padding:12,background:"rgba(255,255,255,0.02)",borderRadius:14,border:`1px solid ${V.cardBorder}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:V.text}}>{meal.name}</span>
                    <input type="time" value={meal.time||""} onChange={e=>setForm(f=>{const ms=[...f.meals];ms[mi]={...ms[mi],time:e.target.value};return{...f,meals:ms};})}
                      style={{padding:"2px 6px",borderRadius:6,background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
                        color:V.text3,fontSize:9,fontFamily:V.mono,outline:"none",width:70}}/>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {mCal>0&&<span style={{fontSize:10,color:V.warn,fontFamily:V.mono}}>{mCal}cal · {mP}P</span>}
                    <button onClick={()=>setScanMeal(mi)}
                      style={{background:`${V.accent2}15`,border:"none",borderRadius:8,padding:"4px 8px",cursor:"pointer",
                        display:"flex",alignItems:"center",gap:3,WebkitTapHighlightColor:"transparent"}}>
                      {Icons.scan({size:12,color:V.accent2})}
                    </button>
                    <button onClick={()=>setActiveMeal(activeMeal===mi?null:mi)}
                      style={{background:`${V.accent}15`,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",
                        fontSize:11,color:V.accent,fontWeight:600,WebkitTapHighlightColor:"transparent"}}>
                      {activeMeal===mi?"Close":"+ Food"}
                    </button>
                  </div>
                </div>
                {(meal.items||[]).map((item,fi)=>(
                  <div key={fi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                    <span style={{fontSize:12,color:V.text2,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      <span style={{fontSize:10,color:V.text3,fontFamily:V.mono}}>{item.cal} · {item.protein}P</span>
                      <button onClick={()=>rmFoodFromMeal(mi,fi)} aria-label="Remove food item" style={{background:"none",border:"none",padding:2,cursor:"pointer"}}>{Icons.x({size:12,color:V.text3})}</button>
                    </div>
                  </div>
                ))}
                {activeMeal===mi&&<div style={{marginTop:8}}><FoodSearch onAdd={(food)=>addFoodToMeal(mi,food)}/></div>}
              </div>
            );
          })}

          {totalItems>0&&<Btn v="small" full onClick={autoCalc} s={{marginBottom:12}}>Auto-calculate totals from food items</Btn>}
          {totalItems>0&&!showFavInput&&(
            <button onClick={()=>setShowFavInput(true)} style={{width:"100%",padding:"8px",borderRadius:8,background:"rgba(255,255,255,0.02)",
              border:`1px dashed ${V.cardBorder}`,cursor:"pointer",fontSize:11,color:V.accent,
              fontFamily:V.font,marginBottom:12}}>⭐ Save as Meal Favorite</button>
          )}
          {showFavInput&&(
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              <input value={favName} onChange={e=>setFavName(e.target.value)} placeholder="Name (e.g. My usual day)"
                autoFocus style={{flex:1,padding:"8px 10px",background:V.card,border:`1px solid ${V.cardBorder}`,
                  borderRadius:8,color:V.text,fontSize:12,outline:"none",fontFamily:V.font}}/>
              <Btn onClick={()=>{
                if(!favName.trim()){setShowFavInput(false);return;}
                autoCalc();
                setTimeout(()=>{
                  const favs=LS.get("ft-meal-favs")||[];
                  const cal=form.meals.reduce((s2,m)=>(m.items||[]).reduce((a,i)=>a+i.cal,0)+s2,0);
                  const protein=form.meals.reduce((s2,m)=>(m.items||[]).reduce((a,i)=>a+i.protein,0)+s2,0);
                  const carbs=form.meals.reduce((s2,m)=>(m.items||[]).reduce((a,i)=>a+(i.carbs||0),0)+s2,0);
                  const fat=form.meals.reduce((s2,m)=>(m.items||[]).reduce((a,i)=>a+(i.fat||0),0)+s2,0);
                  const updated=[{name:favName.trim(),meals:form.meals,cal,protein,carbs,fat},...favs.filter(f=>f.name!==favName.trim())].slice(0,10);
                  LS.set("ft-meal-favs",updated);
                  SuccessToastCtrl.show(`Saved: ${favName.trim()}`);
                  setFavName("");setShowFavInput(false);
                },100);
              }} s={{flexShrink:0}}>Save</Btn>
              <button onClick={()=>{setFavName("");setShowFavInput(false);}} style={{padding:"8px",borderRadius:8,
                background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,cursor:"pointer",fontSize:11,color:V.text3}}>✕</button>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Calories" type="number" value={form.cal} onChange={v=>setForm(f=>({...f,cal:v}))} unit="kcal"/>
            <Field label="Protein" type="number" value={form.protein} onChange={v=>setForm(f=>({...f,protein:v}))} unit="g"/>
            <Field label="Carbs" type="number" value={form.carbs} onChange={v=>setForm(f=>({...f,carbs:v}))} unit="g"/>
            <Field label="Fat" type="number" value={form.fat} onChange={v=>setForm(f=>({...f,fat:v}))} unit="g"/>
            <Field label="Water" type="number" value={form.water} onChange={v=>setForm(f=>({...f,water:v}))} unit="cups"/>
            <Field label="Sleep" type="number" value={form.sleep} onChange={v=>setForm(f=>({...f,sleep:v}))} unit="hrs" step="0.5"/>
          </div>
        </Sheet>
      )}

      {scanMeal!==null&&(
        <BarcodeScanner
          onResult={(food)=>addFoodToMeal(scanMeal,food)}
          onClose={()=>setScanMeal(null)}
        />
      )}

      {/* History */}
      {s.nutrition.slice(0,14).map(n=>(
        <Card key={n.id} onClick={()=>editEntry(n)} style={{padding:14,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:12,color:V.text2}}>{fmtFull(n.date)}</span>
              {n.sleep>0&&<span style={{fontSize:10,color:V.purple}}>{Icons.moon({size:10,color:V.purple})} {(parseFloat(n.sleep)||0).toFixed(1)}h</span>}
            </div>
            <button onClick={()=>{ConfirmCtrl.show("Delete nutrition log?",fmtFull(n.date),()=>{Undo.set("Nutrition deleted",n,"nutrition");d({type:"DEL_N",id:n.id});SuccessToastCtrl.show("Nutrition deleted");});}} aria-label="Delete nutrition entry" style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:13,color:V.text3})}</button>
          </div>
          <div style={{display:"flex",gap:12,marginTop:8,alignItems:"baseline"}}>
            <span style={{fontSize:18,fontWeight:700,color:V.warn,fontFamily:V.mono}}>{n.cal}<span style={{fontSize:10,color:V.text3}}> kcal</span></span>
            <span style={{fontSize:12,color:V.accent,fontFamily:V.mono}}>{n.protein}P</span>
            <span style={{fontSize:12,color:V.accent2,fontFamily:V.mono}}>{n.carbs}C</span>
            <span style={{fontSize:12,color:V.warn,fontFamily:V.mono}}>{n.fat}F</span>
            {n.water>0&&<span style={{fontSize:10,color:V.accent2}}>{Icons.droplet({size:9,color:V.accent2})} {n.water}</span>}
          </div>
          {/* Meal timing */}
          {n.meals?.some(m=>m.time)&&(
            <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
              {n.meals.filter(m=>m.time).map((m,i)=>(
                <span key={i} style={{fontSize:8,padding:"2px 6px",borderRadius:4,background:"rgba(255,255,255,0.03)",color:V.text3}}>
                  {m.name} {m.time}
                </span>
              ))}
            </div>
          )}
          <Progress val={n.cal} max={s.goals.cal} color={V.warn} h={4}/>
        </Card>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════
//  BODY TAB
// ═══════════════════════════════════════
function BodyTab({s,d}){
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),weight:"",bf:"",chest:"",waist:"",arms:"",thighs:""});

  const save=()=>{
    d({type:"ADD_B",b:{id:uid(),date:form.date,weight:parseFloat(form.weight)||0,bf:parseFloat(form.bf)||0,
      chest:parseFloat(form.chest)||0,waist:parseFloat(form.waist)||0,arms:parseFloat(form.arms)||0,thighs:parseFloat(form.thighs)||0}});
    Haptic.medium();SuccessToastCtrl.show("Measurement saved");
    setShow(false);
    // #20: Prompt to take progress photo (weekly)
    const lastPhotoDate=s.photos[0]?.date;
    const daysSincePhoto=lastPhotoDate?Math.round((Date.now()-new Date(lastPhotoDate+"T12:00:00"))/86400000):99;
    if(daysSincePhoto>=7){
      setTimeout(()=>{
        ConfirmCtrl.show("Take a progress photo?",`It's been ${daysSincePhoto} days since your last one. Pair it with today's measurements.`,
          ()=>d({type:"TAB",tab:"track_photos"}));
      },500);
    }
  };

  const latest=s.body[0]; const prev=s.body[1];
  const wc=latest&&prev?(parseFloat(latest.weight)||0)-(parseFloat(prev.weight)||0):0;

  const trend=useMemo(()=>
    s.body.filter(m=>m.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date))
      .map(m=>({date:fmtShort(m.date),wt:+(parseFloat(m.weight)||0).toFixed(1),bf:+((parseFloat(m.bf)||0).toFixed(1))}))
  ,[s.body,s.range]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:8}}>
        <Btn full onClick={()=>{setForm({date:today(),weight:"",bf:"",chest:"",waist:"",arms:"",thighs:""});setShow(true);}}>
          {Icons.plus({size:16,color:V.bg})} Log Measurement
        </Btn>
        {s.body.find(b=>b.date===ago(1))&&(
          <Btn v="secondary" onClick={()=>{
            const yd=s.body.find(b=>b.date===ago(1));
            if(yd){setForm({date:today(),weight:yd.weight?.toString()||"",bf:yd.bf?.toString()||"",
              chest:yd.chest?.toString()||"",waist:yd.waist?.toString()||"",arms:yd.arms?.toString()||"",thighs:yd.thighs?.toString()||""});setShow(true);}
          }} s={{flexShrink:0,fontSize:11}}>{Icons.copy({size:14,color:V.text2})} Yesterday</Btn>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat icon={Icons.scale} label="Weight" value={(parseFloat(latest?.weight)||0).toFixed(1)||"—"} unit={wUnit(s.units)} color={V.purple}
          sub={wc!==0?`${wc>0?"↗ +":"↘ "}${wc.toFixed(1)} ${wUnit(s.units)}`:latest?"→ stable":undefined}/>
        <Stat icon={Icons.activity} label="Body Fat" value={((parseFloat(latest?.bf)||0).toFixed(1))||"—"} unit="%" color={V.danger}
          sub={(()=>{const prevBf=prev?parseFloat(prev.bf)||0:0;const curBf=latest?parseFloat(latest.bf)||0:0;const d2=curBf-prevBf;return d2!==0&&prevBf>0?`${d2>0?"↗ +":"↘ "}${d2.toFixed(1)}%`:curBf>0?"→ stable":undefined;})()}/>
      </div>

      {/* #18: Weekly average weight */}
      {s.body.length>=3&&(()=>{
        const last7=s.body.filter(b=>b.date>=ago(7)&&parseFloat(b.weight)>0);
        const last14=s.body.filter(b=>b.date>=ago(14)&&b.date<ago(7)&&parseFloat(b.weight)>0);
        const avg7=last7.length?last7.reduce((a,b2)=>a+parseFloat(b2.weight),0)/last7.length:0;
        const avg14=last14.length?last14.reduce((a,b2)=>a+parseFloat(b2.weight),0)/last14.length:0;
        const weekDiff=avg7&&avg14?avg7-avg14:0;
        if(!avg7)return null;
        return(
          <Card style={{padding:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:V.text3}}>7-DAY AVERAGE</div>
                <div style={{fontSize:20,fontWeight:800,color:V.purple,fontFamily:V.mono}}>{avg7.toFixed(1)} <span style={{fontSize:10,color:V.text3}}>{wUnit(s.units)}</span></div>
              </div>
              {weekDiff!==0&&<div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:V.text3}}>vs prior week</div>
                <div style={{fontSize:14,fontWeight:700,color:weekDiff>0?V.warn:V.accent,fontFamily:V.mono}}>{weekDiff>0?"+":""}{weekDiff.toFixed(1)}</div>
              </div>}
            </div>
          </Card>
        );
      })()}

      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Weight & BF%</span>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={trend}>
            <CartesianGrid {...chartCfg.grid} vertical={false}/>
            <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
            <YAxis yAxisId="w" domain={["dataMin-2","dataMax+2"]} {...chartCfg.axis} width={30}/>
            <YAxis yAxisId="b" orientation="right" domain={["dataMin-1","dataMax+1"]} {...chartCfg.axis} width={28}/>
            <Tooltip {...chartCfg.tip}/>
            {/* #17: Goal weight line */}
            {s.goals?.goalWeight>0&&<ReferenceLine yAxisId="w" y={s.goals.goalWeight} stroke={V.accent} strokeDasharray="6 3" strokeOpacity={0.6}
              label={{value:`Goal: ${s.goals.goalWeight}`,position:"insideTopRight",fill:V.accent,fontSize:8}}/>}
            <Line yAxisId="w" type="monotone" dataKey="wt" stroke={V.purple} strokeWidth={2} dot={{r:3}} name="Weight"/>
            <Line yAxisId="b" type="monotone" dataKey="bf" stroke={V.danger} strokeWidth={2} dot={{r:3}} name="BF%"/>
          </LineChart>
        </ResponsiveContainer>
      </Card>

      {/* #19: Measurement comparison card — since Day 1 */}
      {s.body.length>=2&&(()=>{
        const first=s.body[s.body.length-1];const last=s.body[0];
        const changes=[
          {l:"Weight",v1:parseFloat(first.weight)||0,v2:parseFloat(last.weight)||0,u:wUnit(s.units),c:V.purple},
          {l:"Body Fat",v1:parseFloat(first.bf)||0,v2:parseFloat(last.bf)||0,u:"%",c:V.danger},
          {l:"Chest",v1:parseFloat(first.chest)||0,v2:parseFloat(last.chest)||0,u:s.units==="kg"?"cm":"in",c:V.accent},
          {l:"Waist",v1:parseFloat(first.waist)||0,v2:parseFloat(last.waist)||0,u:s.units==="kg"?"cm":"in",c:V.accent2},
          {l:"Arms",v1:parseFloat(first.arms)||0,v2:parseFloat(last.arms)||0,u:s.units==="kg"?"cm":"in",c:V.warn},
          {l:"Thighs",v1:parseFloat(first.thighs)||0,v2:parseFloat(last.thighs)||0,u:s.units==="kg"?"cm":"in",c:"#ec4899"},
        ].filter(c2=>c2.v1>0&&c2.v2>0);
        if(changes.length===0)return null;
        const days=Math.round((new Date(last.date)-new Date(first.date))/86400000);
        return(
          <Card style={{padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:V.text,marginBottom:4}}>Progress Since Day 1</div>
            <div style={{fontSize:9,color:V.text3,marginBottom:8}}>{fmtShort(first.date)} → {fmtShort(last.date)} ({days} days)</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {changes.map(c2=>{
                const diff=c2.v2-c2.v1;
                return(
                  <div key={c2.l} style={{textAlign:"center",padding:8,borderRadius:8,background:"rgba(255,255,255,0.02)"}}>
                    <div style={{fontSize:14,fontWeight:800,color:diff===0?V.text3:(c2.l==="Waist"||c2.l==="Body Fat"?(diff<0?V.accent:V.danger):(diff>0?V.accent:V.danger)),fontFamily:V.mono}}>
                      {diff>0?"+":""}{diff.toFixed(1)}
                    </div>
                    <div style={{fontSize:8,color:V.text3}}>{c2.l} ({c2.u})</div>
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })()}

      {latest&&(
        <Card>
          <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Measurements</span>
          {[{l:"Chest",v:latest.chest},{l:"Waist",v:latest.waist},{l:"Arms",v:latest.arms},{l:"Thighs",v:latest.thighs}].map(m=>(
            <div key={m.l} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{width:54,fontSize:12,color:V.text2}}>{m.l}</span>
              <div style={{flex:1,height:22,background:"rgba(255,255,255,0.03)",borderRadius:6,overflow:"hidden"}}>
                <div style={{width:`${(m.v/50)*100}%`,height:"100%",background:`linear-gradient(90deg,${V.accent}30,${V.accent2}30)`,borderRadius:6}}/>
              </div>
              <span style={{fontSize:14,color:V.text,fontFamily:V.mono,minWidth:44,textAlign:"right"}}>{((parseFloat(m.v)||0).toFixed(1))}"</span>
            </div>
          ))}
        </Card>
      )}

      {show&&(
        <Sheet title="Log Measurement" onClose={()=>setShow(false)}
          footer={<Btn full onClick={save}>{Icons.check({size:16,color:V.bg})} Save Measurement</Btn>}>
          <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Weight" type="number" value={form.weight} onChange={v=>setForm(f=>({...f,weight:v}))} unit={wUnit(s.units)} step="0.1"/>
            <Field label="Body Fat" type="number" value={form.bf} onChange={v=>setForm(f=>({...f,bf:v}))} unit="%" step="0.1"/>
            <Field label="Chest" type="number" value={form.chest} onChange={v=>setForm(f=>({...f,chest:v}))} unit={s.units==="kg"?"cm":"in"} step="0.1"/>
            <Field label="Waist" type="number" value={form.waist} onChange={v=>setForm(f=>({...f,waist:v}))} unit={s.units==="kg"?"cm":"in"} step="0.1"/>
            <Field label="Arms" type="number" value={form.arms} onChange={v=>setForm(f=>({...f,arms:v}))} unit={s.units==="kg"?"cm":"in"} step="0.1"/>
            <Field label="Thighs" type="number" value={form.thighs} onChange={v=>setForm(f=>({...f,thighs:v}))} unit={s.units==="kg"?"cm":"in"} step="0.1"/>
          </div>
        </Sheet>
      )}

      {/* History Table */}
      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:10}}>History</span>
        {s.body.slice(0,10).map(m=>(
          <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",
            borderBottom:`1px solid rgba(255,255,255,0.03)`}}>
            <span style={{fontSize:12,color:V.text3}}>{fmtShort(m.date)}</span>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:13,color:V.purple,fontFamily:V.mono}}>{(parseFloat(m.weight)||0).toFixed(1)}</span>
              <span style={{fontSize:12,color:V.danger,fontFamily:V.mono}}>{((parseFloat(m.bf)||0).toFixed(1))}%</span>
              <button onClick={()=>{ConfirmCtrl.show("Delete measurement?",fmtShort(m.date),()=>{Undo.set("Measurement deleted",m,"body");d({type:"DEL_B",id:m.id});SuccessToastCtrl.show("Measurement deleted");});}} aria-label="Delete measurement" style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:12,color:V.text3})}</button>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════
//  ANALYTICS TAB
// ═══════════════════════════════════════
function AnalyticsTab({s}){
  const [selEx,setSelEx]=useState("bench");

  const exProg=useMemo(()=>{
    return s.workouts.filter(w=>w.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date)).reduce((arr,w)=>{
      const ex=w.exercises.find(e=>e.exerciseId===selEx);
      if(ex){
        const mw=Math.max(...ex.sets.map(st=>st.weight));
        const vol=ex.sets.reduce((s,st)=>s+st.weight*st.reps,0);
        const e1rm=Math.max(...ex.sets.map(st=>st.weight*(1+st.reps/30)));
        arr.push({date:fmtShort(w.date),max:mw,vol,e1rm:Math.round(e1rm)});
      }
      return arr;
    },[]);
  },[s.workouts,selEx,s.range]);

  const volByGroup=useMemo(()=>{
    const g={};
    s.workouts.filter(w=>w.date>=ago(s.range)).forEach(w=>w.exercises.forEach(ex=>{
      const info=s.exercises.find(e=>e.id===ex.exerciseId);
      if(info){const v=ex.sets.reduce((s,st)=>s+st.weight*st.reps,0);g[info.cat]=(g[info.cat]||0)+v;}
    }));
    return Object.entries(g).map(([name,value])=>({name,value}));
  },[s.workouts,s.exercises,s.range]);

  const freq=useMemo(()=>{
    const c={};
    s.workouts.filter(w=>w.date>=ago(s.range)).forEach(w=>{const dy=new Date(w.date+"T12:00:00").getDay();c[dy]=(c[dy]||0)+1;});
    return["S","M","T","W","T","F","S"].map((d,i)=>({d,n:c[i]||0}));
  },[s.workouts,s.range]);

  const maxF=Math.max(...freq.map(f=>f.n),1);
  const colors=[V.accent,V.accent2,V.purple,V.warn,V.danger,"#ffd93d"];
  const exOpts=[...new Set(s.workouts.flatMap(w=>w.exercises.map(e=>e.exerciseId)))];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Exercise Selector */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:13,color:V.text2,fontWeight:600}}>Exercise Progression</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {exOpts.map(id=>(
            <Chip key={id} label={s.exercises.find(e=>e.id===id)?.name||id} active={selEx===id} onClick={()=>setSelEx(id)}/>
          ))}
        </div>
        <span style={{fontSize:11,color:V.text3,display:"block",marginBottom:6}}>Max Weight & Est. 1RM</span>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={exProg}>
            <CartesianGrid {...chartCfg.grid} vertical={false}/>
            <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
            <YAxis {...chartCfg.axis} width={30}/>
            <Tooltip {...chartCfg.tip}/>
            <Line type="monotone" dataKey="max" stroke={V.accent} strokeWidth={2} dot={{r:3}} name="Max"/>
            <Line type="monotone" dataKey="e1rm" stroke={V.purple} strokeWidth={2} strokeDasharray="5 5" dot={{r:2}} name="E1RM"/>
          </LineChart>
        </ResponsiveContainer>
      </Card>

      {/* Volume Pie */}
      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Volume by Muscle</span>
        <ResponsiveContainer width="100%" height={200}>
          <PieChart>
            <Pie data={volByGroup} cx="50%" cy="50%" innerRadius={50} outerRadius={75} dataKey="value" paddingAngle={3}>
              {volByGroup.map((_,i)=><Cell key={i} fill={colors[i%colors.length]}/>)}
            </Pie>
            <Tooltip {...chartCfg.tip}/>
          </PieChart>
        </ResponsiveContainer>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
          {volByGroup.map((g,i)=>(
            <span key={g.name} style={{fontSize:10,color:colors[i%colors.length],display:"flex",alignItems:"center",gap:4,fontWeight:600}}>
              <span style={{width:7,height:7,borderRadius:2,background:colors[i%colors.length]}}/>{g.name}
            </span>
          ))}
        </div>
      </Card>

      {/* Frequency */}
      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:14}}>Weekly Frequency</span>
        <div style={{display:"flex",gap:8,justifyContent:"center",padding:"8px 0"}}>
          {freq.map((f,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flex:1}}>
              <div style={{width:"100%",maxWidth:32,height:80,borderRadius:8,background:"rgba(255,255,255,0.03)",
                position:"relative",overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
                <div style={{width:"100%",height:`${(f.n/maxF)*100}%`,background:`linear-gradient(to top,${V.accent}40,${V.accent2}40)`,
                  borderRadius:6,transition:"height .4s ease",minHeight:f.n>0?6:0}}/>
              </div>
              <span style={{fontSize:10,color:V.text3,fontWeight:600}}>{f.d}</span>
              <span style={{fontSize:11,color:V.accent,fontFamily:V.mono}}>{f.n}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════
//  CALENDAR TAB
// ═══════════════════════════════════════
const WORKOUT_TYPES = ["Rest","Chest","Back","Legs","Shoulders","Arms","Core","Cardio","Push","Pull","Upper","Lower","Full Body","Custom"];
const typeColors = {
  "Rest":"#333","Chest":V.accent,"Back":V.accent2,"Legs":V.purple,"Shoulders":V.warn,
  "Arms":"#ff6b9d","Core":"#ffd93d","Cardio":"#ff6b6b","Push":V.accent,"Pull":V.accent2,
  "Upper":"#e879f9","Lower":"#fb923c","Full Body":"#34d399","Custom":"#94a3b8",
};
const WORKOUT_TYPES_COLORS = typeColors;

function CalendarTab({s,d}){
  const [viewDate,setViewDate]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const [selDate,setSelDate]=useState(null);
  const [editWeekly,setEditWeekly]=useState(false);
  const [weeklyDraft,setWeeklyDraft]=useState(s.schedule.weekly);
  const [assignSheet,setAssignSheet]=useState(null); // date string for override assign

  const todayStr=today();
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];

  // Build calendar grid
  const calDays=useMemo(()=>{
    const first=new Date(viewDate.y,viewDate.m,1);
    const startDay=first.getDay();
    const daysInMonth=new Date(viewDate.y,viewDate.m+1,0).getDate();
    const prevMonthDays=new Date(viewDate.y,viewDate.m,0).getDate();
    const cells=[];
    // Previous month filler
    for(let i=startDay-1;i>=0;i--){
      const d=prevMonthDays-i;
      const dt=new Date(viewDate.y,viewDate.m-1,d);
      cells.push({day:d,date:dt.toISOString().split("T")[0],inMonth:false});
    }
    // Current month
    for(let i=1;i<=daysInMonth;i++){
      const dt=new Date(viewDate.y,viewDate.m,i);
      cells.push({day:i,date:dt.toISOString().split("T")[0],inMonth:true});
    }
    // Next month filler
    const remaining=7-(cells.length%7);
    if(remaining<7){
      for(let i=1;i<=remaining;i++){
        const dt=new Date(viewDate.y,viewDate.m+1,i);
        cells.push({day:i,date:dt.toISOString().split("T")[0],inMonth:false});
      }
    }
    return cells;
  },[viewDate]);

  // Get workout type for a date
  const getType=(dateStr)=>{
    if(s.schedule.overrides[dateStr])return s.schedule.overrides[dateStr];
    const dow=new Date(dateStr+"T12:00:00").getDay();
    return s.schedule.weekly[dow]||"Rest";
  };

  // Get the workout done on a date
  const getWorkout=(dateStr)=>s.workouts.find(w=>w.date===dateStr);

  // Get the LAST workout matching a type (looking backwards from date)
  const getLastOfType=(type,beforeDate)=>{
    // Map type to exercise categories
    const catMap={"Chest":"Chest","Back":"Back","Legs":"Legs","Shoulders":"Shoulders","Arms":"Arms","Core":"Core","Cardio":"Cardio",
      "Push":"Chest","Pull":"Back","Upper":"Chest","Lower":"Legs","Full Body":"Chest"};
    // Find workouts that had exercises in this category
    const matchingCat=catMap[type];
    if(!matchingCat)return null;
    // For compound types, just find any recent workout
    if(["Push","Pull","Upper","Lower","Full Body"].includes(type)){
      return s.workouts.filter(w=>w.date<beforeDate).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
    }
    // For specific categories, find workouts that included that muscle group
    for(const w of s.workouts.filter(wk=>wk.date<beforeDate).sort((a,b)=>b.date.localeCompare(a.date))){
      const hasCategory=w.exercises.some(ex=>{
        const info=s.exercises.find(e=>e.id===ex.exerciseId);
        return info?.cat===matchingCat;
      });
      if(hasCategory)return w;
    }
    return null;
  };

  // Get recommended exercises for a workout type
  const getExercisesForType=(type)=>{
    const catMap={"Chest":"Chest","Back":"Back","Legs":"Legs","Shoulders":"Shoulders","Arms":"Arms","Core":"Core","Cardio":"Cardio"};
    const multiMap={"Push":["Chest","Shoulders","Arms"],"Pull":["Back","Arms"],"Upper":["Chest","Back","Shoulders","Arms"],
      "Lower":["Legs","Core"],"Full Body":["Chest","Back","Legs","Shoulders","Arms"]};
    const cats=multiMap[type]?multiMap[type]:(catMap[type]?[catMap[type]]:[]);
    return s.exercises.filter(e=>cats.includes(e.cat));
  };

  const prevMonth=()=>setViewDate(v=>v.m===0?{y:v.y-1,m:11}:{...v,m:v.m-1});
  const nextMonth=()=>setViewDate(v=>v.m===11?{y:v.y+1,m:0}:{...v,m:v.m+1});
  const goToday=()=>{const n=new Date();setViewDate({y:n.getFullYear(),m:n.getMonth()});};

  const saveWeekly=()=>{
    Object.entries(weeklyDraft).forEach(([day,label])=>{
      d({type:"SET_WEEKLY",day:parseInt(day),label});
      SuccessToastCtrl.show("Schedule updated");
    });
    setEditWeekly(false);
  };

  // Selected day detail
  const selType=selDate?getType(selDate):null;
  const selWorkout=selDate?getWorkout(selDate):null;
  const selLastOfType=selDate&&selType&&selType!=="Rest"?getLastOfType(selType,selDate):null;
  const selExercises=selType?getExercisesForType(selType):[];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Month Navigation */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={prevMonth} aria-label="Previous month" style={{background:"none",border:"none",padding:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          {Icons.chevLeft({size:20,color:V.text2})}
        </button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:700,color:V.text}}>{monthNames[viewDate.m]}</div>
          <div style={{fontSize:12,color:V.text3}}>{viewDate.y}</div>
        </div>
        <button onClick={nextMonth} aria-label="Next month" style={{background:"none",border:"none",padding:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          {Icons.chevRight({size:20,color:V.text2})}
        </button>
      </div>

      {/* Today button */}
      <div style={{display:"flex",justifyContent:"center"}}>
        <Btn v="small" onClick={goToday} s={{fontSize:11}}>Today</Btn>
      </div>

      {/* Weekly Plan Strip */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,color:V.text2,fontWeight:700}}>Weekly Plan</span>
          <Btn v="ghost" onClick={()=>{setWeeklyDraft({...s.schedule.weekly});setEditWeekly(true);}} s={{fontSize:11,padding:"4px 8px"}}>Edit</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {dayNames.map((dn,i)=>{
            const type=s.schedule.weekly[i]||"Rest";
            const color=typeColors[type]||V.text3;
            return(
              <div key={i} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:V.text3,marginBottom:3,fontWeight:600}}>{dn}</div>
                <div style={{fontSize:9,color:color,fontWeight:700,padding:"4px 2px",
                  background:`${color}12`,borderRadius:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {type==="Rest"?"—":type.slice(0,4)}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Calendar Grid */}
      <Card style={{padding:12}}>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
          {dayNames.map(dn=>(
            <div key={dn} style={{textAlign:"center",fontSize:10,color:V.text3,fontWeight:700,padding:"4px 0"}}>{dn}</div>
          ))}
        </div>
        {/* Date cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {calDays.map((cell,i)=>{
            const type=getType(cell.date);
            const isToday=cell.date===todayStr;
            const isSel=cell.date===selDate;
            const hasWorkout=!!getWorkout(cell.date);
            const color=typeColors[type]||"#333";
            const isOverride=!!s.schedule.overrides[cell.date];
            return(
              <button key={i} onClick={()=>setSelDate(cell.date===selDate?null:cell.date)}
                style={{
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  aspectRatio:"1",borderRadius:10,border:isSel?`2px solid ${V.accent}`:isToday?`1.5px solid ${V.accent}50`:"2px solid transparent",
                  background:isSel?`${V.accent}12`:type!=="Rest"?`${color}08`:"transparent",
                  cursor:"pointer",padding:2,WebkitTapHighlightColor:"transparent",position:"relative",
                  opacity:cell.inMonth?1:0.25,
                }}>
                <span style={{fontSize:13,fontWeight:isToday?800:500,color:cell.inMonth?V.text:V.text3,
                  fontFamily:V.mono,lineHeight:1}}>{cell.day}</span>
                {type!=="Rest"&&cell.inMonth&&(
                  <span style={{fontSize:6,color:color,fontWeight:800,marginTop:1,textTransform:"uppercase",lineHeight:1}}>
                    {type.slice(0,3)}
                  </span>
                )}
                {hasWorkout&&cell.inMonth&&(
                  <div style={{position:"absolute",bottom:3,width:4,height:4,borderRadius:2,background:V.accent}}/>
                )}
                {isOverride&&cell.inMonth&&(
                  <div style={{position:"absolute",top:2,right:3,width:4,height:4,borderRadius:2,background:V.warn}}/>
                )}
              </button>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
          <span style={{fontSize:9,color:V.text3,display:"flex",alignItems:"center",gap:3}}>
            <span style={{width:5,height:5,borderRadius:3,background:V.accent}}/> Completed
          </span>
          <span style={{fontSize:9,color:V.text3,display:"flex",alignItems:"center",gap:3}}>
            <span style={{width:5,height:5,borderRadius:3,background:V.warn}}/> Override
          </span>
        </div>
      </Card>

      {/* Selected Day Detail */}
      {selDate&&(
        <Card glow>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:V.text}}>{fmtFull(selDate)}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                <span style={{fontSize:12,fontWeight:700,color:typeColors[selType]||V.text3,
                  background:`${typeColors[selType]||V.text3}15`,padding:"3px 10px",borderRadius:8}}>
                  {selType}
                </span>
                {selDate===todayStr&&<span style={{fontSize:10,color:V.accent,fontWeight:700}}>TODAY</span>}
              </div>
            </div>
            <Btn v="small" onClick={()=>setAssignSheet(selDate)} s={{fontSize:11}}>Change</Btn>
          </div>

          {/* What was done */}
          {selWorkout?(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:V.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8,
                display:"flex",alignItems:"center",gap:5}}>
                {Icons.check({size:13,color:V.accent})} Completed · {selWorkout.dur}min
              </div>
              {selWorkout.exercises.map((ex,i)=>{
                const exInfo=s.exercises.find(e=>e.id===ex.exerciseId);
                const top=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",
                    borderBottom:i<selWorkout.exercises.length-1?`1px solid rgba(255,255,255,0.04)`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13,color:V.text}}>{exInfo?.name||ex.exerciseId}</span>
                      {exInfo?.yt&&(
                        <a href={`https://www.youtube.com/watch?v=${exInfo.yt}`} target="_blank" rel="noopener noreferrer"
                          style={{width:20,height:20,borderRadius:5,background:"rgba(255,0,0,0.10)",
                            display:"inline-flex",alignItems:"center",justifyContent:"center",textDecoration:"none",
                            WebkitTapHighlightColor:"transparent"}}>
                          {Icons.play({size:8,color:V.danger})}
                        </a>
                      )}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:12,color:V.accent,fontFamily:V.mono}}>{top.weight}×{top.reps}</span>
                      <span style={{fontSize:10,color:V.text3,marginLeft:6}}>{ex.sets.length}s</span>
                    </div>
                  </div>
                );
              })}
            </div>
          ):(
            selType!=="Rest"&&(
              <div style={{padding:"12px 0",marginBottom:10,borderBottom:`1px solid ${V.cardBorder}`}}>
