function PersonalRecords({s}){
  const prs=useMemo(()=>{
    const map={};
    s.workouts.forEach(w=>w.exercises.forEach(ex=>{
      const name=s.exercises.find(e=>e.id===ex.exerciseId)?.name||ex.exerciseId;
      const cat=s.exercises.find(e=>e.id===ex.exerciseId)?.cat||"Other";
      ex.sets.forEach(st=>{
        const wt=parseFloat(st.weight)||0;const reps=parseInt(st.reps)||0;
        if(wt<=0)return;
        const e1rm=calc1RM(wt,reps);
        if(!map[ex.exerciseId]||e1rm>map[ex.exerciseId].e1rm){
          map[ex.exerciseId]={name,cat,weight:wt,reps,e1rm,date:w.date,exerciseId:ex.exerciseId};
        }
      });
    }));
    return Object.values(map).sort((a,b)=>b.e1rm-a.e1rm);
  },[s.workouts,s.exercises]);

  // Find how close recent lifts are to PR
  const recentPct=(exerciseId)=>{
    const pr=prs.find(p=>p.exerciseId===exerciseId);if(!pr)return null;
    for(const w of s.workouts.slice(0,10)){
      const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
      if(ex){const best=Math.max(...ex.sets.map(st=>calc1RM(parseFloat(st.weight)||0,parseInt(st.reps)||0)));
        if(best>0)return Math.round(best/pr.e1rm*100);}
    }return null;
  };

  const [catFilter,setCatFilter]=useState("All");
  const cats=["All",...new Set(prs.map(p=>p.cat))];
  const filtered=catFilter==="All"?prs:prs.filter(p=>p.cat===catFilter);
  const big3=["bench","squat","deadlift"].map(id=>prs.find(p=>p.exerciseId===id)).filter(Boolean);
  const big3Total=big3.reduce((a,p)=>a+p.weight,0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{fontSize:16,fontWeight:800,color:V.text}}>Personal Records</div>
      {big3.length>0&&(
        <Card style={{padding:14,border:`1px solid ${V.warn}20`,background:`${V.warn}04`}}>
          <div style={{fontSize:12,fontWeight:700,color:V.warn,marginBottom:8}}>🏆 Big 3 Total: {big3Total} {wUnit(s.units)}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {big3.map(p=>(
              <div key={p.exerciseId} style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:V.text,fontFamily:V.mono}}>{p.weight}</div>
                <div style={{fontSize:9,color:V.text3}}>{p.name.split(" ")[0]}</div>
                <div style={{fontSize:8,color:V.text3}}>{fmtShort(p.date)}</div>
              </div>
            ))}
          </div>
        </Card>
      )}
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {cats.map(c=><Chip key={c} label={c} active={catFilter===c} onClick={()=>setCatFilter(c)}/>)}
      </div>
      <div style={{fontSize:10,color:V.text3}}>{filtered.length} exercises with PRs</div>
      {filtered.map((pr,i)=>{
        const pct=recentPct(pr.exerciseId);
        return(
          <Card key={i} style={{padding:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:V.text}}>{pr.name}</div>
                <div style={{fontSize:10,color:V.text3}}>{pr.cat} · {fmtShort(pr.date)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{pr.weight}×{pr.reps}</div>
                <div style={{fontSize:9,color:V.text3}}>E1RM: {pr.e1rm} {wUnit(s.units)}</div>
              </div>
            </div>
            {pct!==null&&pct<100&&(
              <div style={{marginTop:6}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:V.text3,marginBottom:2}}>
                  <span>Recent: {pct}% of PR</span>
                  <span>{100-pct}% to match</span>
                </div>
                <div style={{height:3,borderRadius:2,background:"rgba(255,255,255,0.06)"}}>
                  <div style={{height:"100%",borderRadius:2,background:pct>=90?V.accent:pct>=75?V.warn:V.danger,width:`${pct}%`}}/>
                </div>
              </div>
            )}
            {pct===100&&<div style={{fontSize:9,color:V.accent,fontWeight:600,marginTop:4}}>💪 Matched this session!</div>}
          </Card>
        );
      })}
      {prs.length===0&&<Card style={{padding:20,textAlign:"center"}}><div style={{fontSize:12,color:V.text3}}>Log some workouts to see your PRs here</div></Card>}
    </div>
  );
}

function PhotoCompare({s}){
  const photos=(s.photos||[]).filter(p=>!p.private&&p.data).sort((a,b)=>a.date.localeCompare(b.date));
  const [leftIdx,setLeftIdx]=useState(0);
  const [rightIdx,setRightIdx]=useState(Math.max(0,photos.length-1));
  const [sliderPos,setSliderPos]=useState(50);
  const containerRef=useRef(null);

  if(photos.length<2)return(
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:32,marginBottom:8}}>📸</div>
      <div style={{fontSize:14,fontWeight:700,color:V.text}}>Need at least 2 photos</div>
      <div style={{fontSize:11,color:V.text3,marginTop:4}}>Take progress photos over time to compare your transformation.</div>
    </div>
  );

  const handleSlide=(e)=>{
    const rect=containerRef.current?.getBoundingClientRect();
    if(!rect)return;
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const pct=Math.max(5,Math.min(95,((clientX-rect.left)/rect.width)*100));
    setSliderPos(pct);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{fontSize:16,fontWeight:800,color:V.text}}>Progress Compare</div>
      {/* Date selectors */}
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:V.text3,marginBottom:4,fontWeight:600}}>BEFORE</div>
          <select value={leftIdx} onChange={e=>setLeftIdx(parseInt(e.target.value))}
            style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
              borderRadius:8,color:V.text,fontSize:12,outline:"none",fontFamily:V.font}}>
            {photos.map((p,i)=><option key={i} value={i} style={{background:V.bg}}>{fmtShort(p.date)}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:V.text3,marginBottom:4,fontWeight:600}}>AFTER</div>
          <select value={rightIdx} onChange={e=>setRightIdx(parseInt(e.target.value))}
            style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
              borderRadius:8,color:V.text,fontSize:12,outline:"none",fontFamily:V.font}}>
            {photos.map((p,i)=><option key={i} value={i} style={{background:V.bg}}>{fmtShort(p.date)}</option>)}
          </select>
        </div>
      </div>
      {/* Time span */}
      {photos[leftIdx]&&photos[rightIdx]&&(()=>{
        const d1=new Date(photos[leftIdx].date),d2=new Date(photos[rightIdx].date);
        const days=Math.abs(Math.round((d2-d1)/(86400000)));
        const span=days<7?`${days} days`:days<60?`${Math.round(days/7)} weeks`:`${Math.round(days/30)} months`;
        return days>0?<div style={{textAlign:"center",fontSize:11,color:V.accent,fontWeight:600,padding:"4px 0"}}>{span} apart</div>:null;
      })()}
      {/* Slider comparison */}
      <div ref={containerRef} onMouseMove={e=>{if(e.buttons===1)handleSlide(e);}} onTouchMove={handleSlide}
        style={{position:"relative",borderRadius:14,overflow:"hidden",aspectRatio:"3/4",border:`1px solid ${V.cardBorder}`,cursor:"col-resize",touchAction:"none"}}>
        {/* Right (after) image — full */}
        <img src={photos[rightIdx]?.data} alt="After photo" style={{position:"absolute",top:0,left:0,right:0,bottom:0,width:"100%",height:"100%",objectFit:"cover"}}/>
        {/* Left (before) image — clipped */}
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,width:`${sliderPos}%`,overflow:"hidden"}}>
          <img src={photos[leftIdx]?.data} alt="Before photo" style={{position:"absolute",top:0,left:0,width:containerRef.current?containerRef.current.offsetWidth+"px":"100%",height:"100%",objectFit:"cover"}}/>
        </div>
        {/* Slider line */}
        <div style={{position:"absolute",top:0,bottom:0,left:`${sliderPos}%`,width:3,background:V.accent,transform:"translateX(-50%)",zIndex:10}}>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:32,height:32,borderRadius:16,
            background:V.accent,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.4)"}}>
            <span style={{color:V.bg,fontSize:12,fontWeight:900}}>⟷</span>
          </div>
        </div>
        {/* Labels */}
        <div style={{position:"absolute",bottom:8,left:8,padding:"4px 8px",borderRadius:6,background:"rgba(0,0,0,0.7)",fontSize:10,color:"#fff",fontWeight:600,zIndex:5}}>
          {fmtShort(photos[leftIdx]?.date)}
        </div>
        <div style={{position:"absolute",bottom:8,right:8,padding:"4px 8px",borderRadius:6,background:"rgba(0,0,0,0.7)",fontSize:10,color:"#fff",fontWeight:600,zIndex:5}}>
          {fmtShort(photos[rightIdx]?.date)}
        </div>
      </div>
    </div>
  );
}

// ─── AI Coach Chat (Claude API — BYOK + Free Tier) ───
function AICoachChat({s}){
  const userKey=LS.get("ft-anthropic-key");
  const defaultMsg=[{role:"assistant",content:userKey
    ?"Hey! I'm your AI coach. Ask me anything about your training, nutrition, or recovery. I have access to all your workout data."
    :"Welcome to AI Coach! To get started, you'll need your own Anthropic API key. Paste it in the field above — it stays on your device and never touches our servers. Get a key at console.anthropic.com."}];
  const [msgs,setMsgs]=useState(LS.get("ft-ai-chat")||defaultMsg);
  const aiStreak=useStreak(s.workouts);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const scrollRef=useRef(null);
  const [apiKeyInput,setApiKeyInput]=useState("");
  // Persist messages
  useEffect(()=>{if(msgs.length>1)LS.set("ft-ai-chat",msgs.slice(-20));},[msgs]);

  const buildContext=()=>{
    const rw=s.workouts.slice(0,5).map(w=>`${w.date}: ${w.exercises.map(e=>`${s.exercises.find(x=>x.id===e.exerciseId)?.name||e.exerciseId} (${e.sets.length} sets)`).join(", ")}`).join("\n");
    const bw=s.body[0]?`Current weight: ${s.body[0].weight} ${wUnit(s.units)}`:"";
    const goals=s.goals?`Goals: ${s.goals.cal}cal, ${s.goals.protein}g protein`:"";
    const activePhase=(s.phases||[]).find(p=>p.active);
    const phase=activePhase?`Current phase: ${activePhase.type} (${activePhase.label||activePhase.type})`:"";
    const sched=s.schedule?.weekly||{};
    const todayType=s.schedule?.overrides?.[today()]||sched[new Date().getDay()]||"Rest";
    const schedule=`Today is ${todayType} day. Weekly: ${Object.values(sched).join(", ")}`;
    
    const injuries=(s.injuries||[]).filter(inj=>inj.active).map(inj=>inj.name||inj.area).join(", ");
    return`You are IRONLOG AI Coach. Be concise, actionable, encouraging. Max 3 paragraphs.\n\nUser data:\n${bw}\n${goals}\n${phase}\n${schedule}\nStreak: ${aiStreak} days\n${injuries?`Active injuries: ${injuries}`:""}\n\nRecent workouts:\n${rw}`;
  };

  const send=async()=>{
    if(!input.trim()||!userKey)return;
    const userMsg={role:"user",content:input.trim()};
    setMsgs(m=>[...m,userMsg]);setInput("");setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":userKey,"anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
          system:buildContext(),
          messages:[...msgs.filter(m=>m.role!=="system"),userMsg].map(m=>({role:m.role,content:m.content}))
        })
      });
      const data=await res.json();
      if(data.error){
        setMsgs(m=>[...m,{role:"assistant",content:`Error: ${data.error.message||"Invalid API key or request failed."}. Check your key in your Anthropic dashboard.`}]);
      }else{
        const reply=data.content?.[0]?.text||"Sorry, I couldn't process that. Try again.";
        setMsgs(m=>[...m,{role:"assistant",content:reply}]);
      }
    }catch(e){
      setMsgs(m=>[...m,{role:"assistant",content:"Connection failed. Check your internet connection."}]);
    }
    setLoading(false);
    setTimeout(()=>scrollRef.current?.scrollTo(0,scrollRef.current.scrollHeight),100);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:800,color:V.text}}>AI Coach</div>
          <div style={{fontSize:10,color:userKey?V.accent:V.warn}}>{userKey?"Using your API key":"API key required"}</div>
        </div>
        {msgs.length>1&&<button onClick={()=>{setMsgs(defaultMsg);LS.set("ft-ai-chat",null);SuccessToastCtrl.show("Conversation cleared");}}
          style={{padding:"4px 10px",borderRadius:6,background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
            cursor:"pointer",fontSize:10,color:V.text3,fontFamily:V.font}}>Clear</button>}
      </div>
      {!userKey&&(
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input value={apiKeyInput||""} onChange={e=>setApiKeyInput(e.target.value)} placeholder="Paste Anthropic API key for unlimited"
            type="password" style={{flex:1,padding:"8px 10px",background:V.card,border:`1px solid ${V.cardBorder}`,
              borderRadius:8,color:V.text,fontSize:10,outline:"none",fontFamily:V.mono}}/>
          <button onClick={()=>{if(apiKeyInput?.trim()){LS.set("ft-anthropic-key",apiKeyInput.trim());SuccessToastCtrl.show("API key saved");}}}
            style={{padding:"6px 10px",borderRadius:6,background:`${V.accent}15`,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,color:V.accent}}>Save</button>
        </div>
      )}
      {userKey&&(
        <button onClick={()=>{LS.set("ft-anthropic-key",null);SuccessToastCtrl.show("API key removed");}}
          style={{padding:"4px 10px",borderRadius:6,background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
            cursor:"pointer",fontSize:9,color:V.text3,fontFamily:V.font,marginBottom:8,alignSelf:"flex-start"}}>Remove API Key</button>
      )}
      {/* Messages */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,paddingBottom:8}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{padding:"10px 12px",borderRadius:12,maxWidth:"85%",lineHeight:1.5,fontSize:12,
            ...(m.role==="user"?{alignSelf:"flex-end",background:`${V.accent}15`,color:V.text}
              :{alignSelf:"flex-start",background:"rgba(255,255,255,0.04)",color:V.text2})}}>
            {m.content}
          </div>
        ))}
        {loading&&<div style={{alignSelf:"flex-start",padding:"10px 12px",borderRadius:12,background:"rgba(255,255,255,0.04)",fontSize:12,color:V.text3}}>Thinking...</div>}
      </div>
      {/* Input */}
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} placeholder={userKey?"Ask your coach...":"Add your API key above to start"}
          disabled={!userKey} onKeyDown={e=>{if(e.key==="Enter")send();}}
          style={{flex:1,padding:"10px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
            borderRadius:10,color:V.text,fontSize:13,outline:"none",fontFamily:V.font,opacity:userKey?1:0.5}}/>
        <Btn onClick={send} disabled={!input.trim()||loading||!userKey}>{Icons.check({size:14,color:V.bg})}</Btn>
      </div>
    </div>
  );
}

// ─── Social Sub-Page: Feed ───
function SocialFeed({s,d}){
  const email=s.profile?.email;
  const [feedData,setFeedData]=useState(null);
  const [notifs,setNotifs]=useState(null);
  const [loadErr,setLoadErr]=useState(false);
  const loadFeed=()=>{setLoadErr(false);if(email){SocialAPI.getFeed(email).then(r=>{if(r)setFeedData(r);else setLoadErr(true);});SocialAPI.getNotifications(email).then(setNotifs);}};
  useEffect(loadFeed,[email]);
  const reactToEvent=async(eventId,emoji)=>{await SocialAPI.react(email,eventId,emoji);SocialAPI.getFeed(email).then(setFeedData);};

  const streak=useStreak(s.workouts);
  const weekW=s.workouts.filter(w=>w.date>=ago(7)).length;
  const protDays=s.nutrition.filter(n=>n.date>=ago(7)&&(n.protein||0)>=(s.goals?.protein||180)).length;
  const readiness=calcReadiness(s);
  const todayN=s.nutrition.filter(n=>n.date===today());
  const todayCal=todayN.reduce((a,n)=>a+(n.cal||0),0);
  const todayProt=todayN.reduce((a,n)=>a+(n.protein||0),0);
  const nextWorkout=(()=>{const sched=s.schedule?.weekly||{};const dow=new Date().getDay();for(let i=0;i<7;i++){const d2=(dow+i)%7;const label=s.schedule?.overrides?.[ago(-i)]||sched[d2];if(label&&label!=="Rest"&&label!=="Off")return{day:i===0?"Today":i===1?"Tomorrow":["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][(dow+i)%7],label};}return null;})();

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{fontSize:16,fontWeight:800,color:V.text}}>Activity Feed</div>
      {loadErr&&<Card style={{padding:14,textAlign:"center"}}><div style={{fontSize:11,color:V.danger,marginBottom:6}}>Could not load feed</div>
        <Btn v="secondary" full onClick={loadFeed}>Tap to retry</Btn></Card>}
      {/* Today card */}
      <Card style={{padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:8}}>📅 Today</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)"}}>
            <div style={{fontSize:10,color:V.text3}}>Readiness</div>
            <div style={{fontSize:16,fontWeight:800,color:readiness.color,fontFamily:V.mono}}>{readiness.score}</div>
          </div>
          <div style={{padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)"}}>
            <div style={{fontSize:10,color:V.text3}}>Protein</div>
            <div style={{fontSize:16,fontWeight:800,color:todayProt>=(s.goals?.protein||180)?V.accent:V.warn,fontFamily:V.mono}}>{todayProt}g</div>
          </div>
          <div style={{padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)"}}>
            <div style={{fontSize:10,color:V.text3}}>Calories</div>
            <div style={{fontSize:16,fontWeight:800,color:V.text,fontFamily:V.mono}}>{todayCal}</div>
          </div>
          <div style={{padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)"}}>
            <div style={{fontSize:10,color:V.text3}}>Next</div>
            <div style={{fontSize:12,fontWeight:700,color:V.accent}}>{nextWorkout?`${nextWorkout.day}: ${nextWorkout.label}`:"Rest"}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[{l:"Workout",t:"log_workout"},{l:"Meal",t:"log_nutrition"},{l:"Check-in",t:"home"},{l:"Photo",t:"track_photos"}].map(a=>(
            <button key={a.t} onClick={()=>d({type:"TAB",tab:a.t})} style={{flex:1,padding:"6px",borderRadius:6,
              background:"rgba(255,255,255,0.03)",border:`1px solid ${V.cardBorder}`,cursor:"pointer",
              fontSize:9,color:V.accent,fontWeight:600,fontFamily:V.font}}>{a.l}</button>
          ))}
        </div>
      </Card>
      {/* Highlights */}
      <Card style={{padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:8}}>✨ Highlights</div>
        {[{t:`${weekW} workouts this week`,e:weekW>=5?"🔥":weekW>=3?"💪":"📈"},
          {t:`Protein hit ${protDays} of 7 days`,e:protDays>=7?"⭐":protDays>=5?"✅":"🎯"},
          {t:`${streak}-day streak`,e:streak>=30?"💎":streak>=7?"🔥":"🔄"}].map((h,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0"}}>
            <span style={{color:V.text2}}>{h.t}</span><span>{h.e}</span>
          </div>
        ))}
      </Card>
      {/* Accountability */}
      {!s.workouts.some(w=>w.date===today())&&!s.workouts.some(w=>w.date===ago(1))&&(
        <Card style={{padding:14,border:`1px solid ${V.warn}20`}}>
          <div style={{fontSize:12,fontWeight:700,color:V.warn}}>💬 Get After It</div>
          <div style={{fontSize:11,color:V.text3,marginTop:4}}>2 days without a workout. Even 1 set counts.</div>
          <Btn full onClick={()=>d({type:"TAB",tab:"log_workout"})} s={{marginTop:8,background:V.warn}}>Log 1 Set →</Btn>
        </Card>
      )}
      {/* Live friend feed */}
      {feedData?.events?.filter(e=>!e.isOwn).length>0&&(
        <Card style={{padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:8}}>📡 Friend Activity</div>
          {feedData.events.filter(e=>!e.isOwn).slice(0,8).map(ev=>(
            <div key={ev.id} style={{padding:"8px 0",borderBottom:`1px solid rgba(255,255,255,0.03)`}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div><span style={{fontSize:12,fontWeight:600,color:V.text}}>{ev.name}</span>
                  <span style={{fontSize:11,color:V.text3}}>{" "}{ev.type==="WorkoutLogged"?"logged a workout":ev.type==="PRHit"?"hit a PR 🎉":ev.type==="QuickMessage"?`sent: ${ev.data?.msg||"a message"}`:ev.type==="AccountabilitySet"?"set an accountability partner":ev.type==="GroupChat"?"sent a group message":ev.type==="ChallengeAchieved"?`reached ${ev.data?.tier||"a new tier"} 🏆`:"was active"}</span></div>
                <span style={{fontSize:9,color:V.text3}}>{fmtShort(ev.created_at?.split("T")[0])}</span>
              </div>
              {/* Event detail */}
              {ev.type==="WorkoutLogged"&&ev.data?.exercises&&(
                <div style={{fontSize:10,color:V.text3,marginTop:2}}>{Array.isArray(ev.data.exercises)?ev.data.exercises.slice(0,3).join(", "):""}{ev.data.sets?` · ${ev.data.sets} sets`:""}</div>
              )}
              {ev.type==="PRHit"&&ev.data&&(
                <div style={{fontSize:10,color:V.warn,marginTop:2,fontFamily:V.mono}}>{ev.data.exercise}: {ev.data.weight}×{ev.data.reps} (E1RM: {ev.data.e1rm})</div>
              )}
              {/* Reactions */}
              <div style={{display:"flex",gap:4,marginTop:6}}>
                {["🔥","💪","👏","💎","😤"].map(r=>{
                  const count=ev.reactions?.[r]||0;
                  const reacted=ev.myReactions?.includes(r);
                  return(
                    <button key={r} onClick={()=>reactToEvent(ev.id,r)} style={{padding:"4px 8px",borderRadius:8,
                      background:reacted?`${V.accent}15`:(count>0?"rgba(255,255,255,0.04)":"transparent"),
                      border:`1px solid ${reacted?V.accent+"30":(count>0?V.cardBorder:"transparent")}`,
                      cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",gap:3,transition:"all .15s",
                      transform:reacted?"scale(1.1)":"scale(1)"}}>
                      {r}{count>0&&<span style={{fontSize:9,fontWeight:700,color:reacted?V.accent:V.text3}}>{count}</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </Card>
      )}
      {/* Notifications */}
      {notifs?.unread>0&&(
        <Card style={{padding:14,border:`1px solid ${V.accent}20`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:700,color:V.accent}}>🔔 {notifs.unread} notification{notifs.unread>1?"s":""}</span>
            <button onClick={()=>{SocialAPI.markRead(email,"all");setNotifs({...notifs,unread:0});}}
              style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:V.text3}}>Clear</button>
          </div>
          {notifs.notifications.filter(n=>!n.read).slice(0,3).map(n=>(
            <div key={n.id} style={{padding:"4px 0",fontSize:11,color:V.text2}}><b>{n.title}</b> — {n.body}</div>
          ))}
        </Card>
      )}
    </div>
  );
}

// ─── Social Sub-Page: Friends ───
function SocialFriends({s,d}){
  const email=s.profile?.email;
  const displayName=s.profile?.firstName||email?.split("@")[0]||"You";
  const [friendsData,setFriendsData]=useState(null);
  const [addMethod,setAddMethod]=useState("code");
  const [addInput,setAddInput]=useState("");
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState(false);
  const [viewFriend,setViewFriend]=useState(null);
  const [friendTab,setFriendTab]=useState("profile"); // profile | chat
  const [dmMessages,setDmMessages]=useState([]);
  const [dmInput,setDmInput]=useState("");
  const [dmLoading,setDmLoading]=useState(false);
  const [dmHasMore,setDmHasMore]=useState(false);
  const [dmOldestCursor,setDmOldestCursor]=useState(null);
  const [dmLoadingOlder,setDmLoadingOlder]=useState(false);
  const dmEndRef=useRef(null);
  const [compareWith,setCompareWith]=useState(null);
  const streak=useStreak(s.workouts);
  const getBest=(id)=>{let b=0;s.workouts.forEach(w=>w.exercises.forEach(e=>{if(e.exerciseId===id)e.sets.forEach(st=>{if(st.weight>b)b=st.weight;});}));return b;};
  const myBig3=getBest("bench")+getBest("squat")+getBest("deadlift");

  const loadFriends=()=>{setLoadErr(false);setLoading(true);if(email)SocialAPI.getFriends(email).then(d2=>{if(d2)setFriendsData(d2);else setLoadErr(true);setLoading(false);});};
  useEffect(loadFriends,[email]);

  const sendAdd=async()=>{
    if(!addInput.trim())return;
    let target=addInput.trim();
    if(!target.includes("@"))target=target.replace(/^@/,"");
    const r=await SocialAPI.sendRequest(email,target);
    if(r?.success){SuccessToastCtrl.show("Request sent!");setAddInput("");loadFriends();}
    else SuccessToastCtrl.show(r?.error||"Not found");
  };
  const accept=async(from)=>{await SocialAPI.acceptRequest(email,from);SuccessToastCtrl.show("Friend added!");loadFriends();};
  const remove=async(t)=>{ConfirmCtrl.show("Remove this friend?","You can re-add them later.",async()=>{await SocialAPI.removeFriend(email,t);loadFriends();SuccessToastCtrl.show("Removed");});};
  const quickMsgs=["💪 Nice PR!","🔥 Let's train","⏰ Don't skip today","👏 Keep it up","🏋️ Gym time?"];
  const loadDMs=(friendEmail)=>{
    setDmLoading(true);setDmHasMore(false);setDmOldestCursor(null);
    setDmMessages(LS.get(`ft-dm-${friendEmail}`)||[]);
    SocialAPI.getDMs(email,friendEmail).then(r=>{
      if(r?.messages){
        // #B1: Use API-provided friendLastRead timestamp for read receipts.
        // Previously scanned messages for a "__read" sentinel that could never exist —
        // DMRead events are stored as event_type:DMRead, not DirectMessage, so they
        // never appear in the getDMs results. The API now returns friendLastRead directly.
        const lastFriendRead=r.friendLastRead||null;
        const msgs=(r.messages||[]).map(m=>({
          ...m,read:m.isOwn&&lastFriendRead&&new Date(m.ts)<=new Date(lastFriendRead)
        }));
        setDmMessages(msgs);LS.set(`ft-dm-${friendEmail}`,msgs);
        setDmHasMore(!!r.hasMore);
        // nextCursor is the oldest message's timestamp — used as 'before' for loading older pages
        if(r.hasMore&&r.nextCursor)setDmOldestCursor(r.nextCursor);
      }
      setDmLoading(false);
    });
    // Mark their messages as read by us
    SocialAPI.markDMsRead(email,friendEmail);
  };
  const loadOlderDMs=(friendEmail)=>{
    if(!dmOldestCursor||dmLoadingOlder)return;
    setDmLoadingOlder(true);
    SocialAPI.getDMs(email,friendEmail,dmOldestCursor).then(r=>{
      if(r?.messages){
        const lastFriendRead=r.friendLastRead||null;
        const older=(r.messages||[]).map(m=>({
          ...m,read:m.isOwn&&lastFriendRead&&new Date(m.ts)<=new Date(lastFriendRead)
        }));
        // Prepend older messages to the top
        setDmMessages(prev=>[...older,...prev]);
        setDmHasMore(!!r.hasMore);
        if(r.hasMore&&r.nextCursor)setDmOldestCursor(r.nextCursor);
        else setDmOldestCursor(null);
      }
      setDmLoadingOlder(false);
    });
  };
  const sendDM=(friendEmail)=>{
    if(!dmInput.trim()||dmInput.length>200)return;
    Haptic.light();
    const msg={id:Date.now(),from:email,name:displayName,text:dmInput.trim(),ts:new Date().toISOString(),isOwn:true};
    const updated=[...dmMessages,msg].slice(-100);
    setDmMessages(updated);LS.set(`ft-dm-${friendEmail}`,updated);
    SocialAPI.sendDM(email,friendEmail,dmInput.trim(),displayName);
    setDmInput("");
    setTimeout(()=>dmEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };
  const openFriendChat=(f)=>{setViewFriend(f);setFriendTab("chat");loadDMs(f.email);LS.set(`ft-unread-${f.email}`,0);LS.set(`ft-last-read-${f.email}`,new Date().toISOString());};
  const openFriendProfile=(f)=>{setViewFriend(f);setFriendTab("profile");};
  const sendQuickMsg=async(fe,msg)=>{await SocialAPI.logEvent(email,"QuickMessage",{to:fe,msg},"friends");SuccessToastCtrl.show("Sent!");};

  if(compareWith)return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <button onClick={()=>setCompareWith(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:5,padding:"8px 0",cursor:"pointer"}}>
        {Icons.chevLeft({size:18,color:V.accent})}<span style={{fontSize:14,color:V.accent,fontWeight:600}}>Back</span>
      </button>
      <div style={{fontSize:16,fontWeight:800,color:V.text,textAlign:"center"}}>You vs {compareWith.name}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}}>
        {[{l:"Streak",my:streak,their:compareWith.challenges?.find(c=>c.challenge_id==="streak")?.value||"?"},
          {l:"Big 3",my:myBig3||"—",their:compareWith.challenges?.find(c=>c.challenge_id==="big3")?.value||"?"},
          {l:"Workouts",my:s.workouts.length,their:"?"}].map((r,i)=>(
          <React.Fragment key={i}>
            <div style={{textAlign:"center",padding:10,borderRadius:10,background:parseFloat(r.my)>=parseFloat(r.their)?V.accent+"08":"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:20,fontWeight:800,color:parseFloat(r.my)>=parseFloat(r.their)?V.accent:V.text,fontFamily:V.mono}}>{r.my}</div>
            </div>
            <div style={{fontSize:10,color:V.text3,fontWeight:600,textAlign:"center"}}>{r.l}</div>
            <div style={{textAlign:"center",padding:10,borderRadius:10,background:parseFloat(r.their)>parseFloat(r.my)?V.purple+"08":"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:20,fontWeight:800,color:parseFloat(r.their)>parseFloat(r.my)?V.purple:V.text,fontFamily:V.mono}}>{r.their}</div>
            </div>
          </React.Fragment>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:4}}>
        <div style={{textAlign:"center",fontSize:10,color:V.accent,fontWeight:600}}>You</div>
        <div style={{textAlign:"center",fontSize:10,color:V.purple,fontWeight:600}}>{compareWith.name}</div>
      </div>
    </div>
  );

  if(viewFriend)return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <button onClick={()=>{setViewFriend(null);setDmMessages([]);setDmInput("");}} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:5,padding:"8px 0",cursor:"pointer"}}>
        {Icons.chevLeft({size:18,color:V.accent})}<span style={{fontSize:14,color:V.accent,fontWeight:600}}>Back</span>
      </button>
      {/* Tab switcher */}
      <div style={{display:"flex",gap:4}}>
        {[{id:"profile",l:"Profile"},{id:"chat",l:"Chat"}].map(t=>(
          <button key={t.id} onClick={()=>{setFriendTab(t.id);if(t.id==="chat")loadDMs(viewFriend.email);}} style={{flex:1,padding:"8px",borderRadius:8,
            border:`1.5px solid ${friendTab===t.id?V.accent:V.cardBorder}`,background:friendTab===t.id?V.accent+"08":"transparent",
            cursor:"pointer",fontSize:12,fontWeight:700,color:friendTab===t.id?V.accent:V.text3,fontFamily:V.font}}>{t.l}</button>
        ))}
      </div>

      {/* Profile tab */}
      {friendTab==="profile"&&(<>
        <Card style={{padding:16,textAlign:"center"}}>
          <div style={{width:48,height:48,borderRadius:14,background:`linear-gradient(135deg,${V.purple},#ec4899)`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:8}}>
            <span style={{fontSize:20,color:V.bg,fontWeight:900}}>{(viewFriend.name||"?")[0].toUpperCase()}</span>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:V.text}}>{viewFriend.name}</div>
          {viewFriend.username&&<div style={{fontSize:11,color:V.text3}}>@{viewFriend.username}</div>}
          {viewFriend.badges?.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:4,justifyContent:"center",margin:"8px 0"}}>
              {viewFriend.badges.map((b,i)=><span key={i} style={{padding:"2px 8px",borderRadius:6,background:V.accent+"08",fontSize:9,color:V.accent}}>{b}</span>)}
            </div>
          )}
          {viewFriend.challenges?.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,margin:"10px 0"}}>
              {viewFriend.challenges.map((c,i)=>(
                <div key={i} style={{padding:6,borderRadius:6,background:"rgba(255,255,255,0.02)"}}>
                  <div style={{fontSize:14,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{c.value}</div>
                  <div style={{fontSize:8,color:V.text3,textTransform:"uppercase"}}>{c.challenge_id}</div>
                </div>
              ))}
            </div>
          )}
        </Card>
        {/* #2: Streak comparison */}
        {viewFriend.challenges?.find(c=>c.challenge_id==="streak")&&(
          <Card style={{padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:V.text,marginBottom:8}}>🔥 Streak Battle</div>
            {(()=>{
              const theirStreak=parseInt(viewFriend.challenges.find(c=>c.challenge_id==="streak")?.value)||0;
              const diff=streak-theirStreak;
              const winning=diff>0,tied=diff===0;
              return(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:28,fontWeight:800,color:winning||tied?V.accent:V.text,fontFamily:V.mono}}>{streak}</div>
                      <div style={{fontSize:10,color:V.text3}}>You</div>
                    </div>
                    <div style={{fontSize:16,color:V.text3,padding:"0 12px"}}>{winning?">":(tied?"=":"<")}</div>
                    <div style={{textAlign:"center",flex:1}}>
                      <div style={{fontSize:28,fontWeight:800,color:!winning&&!tied?V.purple:V.text,fontFamily:V.mono}}>{theirStreak}</div>
                      <div style={{fontSize:10,color:V.text3}}>{viewFriend.name?.split(" ")[0]}</div>

                  </div>
                  <div style={{textAlign:"center",fontSize:11,fontWeight:600,
                    color:winning?V.accent:(tied?V.warn:V.purple)}}>
                    {winning?`You're ahead by ${diff} day${diff>1?"s":""}! 💪`:tied?"Tied! Don't let them pass you 🤝":`They're ahead by ${Math.abs(diff)} day${Math.abs(diff)>1?"s":""}. Catch up! 🏃`}
