<script>
// ─── Script loader with error handling ───
var loadStatus = {};
function loadScript(url, name) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.crossOrigin = 'anonymous';
    s.onload = function() { loadStatus[name] = 'ok'; resolve(); };
    s.onerror = function() { loadStatus[name] = 'FAILED'; reject(new Error(name + ' failed to load from ' + url)); };
    document.head.appendChild(s);
  });
}

function showError(msg) {
  var loader = document.getElementById('loader');
  loader.innerHTML = '<div style="color:#ff6b6b;font-size:16px;font-weight:700;margin-bottom:12px">Failed to Load</div>' +
    '<div class="err">' + msg + '</div>' +
    '<div style="margin-top:20px;font-size:12px;color:#8b8b9e">Check your internet connection and reload</div>';
}

function updateMsg(msg) {
  var el = document.querySelector('#loader .msg');
  if (el) el.textContent = msg;
}

// Load scripts sequentially to guarantee order
updateMsg('Loading React...');
loadScript('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js', 'React')
.then(function() {
  updateMsg('Loading React DOM...');
  return loadScript('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js', 'ReactDOM');
})
.then(function() {
  updateMsg('Loading dependencies...');
  return loadScript('https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js', 'PropTypes');
})
.then(function() {
  updateMsg('Loading Charts...');
  return loadScript('https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js', 'Recharts')
    .catch(function() {
      updateMsg('Retrying charts from backup CDN...');
      return loadScript('https://unpkg.com/recharts@2.5.0/umd/Recharts.js', 'Recharts');
    });
})
.then(function() {
  updateMsg('Loading Compiler...');
  return loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js', 'Babel')
    .catch(function() {
      updateMsg('Retrying compiler from backup CDN...');
      return loadScript('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js', 'Babel');
    });
})
.then(function() {
  updateMsg('Starting app...');
  // Verify globals exist
  if (typeof React === 'undefined') throw new Error('React not defined');
  if (typeof ReactDOM === 'undefined') throw new Error('ReactDOM not defined');
  if (typeof Recharts === 'undefined') throw new Error('Recharts not defined');
  if (typeof Babel === 'undefined') throw new Error('Babel not defined');

  // Get the app source
  var appScript = document.getElementById('app-source');
  if (!appScript) throw new Error('App source not found');

  // Transpile JSX to JS
  var jsxCode = appScript.textContent;
  var compiled;
  try {
    compiled = Babel.transform(jsxCode, {
      presets: [['react', { runtime: 'classic' }]],
      filename: 'app.jsx'
    }).code;
  } catch(e) {
    throw new Error('Babel compile error: ' + e.message);
  }

  // Execute compiled JS
  try {
    var fn = new Function(compiled);
    fn();
  } catch(e) {
    throw new Error('Runtime error: ' + e.message);
  }

  // Hide loader
  setTimeout(function() {
    document.getElementById('loader').classList.add('done');
    setTimeout(function() { document.getElementById('loader').style.display = 'none'; }, 500);
  }, 200);
})
.catch(function(err) {
  console.error('IRONLOG Load Error:', err);
  showError(err.message || 'Unknown error');
});
</script>

<script type="text/plain" id="app-source">
const {useState,useEffect,useReducer,useMemo,useRef,useCallback}=React;
const {LineChart,Line,AreaChart,Area,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,ReferenceLine}=Recharts;

// ─── localStorage persistence ───
const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.warn("Error:",e);}},
};

// ─── #1 Auth Token (signed sync requests) ───
const AuthToken={
  // Legacy — kept for backward compat during migration
  init:(email)=>{},
  generate:(email)=>"",
  getHeaders:(email)=>{
    const sessionToken=LS.get("ft-session-token");
    return{
      "Content-Type":"application/json",
      ...(sessionToken?{"X-Session-Token":sessionToken}:{}),
      "X-Auth-Token":email||"legacy",
    };
  },
};

// Session management
const SessionManager={
  // Create session after signup (called with email + PIN)
  create:async(email,pin,deviceId)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"create",email:email.toLowerCase(),pin,deviceId:deviceId||LS.get("ft-device-id")})
      });
      const json=await res.json();
      if(json.success&&json.token){
        LS.set("ft-session-token",json.token);
        LS.set("ft-session-email",email.toLowerCase());
        LS.set("ft-session-expires",json.expires_at);
        return{success:true,token:json.token};
      }
      return{success:false,error:json.error,attempts_remaining:json.attempts_remaining};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  // Check if we have a valid session
  hasSession:()=>{
    const token=LS.get("ft-session-token");
    const expires=LS.get("ft-session-expires");
    if(!token)return false;
    if(expires&&new Date(expires)<new Date()){LS.set("ft-session-token",null);return false;}
    return true;
  },
  // Revoke (logout)
  revoke:async()=>{
    const token=LS.get("ft-session-token");
    if(token){try{await fetch(`${SYNC_URL}/api/auth/session`,{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":token},body:JSON.stringify({action:"revoke",token})});}catch(e){}}
    LS.set("ft-session-token",null);LS.set("ft-session-email",null);LS.set("ft-session-expires",null);LS.set("ft-is-admin",null);
  },
  // Check admin status (silent — never exposes admin to non-admins)
  checkAdmin:async()=>{
    const token=LS.get("ft-session-token");
    const email=LS.get("ft-session-email")||LS.get("ft-profile")?.email;
    if(!token&&!email)return false;
    try{
      const headers={"Content-Type":"application/json"};
      if(token)headers["X-Session-Token"]=token;
      if(email)headers["X-Auth-Token"]=email;
      const res=await fetch(`${SYNC_URL}/api/admin`,{method:"POST",headers,
        body:JSON.stringify({action:"check"})});
      if(res.ok){const json=await res.json();if(json.isAdmin){LS.set("ft-is-admin",true);return true;}}
      LS.set("ft-is-admin",null);return false;
    }catch(e){return false;}
  },
};

// ─── #2 Undo System ───
let _undoItem=null;let _undoTimer=null;
// ─── Share Card Generator (Canvas API) ───
// roundRect polyfill for iOS < 16.1
if(typeof CanvasRenderingContext2D!=="undefined"&&!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r||0,w/2,h/2);this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}
const ShareCard={
  generate:async(title,stats,subtitle)=>{
    const c=document.createElement("canvas");c.width=600;c.height=400;
    const ctx=c.getContext("2d");
    // Background
    const bg=ctx.createLinearGradient(0,0,600,400);bg.addColorStop(0,"#0e0e16");bg.addColorStop(1,"#1a1a2e");
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(0,0,600,400,24);ctx.fill();
    // Border
    ctx.strokeStyle="rgba(34,197,94,0.3)";ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(1,1,598,398,24);ctx.stroke();
    // IRONLOG brand
    ctx.font="bold 14px Inter,system-ui,sans-serif";ctx.fillStyle="rgba(255,255,255,0.4)";ctx.fillText("IRONLOG",24,36);
    // Title
    ctx.font="bold 28px Inter,system-ui,sans-serif";ctx.fillStyle="#e4e4e7";ctx.fillText(title,24,90);
    // Subtitle
    if(subtitle){ctx.font="14px Inter,system-ui,sans-serif";ctx.fillStyle="#71717a";ctx.fillText(subtitle,24,115);}
    // Stats grid
    const cols=Math.min(stats.length,3);const boxW=Math.floor((600-48-16*(cols-1))/cols);
    stats.forEach((s,i)=>{
      const col=i%cols;const row=Math.floor(i/cols);
      const x=24+col*(boxW+16);const y=140+row*100;
      ctx.fillStyle="rgba(255,255,255,0.03)";ctx.beginPath();ctx.roundRect(x,y,boxW,80,12);ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,boxW,80,12);ctx.stroke();
      ctx.font="bold 32px 'SF Mono',monospace";ctx.fillStyle=s.color||"#22c55e";ctx.fillText(s.value.toString(),x+16,y+42);
      ctx.font="bold 10px Inter,system-ui,sans-serif";ctx.fillStyle="#71717a";ctx.fillText(s.label.toUpperCase(),x+16,y+62);
    });
    // Date
    ctx.font="12px Inter,system-ui,sans-serif";ctx.fillStyle="#71717a";
    ctx.fillText(new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),24,380);
    return c;
  },
  share:async(canvas,filename)=>{
    // #E5: Wrap canvas.toBlob in a Promise — was declared async but used a callback API,
    // so all three await ShareCard.share(...) call sites returned before the share sheet appeared.
    return new Promise(resolve=>{
      canvas.toBlob(async blob=>{
        if(navigator.share&&blob){
          try{await navigator.share({files:[new File([blob],filename||"ironlog-share.png",{type:"image/png"})],title:"IRONLOG"});}
          catch(e){ShareCard.download(canvas,filename);}
        }else{ShareCard.download(canvas,filename);}
        resolve();
      },"image/png");
    });
  },
  download:(canvas,filename)=>{
    const url=canvas.toDataURL("image/png");const a=document.createElement("a");
    a.href=url;a.download=filename||"ironlog-share.png";a.click();
  },
};

const Undo={
  _setItem:null,_setRemaining:null,_duration:6000,
  set:(label,item,type)=>{
    const entry={label,item,type,ts:Date.now()};
    if(Undo._timer)clearTimeout(Undo._timer);
    if(Undo._setItem)Undo._setItem(entry);
    if(Undo._setRemaining)Undo._setRemaining(Undo._duration);
    Undo._timer=setTimeout(()=>{if(Undo._setItem)Undo._setItem(null);if(Undo._setRemaining)Undo._setRemaining(0);},Undo._duration);
  },
  get:()=>null,  // kept for compat; state now held in React
  clear:()=>{if(Undo._timer)clearTimeout(Undo._timer);if(Undo._setItem)Undo._setItem(null);if(Undo._setRemaining)Undo._setRemaining(0);},
};

// ─── Cloud Sync Engine ───
// I12: Allow localStorage override of API URL for dev/staging environments
const SYNC_URL=LS.get("ft-api-url")||"https://ironlog-api.vercel.app";
let syncTimer=null;
let syncInFlight=false;

// ─── Offline Sync Queue (IndexedDB) ───
const SyncQueue={
  _open:()=>new Promise((resolve,reject)=>{
    const req=indexedDB.open("ironlog-sync-queue",1);
    req.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains("queue"))db.createObjectStore("queue",{keyPath:"id",autoIncrement:true});};
    req.onsuccess=(e)=>resolve(e.target.result);
    req.onerror=(e)=>reject(e.target.error);
  }),
  add:async(url,body)=>{
    try{const db=await SyncQueue._open();const tx=db.transaction("queue","readwrite");
    tx.objectStore("queue").add({url,body,timestamp:new Date().toISOString()});
    LS.set("ft-pending-sync",(parseInt(LS.get("ft-pending-sync"))||0)+1);
    // Request background sync if available
    if("serviceWorker" in navigator&&"SyncManager" in window){
      const reg=await navigator.serviceWorker.ready;
      await reg.sync.register("ironlog-sync").catch(()=>{});
    }}catch(e){console.warn("Error:",e);}
  },
  count:async()=>{
    try{const db=await SyncQueue._open();return new Promise(r=>{
      const tx=db.transaction("queue","readonly");const c=tx.objectStore("queue").count();
      c.onsuccess=()=>r(c.result);c.onerror=()=>r(0);
    });}catch(e){return 0;}
  },
  clear:async()=>{
    try{const db=await SyncQueue._open();const tx=db.transaction("queue","readwrite");
    tx.objectStore("queue").clear();LS.set("ft-pending-sync",0);}catch(e){console.warn("Error:",e);}
  },
  processAll:async()=>{
    try{const db=await SyncQueue._open();const tx=db.transaction("queue","readonly");
    const getAll=tx.objectStore("queue").getAll();
    return new Promise(resolve=>{
      getAll.onsuccess=async()=>{
        const items=getAll.result||[];let synced=0;
        // Read current session token at replay time so queued items pass auth
        const sessionToken=LS.get("ft-session-token");
        const headers={"Content-Type":"application/json"};
        if(sessionToken)headers["X-Session-Token"]=sessionToken;
        for(const item of items){
          try{const res=await fetch(item.url,{method:"POST",headers,body:item.body});
          if(res.ok){const delTx=db.transaction("queue","readwrite");delTx.objectStore("queue").delete(item.id);synced++;}
          else if(res.status===401){resolve({synced,remaining:items.length-synced,authError:true});return;}
          // #12: Drop permanently-invalid items (400/403/404/422) — previously left in queue causing infinite retry.
          // A 5xx or network error is transient so we leave those for next sync.
          else if(res.status===400||res.status===403||res.status===404||res.status===409||res.status===422){
            const delTx=db.transaction("queue","readwrite");delTx.objectStore("queue").delete(item.id);
            console.warn("SyncQueue: discarding permanently-failed item",item.id,"status",res.status);
          }}catch(e){console.warn("Error:",e);}
        }
        LS.set("ft-pending-sync",Math.max(0,items.length-synced));
        resolve({synced,remaining:items.length-synced});
      };
      getAll.onerror=()=>resolve({synced:0,remaining:0});
    });}catch(e){return{synced:0,remaining:0};}
  }
};

// ─── I8: Active Workout Persistence (crash recovery) ───
const ActiveWorkoutStore={
  _open:()=>new Promise((res,rej)=>{
    const r=indexedDB.open("ironlog-active-workout",1);
    r.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains("active"))db.createObjectStore("active",{keyPath:"id"});};
    r.onsuccess=(e)=>res(e.target.result);r.onerror=(e)=>rej(e.target.error);
  }),
  save:async(workout)=>{
    try{const db=await ActiveWorkoutStore._open();const tx=db.transaction("active","readwrite");tx.objectStore("active").put({id:"current",...workout,savedAt:new Date().toISOString()});}catch(e){}
  },
  load:async()=>{
    try{const db=await ActiveWorkoutStore._open();return new Promise(r=>{const tx=db.transaction("active","readonly");const req=tx.objectStore("active").get("current");req.onsuccess=()=>r(req.result||null);req.onerror=()=>r(null);});}catch(e){return null;}
  },
  clear:async()=>{
    try{const db=await ActiveWorkoutStore._open();const tx=db.transaction("active","readwrite");tx.objectStore("active").delete("current");}catch(e){}
  },
};

// ─── Reconcile API ─────────────────────────────────────────────────────────
// Compares local record counts against server counts per domain.
// Stores the last result in localStorage so SystemHealthPanel can display it
// without triggering a network call on every render.
const ReconcileAPI = {
  _key: 'ft-reconcile-result',
  _tsKey: 'ft-reconcile-ts',
  // Minimum gap between auto-runs (4 hours)
  _intervalMs: 4 * 60 * 60 * 1000,

  async run(state) {
    const email = state?.profile?.email;
    if (!email) return null;
    const clientCounts = {
      workouts: state.workouts?.length ?? 0,
      nutrition: state.nutrition?.length ?? 0,
      body: state.body?.length ?? 0,
      photos: state.photos?.length ?? 0,
    };
    try {
      const res = await fetch(`${SYNC_URL}/api/sync/reconcile`, {
        method: 'POST',
        headers: AuthToken.getHeaders(email),
        body: JSON.stringify({
          email,
          deviceId: LS.get('ft-device-id') || 'unknown',
          clientCounts,
        }),
      });
      if (res.status === 401) return { status: 'auth_error', ran_at: new Date().toISOString() };
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const result = { ...data, ran_at: new Date().toISOString() };
      LS.set(ReconcileAPI._key, result);
      LS.set(ReconcileAPI._tsKey, Date.now());
      return result;
    } catch(e) {
      const err = { status: 'error', error: e.message, ran_at: new Date().toISOString() };
      LS.set(ReconcileAPI._key, err);
      return err;
    }
  },

  // Returns the last stored result (no network call)
  last() { return LS.get(ReconcileAPI._key); },

  // Returns true if enough time has passed to warrant an auto-run
  shouldAutoRun() {
    const last = parseInt(LS.get(ReconcileAPI._tsKey) || '0');
    return Date.now() - last > ReconcileAPI._intervalMs;
  },
};

const APP_VERSION="6.0";
const SW_VERSION="ironlog-v6.0"; // Keep in sync with sw.js

// ─── Social API Client ───
const SocialAPI={
  _headers:(email)=>({...AuthToken.getHeaders(email)}),

  // Friends
  getFriends:async(email)=>{
    // #B5: email removed from GET query string — server reads identity from session token.
    // Sending email in the URL logged it to Vercel/CDN/proxy access logs unnecessarily.
    try{const r=await fetch(`${SYNC_URL}/api/social?route=friends`,{headers:SocialAPI._headers(email)});return r.ok?await r.json():null;}catch(e){return null;}
  },
  sendRequest:async(email,target)=>{
    try{const r=await fetch(`${SYNC_URL}/api/social?route=friends`,{method:"POST",headers:SocialAPI._headers(email),body:JSON.stringify({route:"friends",email,action:"send",target})});return r.ok?await r.json():null;}catch(e){return null;}

const CloudSync={
  // Push all data to server (debounced, silent) — queues on failure
  push:async(state)=>{
    if(syncInFlight)return;
    const email=state.profile?.email;
    if(!email)return;
    syncInFlight=true;
    const payload=JSON.stringify({
      email,
      deviceId:LS.get("ft-device-id")||"unknown",
      appVersion:APP_VERSION,
      workouts:(state.syncPrefs||{}).workouts!==false?state.workouts||[]:[],
      nutrition:(state.syncPrefs||{}).nutrition!==false?state.nutrition||[]:[],
      body:(state.syncPrefs||{}).body!==false?state.body||[]:[],
      photos:(state.syncPrefs||{}).photos!==false?(state.photos||[]).filter(p=>!p.data||p.data.length<500000):[],
      checkins:(state.syncPrefs||{}).checkins!==false?state.checkins||[]:[],
      milestones:(state.syncPrefs||{}).milestones!==false?state.milestones||[]:[],
      settings:{goals:state.goals,schedule:state.schedule,exercises:state.exercises,units:state.units,
        // vault_pin omitted — kept local-only, never sent to server
        phases:state.phases||[],injuries:state.injuries||[],
        privacy:LS.get("ft-privacy")||{},supplements:LS.get("ft-supplements")||[],
        accountability:LS.get("ft-accountability")||[]},
    });
    try{
      const res=await fetch(`${SYNC_URL}/api/sync/push`,{method:"POST",headers:AuthToken.getHeaders(email),body:payload});
      if(res.status===401){
        // I10: Session expired — show actionable banner instead of silently queueing
        LS.set("ft-session-token",null);
        if(typeof MsgBannerCtrl!=="undefined")MsgBannerCtrl.push({name:"Session Expired",text:"Tap to sign in again — your data is saved locally.",type:"system"});
        syncInFlight=false;return;
      }
      if(!res.ok)throw new Error("Push failed");
      const json=await res.json();
      LS.set("ft-last-sync",new Date().toISOString());
      LS.set("ft-pending-sync",0);
      // Check for app update
      if(json.latest_version&&json.latest_version!==APP_VERSION){
        LS.set("ft-update-available",json.latest_version);
        LS.set("ft-update-notes",json.update_notes||"");
      }
      // Snapshot challenge progress on every sync (non-blocking)
      const streak2=(()=>{let c=0;for(let i=0;i<60;i++){if(state.workouts.some(w=>w.date===ago(i)))c++;else if(i>0)break;}return c;})();
      const getBest=(id)=>{let b=0;state.workouts.forEach(w=>w.exercises.forEach(e=>{if(e.exerciseId===id)e.sets.forEach(st=>{if(st.weight>b)b=st.weight;});}));return b;};
      const big3=getBest("bench")+getBest("squat")+getBest("deadlift");
      const protDays2=state.nutrition.filter(n=>n.date>=ago(7)&&(n.protein||0)>=(state.goals?.protein||180)).length;
      const tierCalc=(v,tiers)=>{for(let i=tiers.length-1;i>=0;i--)if(v>=tiers[i][0])return tiers[i][1];return null;};
      const badges2=[];
      if(streak2>=7)badges2.push("🔥 7-Day Streak");if(streak2>=30)badges2.push("💎 30-Day Streak");
      if(big3>=1000)badges2.push("🏆 1000lb Club");if(state.workouts.length>=100)badges2.push("💪 Century Club");
      if(protDays2>=7)badges2.push("⭐ Macro Master");
      SocialAPI.snapshotChallenges(email,[
        {id:"streak",value:streak2,tier:tierCalc(streak2,[[7,"bronze"],[14,"silver"],[21,"gold"],[30,"diamond"]])},
        {id:"big3",value:big3,tier:tierCalc(big3,[[600,"bronze"],[800,"silver"],[1000,"gold"],[1200,"diamond"]]),metadata:{bench:getBest("bench"),squat:getBest("squat"),deadlift:getBest("deadlift")}},
        {id:"macro",value:protDays2,tier:tierCalc(protDays2,[[3,"bronze"],[5,"silver"],[7,"gold"]])},
      ],badges2).catch(()=>{});
      // Flush queued items
      SyncQueue.processAll();
      // Auto-reconcile every 4 hours — non-blocking, silent
      if(ReconcileAPI.shouldAutoRun()) ReconcileAPI.run(state).catch(()=>{});
    }catch(e){
      // Queue for background sync
      await SyncQueue.add(`${SYNC_URL}/api/sync/push`,payload);
    }
    syncInFlight=false;
  },

  debouncedPush:(state)=>{
    if(syncTimer)clearTimeout(syncTimer);
    syncTimer=setTimeout(()=>CloudSync.push(state),3000);
  },

  // Pull all data from server (for restore) — requires PIN if account has one
  pull:async(email,deviceId,pin)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/sync/pull`,{
        method:"POST",
        headers:AuthToken.getHeaders(email),
        body:JSON.stringify({email,deviceId,pin:pin||null}),
      });
      const json=await res.json();
      if(res.status===403&&json.pin_required)return{pin_required:true};
      if(res.status===403)return{wrong_pin:true,attempts_remaining:json.attempts_remaining,locked:json.locked};
      if(res.status===429)return{locked:true,retry_minutes:json.retry_minutes};
      // Handle 200 with success:false (account not found)
      if(json.success===false)return{error:json.error||"Account not found"};
      if(!res.ok)return{error:"Server error"};
      if(json.success)return json;
      return null;
    }catch(e){
      return{error:"Connection failed"};
    }
  },
};

function genDemo(){
  const w=[],n=[],b=[];
  const pool=["bench","squat","deadlift","ohp","row","pullup","curl","tricep","legpress","latpull"];
  for(let i=30;i>=0;i--){
    const d=ago(i);
    if(i%7!==0&&i%7!==3){
      const ne=3+Math.floor(Math.random()*3);
      const sh=[...pool].sort(()=>Math.random()-0.5).slice(0,ne);
      const exs=sh.map(eid=>{
        const bw={bench:185,squat:275,deadlift:315,ohp:135,row:185,pullup:0,curl:35,tricep:50,legpress:400,latpull:150}[eid]||100;
        const p=(30-i)*0.5;
        return{exerciseId:eid,sets:Array.from({length:3+Math.floor(Math.random()*2)},()=>({
          weight:Math.round(bw+p+(Math.random()*10-5)),reps:6+Math.floor(Math.random()*7),rpe:7+Math.floor(Math.random()*3),done:true
        }))};
      });
      w.push({id:uid(),date:d,dur:45+Math.floor(Math.random()*30),exercises:exs,notes:"",rating:3+Math.floor(Math.random()*3)});
    }
    const pr=140+Math.floor(Math.random()*60),ca=180+Math.floor(Math.random()*80),fa=55+Math.floor(Math.random()*30);
    const cal=pr*4+ca*4+fa*9;
    n.push({id:uid(),date:d,cal,protein:pr,carbs:ca,fat:fa,fiber:20+Math.floor(Math.random()*15),water:6+Math.floor(Math.random()*6),
      sleep:6+Math.random()*2.5,
      meals:[{name:"Breakfast",cal:Math.round(cal*.25),protein:Math.round(pr*.25),items:[]},{name:"Lunch",cal:Math.round(cal*.35),protein:Math.round(pr*.35),items:[]},
        {name:"Dinner",cal:Math.round(cal*.3),protein:Math.round(pr*.3),items:[]},{name:"Snacks",cal:Math.round(cal*.1),protein:Math.round(pr*.1),items:[]}]});
    if(i%3===0||i%7===0){
      b.push({id:uid(),date:d,weight:182-(30-i)*.15+Math.random()*2-1,bf:18-(30-i)*.05+Math.random()*.5,
        chest:42+(30-i)*.02,waist:34-(30-i)*.03,arms:15.5+(30-i)*.015,thighs:24+(30-i)*.01});
    }
  }
  return{workouts:w,nutrition:n,body:b};
}

  profile:{firstName:"",lastName:"",nickname:"",email:"",dob:"",sex:"",state:"",
    height:"",fitnessLevel:"",activityLevel:"",weeklyAvailability:""}};

function reducer(s,a){
  switch(a.type){
    case "INIT": return{...s,...a.p,loaded:true};
    case "TAB": return{...s,tab:a.tab};
    case "RANGE": return{...s,range:a.d};
    case "ADD_W": return{...s,workouts:[a.w,...s.workouts].sort((a,b)=>b.date.localeCompare(a.date))};
    case "EDIT_W": return{...s,workouts:s.workouts.map(w=>w.id===a.w.id?{...a.w}:w)};
    case "DEL_W": return{...s,workouts:s.workouts.filter(w=>w.id!==a.id)};
    case "ADD_N": return{...s,nutrition:[...s.nutrition.filter(n=>n.date!==a.n.date),a.n].sort((a,b)=>b.date.localeCompare(a.date))};
    case "EDIT_N": return{...s,nutrition:s.nutrition.map(n=>n.id===a.n.id?{...a.n}:n)};
    case "DEL_N": return{...s,nutrition:s.nutrition.filter(n=>n.id!==a.id)};
    case "ADD_B": return{...s,body:[a.b,...s.body].sort((a,b)=>b.date.localeCompare(a.date))};
    case "EDIT_B": return{...s,body:s.body.map(b=>b.id===a.b.id?{...a.b}:b)};
    case "DEL_B": return{...s,body:s.body.filter(b=>b.id!==a.id)};
    case "GOALS": return{...s,goals:{...s.goals,...a.g}};
    case "ADD_EX": return{...s,exercises:[...s.exercises,a.ex]};
    case "SET_WEEKLY": return{...s,schedule:{...s.schedule,weekly:{...s.schedule.weekly,[a.day]:a.label}}};
    case "SET_OVERRIDE": {
      const ov={...s.schedule.overrides};
      if(a.label)ov[a.date]=a.label; else delete ov[a.date];
      return{...s,schedule:{...s.schedule,overrides:ov}};
    }
    case "SET_SCHEDULE": return{...s,schedule:a.schedule};
    case "UNITS": return{...s,units:a.u};
    case "ONBOARDED": return{...s,onboarded:true};
    case "SET_PROFILE": return{...s,profile:{...(s.profile||{}),...a.profile}};
    case "ADD_CHECKIN": return{...s,checkins:[a.c,...(s.checkins||[]).filter(c=>c.date!==a.c.date)]};
    case "SET_MILESTONES": return{...s,milestones:a.milestones||[]};
    case "SET_PHASES": return{...s,phases:a.phases||[]};
    case "SET_INJURIES": return{...s,injuries:a.injuries||[]};
    case "SET_SYNC_PREFS": return{...s,syncPrefs:{...(s.syncPrefs||{}),...a.prefs}};
    case "SET_A11Y": return{...s,a11y:{...(s.a11y||{}),...a.a11y}};
    case "ADD_PHOTO": return{...s,photos:[a.photo,...s.photos]};
    case "DEL_PHOTO": return{...s,photos:s.photos.filter(p=>p.id!==a.id)};
    // #E4: Preserve a11y on CLEAR_ALL — large text/high contrast/reduce motion were silently lost on data reset
    case "CLEAR_ALL": return{...init,exercises:defaultExercises,loaded:true,onboarded:true,units:s.units,profile:s.profile,a11y:s.a11y};
    case "IMPORT": return{...s,...a.data,loaded:true};
    default: return s;
  }
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}

  render(){
    if(this.state.err)return React.createElement("div",{style:{padding:40,textAlign:"center",background:V.bg,color:V.text,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:V.font}},

      React.createElement("button",{onClick:()=>{
        try{
          // Export all data stores, not just the 3 core ones
          const keys=["ft-w","ft-n","ft-b","ft-photos","ft-checkins","ft-milestones","ft-profile","ft-goals","ft-phases","ft-injuries"];
          const data={};
          keys.forEach(k=>{try{const v=localStorage.getItem(k);if(v)data[k.replace("ft-","")]=JSON.parse(v);}catch(e){}});
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");a.href=url;a.download=`ironlog-emergency-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();

// ─── #2 Undo Toast — with countdown bar ───
function UndoToast({d}){
  const [item,setItem]=useState(null);
  const [remaining,setRemaining]=useState(0);
  const UNDO_DURATION=6000;
  useEffect(()=>{
    Undo._setItem=setItem;
    Undo._setRemaining=setRemaining;
    Undo._duration=UNDO_DURATION;
    return()=>{Undo._setItem=null;Undo._setRemaining=null;};
  },[]);
  if(!item)return null;
  const doUndo=()=>{
    const u=Undo.get();if(!u)return;
    if(u.type==="workout")d({type:"ADD_W",w:u.item});
    else if(u.type==="nutrition")d({type:"ADD_N",n:u.item});
    else if(u.type==="body")d({type:"ADD_B",b:u.item});
    else if(u.type==="photo")d({type:"ADD_PHOTO",photo:u.item});
    Undo.clear();setItem(null);
    SuccessToastCtrl.show("Restored");
  };
  const pct=Math.round((remaining/UNDO_DURATION)*100);
  return ReactDOM.createPortal(
    <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:1500,
      minWidth:220,background:"rgba(30,30,50,0.95)",borderRadius:12,border:`1px solid ${V.cardBorder}`,
      overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px"}}>
        <span style={{fontSize:12,color:V.text}}>{item.label}</span>
        <button onClick={doUndo} style={{padding:"4px 12px",borderRadius:6,background:V.accent,border:"none",
          cursor:"pointer",fontSize:11,fontWeight:700,color:V.bg,fontFamily:V.font,marginLeft:"auto"}}>Undo</button>
      </div>
      <div style={{height:3,background:"rgba(255,255,255,0.06)"}}>
        <div style={{height:"100%",background:V.accent,width:`${pct}%`,transition:"width .1s linear"}}/>
      </div>
    </div>,
    document.body
  );
}

// ─── Message Banner System (iMessage-style in-app notifications) ───
let _msgBannerQueue=[];
let _msgBannerTimer=null;
const MsgBannerCtrl={
  push:(msg)=>{
    _msgBannerQueue.push({...msg,id:Date.now()+Math.random(),ts:Date.now()});
    if(_msgBannerQueue.length>5)_msgBannerQueue=_msgBannerQueue.slice(-5);
  },
  pop:()=>{
    if(_msgBannerQueue.length===0)return null;
    const oldest=_msgBannerQueue[0];
    if(Date.now()-oldest.ts>5000){_msgBannerQueue.shift();return null;}
    return oldest;
  },
  dismiss:()=>{_msgBannerQueue.shift();},
  clear:()=>{_msgBannerQueue=[];},
};

function MessageBanner({onTap}){
  const [banner,setBanner]=useState(null);
  const [show,setShow]=useState(false);
  useEffect(()=>{
    const iv=setInterval(()=>{
      const msg=MsgBannerCtrl.pop();
      if(msg&&!banner){setBanner(msg);setShow(true);
        setTimeout(()=>{setShow(false);setTimeout(()=>{setBanner(null);MsgBannerCtrl.dismiss();},300);},4000);
      }
    },500);
    return()=>clearInterval(iv);
  },[banner]);
  if(!banner)return null;
  return ReactDOM.createPortal(
    <div onClick={()=>{if(onTap)onTap(banner);setShow(false);setTimeout(()=>{setBanner(null);MsgBannerCtrl.dismiss();},100);}}

// ─── #3 Pre-save Validation ───
function validateWorkout(w,s){
  const warnings=[];
  w.exercises.forEach(ex=>{
    const name=s.exercises.find(e=>e.id===ex.exerciseId)?.name||ex.exerciseId;
    ex.sets.forEach(st=>{
      if(st.weight>800)warnings.push(`${name}: ${st.weight} ${wUnit(s.units)} seems extremely high`);
      if(st.reps>100)warnings.push(`${name}: ${st.reps} reps seems high`);
    });
  });
  // Duplicate check
  const dupes=s.workouts.filter(wk=>wk.date===w.date&&wk.exercises.map(e=>e.exerciseId).sort().join(",")===w.exercises.map(e=>e.exerciseId).sort().join(","));
  if(dupes.length>0)warnings.push("You already logged a similar workout today");
  return warnings;
}
function validateNutrition(n){
  const w=[];
  if(n.cal>8000)w.push(`${n.cal} calories seems extremely high`);
  if(n.protein>500)w.push(`${n.protein}g protein seems very high`);
  return w;
}
function validateBody(b,s){
  const w=[];
  const last=s.body[0];
  if(last&&b.weight>0&&Math.abs(b.weight-last.weight)>20)
    w.push(`Weight change of ${Math.abs(b.weight-last.weight).toFixed(1)} ${wUnit(s.units)} from last entry`);
  return w;
}

// ─── #5 Searchable Exercise Picker ───
function ExercisePicker({exercises,value,onChange,catFilter,setCatFilter,todayType}){
  const [search,setSearch]=useState("");
  const cats=["All",...new Set(exercises.map(e=>e.cat))];
  const recent=LS.get("ft-recent-exercises")||[];
  // Split-to-category mapping for suggestions
  const splitCats={Push:["Chest","Shoulders","Triceps"],Pull:["Back","Biceps"],Legs:["Legs","Glutes"],
    "Upper Power":["Chest","Back","Shoulders"],"Lower Power":["Legs","Glutes"],"Upper Hyper":["Chest","Back","Biceps","Triceps"],
    "Lower Hyper":["Legs","Glutes"],Chest:["Chest"],Back:["Back"],Shoulders:["Shoulders"],Arms:["Biceps","Triceps"]};
  const filtered=useMemo(()=>{
    let list=exercises;
    if(catFilter&&catFilter!=="All")list=list.filter(e=>e.cat===catFilter);
    if(search)list=list.filter(e=>e.name.toLowerCase().includes(search.toLowerCase()));
    // Pin schedule-suggested then recent to top
    if(!search&&(!catFilter||catFilter==="All")){
      const sugCats=todayType?splitCats[todayType]:null;
      const sugExs=sugCats?list.filter(e=>sugCats.includes(e.cat)):[];
      const recentExs=recent.map(id=>exercises.find(e=>e.id===id)).filter(Boolean);
      const pinned=[...sugExs,...recentExs.filter(e=>!sugExs.some(s2=>s2.id===e.id))];
      const rest=list.filter(e=>!pinned.some(p=>p.id===e.id));
      list=[...pinned,...rest];
    }
    return list.slice(0,30);
  },[exercises,catFilter,search,recent,todayType]);

  const select=(id)=>{
    onChange(id);
    // Track recent
    const r=[id,...(recent||[]).filter(r2=>r2!==id)].slice(0,5);
    LS.set("ft-recent-exercises",r);
  };

  return(
    <div>
      <div style={{position:"relative",marginBottom:8}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}>{Icons.search({size:14,color:V.text3})}</div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search exercises..."
          aria-label="Search exercises"
          style={{width:"100%",padding:"10px 14px 10px 34px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
            borderRadius:10,color:V.text,fontSize:13,outline:"none",boxSizing:"border-box",minHeight:40,fontFamily:V.font}}/>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}} role="tablist">
        {cats.map(c=><Chip key={c} label={c} active={(catFilter||"All")===c} onClick={()=>setCatFilter(c==="All"?null:c)}/>)}
      </div>
      <div style={{maxHeight:200,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {filtered.map(ex=>(
          <button key={ex.id} onClick={()=>select(ex.id)} aria-label={`Add ${ex.name}`}
            style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 10px",background:value===ex.id?`${V.accent}10`:"transparent",
              border:"none",borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:value===ex.id?V.accent:V.text,fontWeight:value===ex.id?700:400}}>{ex.name}</div>
              <div style={{fontSize:9,color:V.text3}}>{ex.cat}{recent.includes(ex.id)?" · Recent":""}{todayType&&splitCats[todayType]?.includes(ex.cat)&&!recent.includes(ex.id)?" · Today's split":""}</div>
            </div>
            {ex.yt&&<span style={{fontSize:8,color:V.text3}}>📹</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// #2: Rest timer auto-start controller
const RestTimerCtrl={_cb:null,register:(cb)=>{RestTimerCtrl._cb=cb;},trigger:()=>{if(RestTimerCtrl._cb)RestTimerCtrl._cb();}};

function RestTimer(){
  const [active,setActive]=useState(false);
  const [secs,setSecs]=useState(90);
  const [rem,setRem]=useState(90);
  const [autoStart,setAutoStart]=useState(LS.get("ft-auto-rest")!==false);
  const iRef=useRef(null);
  const start=()=>{setRem(secs);setActive(true);};
  const stop=()=>{setActive(false);clearInterval(iRef.current);};
  // Register auto-start callback
  useEffect(()=>{RestTimerCtrl.register(()=>{if(autoStart&&!active){setRem(secs);setActive(true);}});},[autoStart,active,secs]);
  useEffect(()=>{
    if(active&&rem>0){
      iRef.current=setInterval(()=>setRem(r=>{if(r<=1){setActive(false);Haptic.heavy();return 0;}return r-1;}),1000);
      return()=>clearInterval(iRef.current);
    }
  },[active,rem]);
  const pct=active?(rem/secs)*100:100;
  return(
    <div style={{padding:"8px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{position:"relative",width:48,height:48}}>
          <svg width={48} height={48} style={{transform:"rotate(-90deg)"}}>
            <circle cx={24} cy={24} r={20} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={3}/>
            <circle cx={24} cy={24} r={20} fill="none" stroke={rem===0?"#ff6b6b":V.accent} strokeWidth={3}
              strokeDasharray={`${pct*1.257} ${125.7}`} strokeLinecap="round" style={{transition:"stroke-dasharray .3s"}}/>
          </svg>
          <span style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:700,color:rem===0?V.danger:V.text,fontFamily:V.mono}}>{fmtTimer(active?rem:secs)}</span>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {[60,90,120,180].map(s=>(
            <button key={s} onClick={()=>{setSecs(s);if(!active)setRem(s);}}
              style={{padding:"6px 10px",borderRadius:8,border:"none",fontSize:10,fontWeight:700,fontFamily:V.font,
                background:secs===s?`${V.accent}15`:"rgba(255,255,255,0.04)",color:secs===s?V.accent:V.text3,
                cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>{s}s</button>
          ))}
        </div>
        <button onClick={active?stop:start} style={{marginLeft:"auto",width:40,height:40,borderRadius:12,border:"none",
          background:active?"rgba(255,107,107,0.15)":`${V.accent}15`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          WebkitTapHighlightColor:"transparent"}}>
          {active?Icons.pause({size:16,color:V.danger}):Icons.play({size:16,color:V.accent})}
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
        {rem===0&&!active&&<div style={{fontSize:12,fontWeight:700,color:V.danger}}>REST COMPLETE — GO!</div>}
        <button onClick={()=>{const nv=!autoStart;setAutoStart(nv);LS.set("ft-auto-rest",nv);SuccessToastCtrl.show(nv?"Auto-start ON":"Auto-start OFF");}}
          style={{marginLeft:"auto",padding:"3px 8px",borderRadius:5,background:autoStart?`${V.accent}10`:"rgba(255,255,255,0.03)",
            border:`1px solid ${autoStart?V.accent+"20":V.cardBorder}`,cursor:"pointer",
            fontSize:8,fontWeight:600,color:autoStart?V.accent:V.text3,fontFamily:V.font}}>AUTO {autoStart?"ON":"OFF"}</button>
      </div>
    </div>
  );
}

// ─── Food Search ───
function FoodSearch({onAdd}){
  const [q,setQ]=useState("");
  const [dq,setDq]=useState("");
  const [cat,setCat]=useState("All");
  const [qty,setQty]=useState({});
  const [showCustom,setShowCustom]=useState(false);
  const [custom,setCustom]=useState({name:"",cal:"",protein:"",carbs:"",fat:""});
  // #6 Debounce search
  useEffect(()=>{const t=setTimeout(()=>setDq(q),150);return()=>clearTimeout(t);},[q]);
  const results=useMemo(()=>{
    if(!dq&&cat==="All")return FOODS.slice(0,20);
    return FOODS.filter(f=>{const mc=cat==="All"||f.cat===cat;const mq=!dq||f.n.toLowerCase().includes(dq.toLowerCase());return mc&&mq;}).slice(0,30);
  },[dq,cat]);
  const addItem=(food)=>{
    const m=parseFloat(qty[food.n])||1;
    onAdd({name:food.n,cal:Math.round(food.cal*m),protein:Math.round(food.p*m),carbs:Math.round(food.c*m),fat:Math.round(food.f*m)});
    setQty(r=>({...r,[food.n]:""}));
    // Save to recent foods
    const recent=LS.get("ft-recent-foods")||[];
    const updated=[food.n,...recent.filter(n=>n!==food.n)].slice(0,12);
    LS.set("ft-recent-foods",updated);
  };
  const recentFoods=(LS.get("ft-recent-foods")||[]).map(name=>FOODS.find(f=>f.n===name)).filter(Boolean);
  const addCustomFood=()=>{
    if(!custom.name.trim()||!custom.cal)return;
    onAdd({name:custom.name.trim(),cal:parseInt(custom.cal)||0,protein:parseInt(custom.protein)||0,
      carbs:parseInt(custom.carbs)||0,fat:parseInt(custom.fat)||0});
    // Save custom to recent
    const recent=LS.get("ft-recent-foods")||[];
    LS.set("ft-recent-foods",[custom.name.trim(),...recent.filter(n=>n!==custom.name.trim())].slice(0,12));
    setCustom({name:"",cal:"",protein:"",carbs:"",fat:""});setShowCustom(false);
  };
  return(
    <div>
      {/* Recent foods quick-add */}
      {recentFoods.length>0&&!q&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,marginBottom:6}}>RECENT</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {recentFoods.slice(0,8).map((food,i)=>(
              <button key={i} onClick={()=>addItem(food)} style={{padding:"6px 10px",borderRadius:8,
                background:`${V.accent}08`,border:`1px solid ${V.accent}15`,cursor:"pointer",
                fontSize:11,color:V.text,fontFamily:V.font,display:"flex",alignItems:"center",gap:4}}>
                <span>{food.n.split("(")[0].trim()}</span>
                <span style={{fontSize:9,color:V.accent,fontWeight:700}}>{food.cal}</span>
              </button>
            ))}
          </div>
        </div>
      )}
      <div style={{position:"relative",marginBottom:10}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}>{Icons.search({size:16,color:V.text3})}</div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search 500+ foods..."
          style={{width:"100%",padding:"12px 14px 12px 38px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
            borderRadius:12,color:V.text,fontSize:14,outline:"none",boxSizing:"border-box",minHeight:44,fontFamily:V.font}}/>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
        {FOOD_CATS.map(c=><Chip key={c} label={c} active={cat===c} onClick={()=>setCat(c)}/>)}
      </div>
      <div style={{maxHeight:220,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {results.map((food,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:V.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{food.n}</div>
              <div style={{fontSize:10,color:V.text3,fontFamily:V.mono}}>
                <span style={{color:V.warn}}>{food.cal}</span> · <span style={{color:V.accent}}>{food.p}P</span> · <span style={{color:V.accent2}}>{food.c}C</span> · <span style={{color:V.warn}}>{food.f}F</span>
              </div>
            </div>
            <input type="number" inputMode="decimal" value={qty[food.n]||""} onChange={e=>setQty(q2=>({...q2,[food.n]:e.target.value}))}
              placeholder="1" step="0.5" style={{width:44,padding:"6px 4px",background:"rgba(255,255,255,0.04)",
                border:`1px solid ${V.cardBorder}`,borderRadius:8,color:V.text,fontSize:12,fontFamily:V.mono,textAlign:"center",outline:"none"}}/>
            <button onClick={()=>addItem(food)} style={{width:36,height:36,borderRadius:10,background:`${V.accent}15`,
              border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}}>
              {Icons.plus({size:14,color:V.accent})}</button>
          </div>
        ))}
        {results.length===0&&<div style={{textAlign:"center",padding:16,color:V.text3,fontSize:12}}>No results for "{q}"</div>}
      </div>
      {/* Custom food entry */}
      {!showCustom?(
        <button onClick={()=>setShowCustom(true)} style={{width:"100%",padding:"10px",marginTop:8,
          background:"rgba(255,255,255,0.02)",border:`1px dashed ${V.cardBorder}`,borderRadius:10,
          cursor:"pointer",fontSize:11,color:V.accent,fontWeight:600,fontFamily:V.font,
          WebkitTapHighlightColor:"transparent"}}>
          + Add Custom Food
        </button>
      ):(
        <div style={{marginTop:8,padding:10,background:"rgba(255,255,255,0.02)",borderRadius:10,border:`1px solid ${V.cardBorder}`}}>
          <div style={{fontSize:11,fontWeight:700,color:V.text,marginBottom:6}}>Custom Food Entry</div>
          <input value={custom.name} onChange={e=>setCustom(c=>({...c,name:e.target.value}))} placeholder="Food name *"
            style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
              borderRadius:8,color:V.text,fontSize:12,outline:"none",marginBottom:6,boxSizing:"border-box",fontFamily:V.font}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:8}}>
            {[{k:"cal",l:"Cal",u:""},{k:"protein",l:"Prot",u:"g"},{k:"carbs",l:"Carb",u:"g"},{k:"fat",l:"Fat",u:"g"}].map(f=>(
              <div key={f.k}>
                <div style={{fontSize:8,color:V.text3,fontWeight:600,marginBottom:2}}>{f.l}</div>
                <input type="number" inputMode="numeric" value={custom[f.k]} onChange={e=>setCustom(c=>({...c,[f.k]:e.target.value}))}
                  placeholder="0" style={{width:"100%",padding:"6px 4px",background:"rgba(255,255,255,0.04)",
                    border:`1px solid ${V.cardBorder}`,borderRadius:6,color:V.text,fontSize:11,fontFamily:V.mono,
                    textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setShowCustom(false)} style={{flex:1,padding:"7px",borderRadius:8,
              background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,cursor:"pointer",
              fontSize:10,color:V.text3,fontFamily:V.font}}>Cancel</button>
            <button onClick={addCustomFood} disabled={!custom.name.trim()||!custom.cal}
              style={{flex:1,padding:"7px",borderRadius:8,background:V.accent,border:"none",cursor:"pointer",
                fontSize:10,fontWeight:700,color:V.bg,fontFamily:V.font,
                opacity:(!custom.name.trim()||!custom.cal)?0.4:1}}>Add Food</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Barcode Scanner ───
function BarcodeScanner({onResult,onClose}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const [status,setStatus]=useState("init"); // init, scanning, loading, found, error, unsupported
  const [product,setProduct]=useState(null);
  const [manualCode,setManualCode]=useState("");
  const scanningRef=useRef(false);

  const stopCam=useCallback(()=>{
    scanningRef.current=false;
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
  },[]);

  const lookupBarcode=useCallback(async(code)=>{
    setStatus("loading");
    try{
      const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
      const data=await res.json();
      if(data.status===1&&data.product){
        const p=data.product;
        const n=p.nutriments||{};
        const name=p.product_name||p.product_name_en||"Unknown Product";
        const serving=p.serving_quantity||100;
        const prod={
          name:name.length>40?name.slice(0,37)+"...":name,
          brand:p.brands||"",
          cal:Math.round(n["energy-kcal_serving"]||n["energy-kcal_100g"]||0),
          protein:Math.round(n.proteins_serving||n.proteins_100g||0),
          carbs:Math.round(n.carbohydrates_serving||n.carbohydrates_100g||0),
          fat:Math.round(n.fat_serving||n.fat_100g||0),
          fiber:Math.round(n.fiber_serving||n.fiber_100g||0),
          serving:p.serving_size||`${serving}g`,
          barcode:code,
          image:p.image_small_url||null,
        };
        setProduct(prod);setStatus("found");
      }else{setStatus("error");}
    }catch(e){setStatus("error");}
  },[]);

  const startCam=useCallback(async()=>{
    if(!navigator.mediaDevices?.getUserMedia){setStatus("unsupported");return;}
    try{
      // Try rear camera, fallback to any camera
      let stream;
      try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}});}
      catch(e1){try{stream=await navigator.mediaDevices.getUserMedia({video:true});}
        catch(e2){setStatus("unsupported");return;}}
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.setAttribute("playsinline","true");await videoRef.current.play().catch(()=>{});}
      setStatus("scanning");scanningRef.current=true;
      // Use BarcodeDetector if available (Chrome Android), otherwise camera stays open for visual ref

// ─── Hooks ───
function useStreak(workouts){
  return useMemo(()=>{
    let streak=0;const d=new Date();
    if(!workouts.find(w=>w.date===today()))d.setDate(d.getDate()-1);
    while(true){const ds=d.toISOString().split("T")[0];
      if(workouts.find(w=>w.date===ds)){streak++;d.setDate(d.getDate()-1);}else break;}
    return streak;
  },[workouts]);
}
function usePRs(workouts,exercises){
  return useMemo(()=>{
    const prs={};
    workouts.forEach(w=>w.exercises.forEach(ex=>{
      const name=exercises.find(e=>e.id===ex.exerciseId)?.name||ex.exerciseId;
      ex.sets.forEach(s=>{const e1rm=calc1RM(s.weight,s.reps);
        if(s.weight>0&&(!prs[ex.exerciseId]||e1rm>prs[ex.exerciseId].e1rm))
          prs[ex.exerciseId]={weight:s.weight,reps:s.reps,e1rm,date:w.date,name};
      });
    }));
    return prs;
  },[workouts,exercises]);
}

// ─── Find last sets for an exercise (for auto-fill) ───
function findLastSets(exerciseId,workouts){
  for(const w of workouts){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets.length>0){
      return ex.sets.map(st=>({weight:st.weight.toString(),reps:st.reps.toString(),rpe:st.rpe?st.rpe.toString():"",done:true}));
    }
  }
  return null;
}

// ─── Readiness Score Engine ───
function calcReadiness(s){
  const td=today();
  const checkin=(s.checkins||[]).find(c=>c.date===td);
  const tn=s.nutrition.find(n=>n.date===td)||s.nutrition.find(n=>n.date===ago(1));
  const lastW=s.workouts[0]; // most recent workout
  const recentW=s.workouts.filter(w=>w.date>=ago(7));
  const prevWeekW=s.workouts.filter(w=>w.date>=ago(14)&&w.date<ago(7));

  let score=50; // baseline
  const factors=[];

  // 1. Sleep quality (0-25 pts) — from nutrition log or check-in
  const sleep=checkin?.sleep||tn?.sleep||0;
  if(sleep>0){
    if(sleep>=7.5){score+=25;factors.push({label:"Great sleep",val:`${sleep.toFixed(1)}h`,color:V.accent,pts:25});}
    else if(sleep>=6.5){score+=18;factors.push({label:"Decent sleep",val:`${sleep.toFixed(1)}h`,color:V.warn,pts:18});}
    else if(sleep>=5){score+=8;factors.push({label:"Low sleep",val:`${sleep.toFixed(1)}h`,color:V.danger,pts:8});}
    else{score+=0;factors.push({label:"Poor sleep",val:`${sleep.toFixed(1)}h`,color:V.danger,pts:0});}
  }

  // 2. Recovery time (0-15 pts) — days since last workout
  if(lastW){
    const daysSince=Math.floor((new Date(td)-new Date(lastW.date))/(86400000));
    if(daysSince===0){score+=5;factors.push({label:"Trained today",val:"0d rest",color:V.text3,pts:5});}
    else if(daysSince===1){score+=12;factors.push({label:"1 day rest",val:"Fresh",color:V.accent,pts:12});}
    else if(daysSince===2){score+=15;factors.push({label:"2 days rest",val:"Recovered",color:V.accent,pts:15});}
    else if(daysSince<=4){score+=10;factors.push({label:`${daysSince}d rest`,val:"Rested",color:V.accent2,pts:10});}
    else{score+=5;factors.push({label:`${daysSince}d rest`,val:"Detraining",color:V.warn,pts:5});}
  }

  // 3. Last workout intensity (0-10 pts) — lower intensity = more recovery
  if(lastW){
    const avgRPE=lastW.exercises.reduce((sum,ex)=>{
      const rpes=ex.sets.filter(st=>st.rpe).map(st=>st.rpe);
      return sum+(rpes.length?rpes.reduce((a,b)=>a+b,0)/rpes.length:7);
    },0)/(lastW.exercises.length||1);
    if(avgRPE<=7){score+=10;factors.push({label:"Low last intensity",val:`RPE ${avgRPE.toFixed(1)}`,color:V.accent,pts:10});}
    else if(avgRPE<=8.5){score+=6;factors.push({label:"Moderate intensity",val:`RPE ${avgRPE.toFixed(1)}`,color:V.warn,pts:6});}
    else{score+=2;factors.push({label:"High last intensity",val:`RPE ${avgRPE.toFixed(1)}`,color:V.danger,pts:2});}
  }

  // 4. Training volume trend (-10 to +10) — overreaching detection
  if(recentW.length>0&&prevWeekW.length>0){
    const thisVol=recentW.reduce((s2,w)=>s2+w.exercises.reduce((es,ex)=>es+ex.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0),0);
    const lastVol=prevWeekW.reduce((s2,w)=>s2+w.exercises.reduce((es,ex)=>es+ex.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0),0);
    const ratio=lastVol>0?thisVol/lastVol:1;
    if(ratio>1.3){score-=10;factors.push({label:"Volume spike",val:`+${Math.round((ratio-1)*100)}%`,color:V.danger,pts:-10});}
    else if(ratio>1.1){score-=3;factors.push({label:"Volume up",val:`+${Math.round((ratio-1)*100)}%`,color:V.warn,pts:-3});}
    else if(ratio>=0.8){score+=5;factors.push({label:"Steady volume",val:"Balanced",color:V.accent,pts:5});}
    else{score+=0;factors.push({label:"Low volume",val:`${Math.round((ratio-1)*100)}%`,color:V.text3,pts:0});}
  }

  // 5. Self-report from check-in (0-20 pts)
  if(checkin){
    const avg=(checkin.soreness+checkin.energy+checkin.motivation)/3;
    const pts=Math.round(avg*4); // 1-5 scale → 4-20 pts
    score+=pts;
    const labels=["","Rough","Fair","Okay","Good","Excellent"];
    factors.push({label:"Self-report",val:labels[Math.round(avg)]||"--",color:avg>=4?V.accent:avg>=3?V.warn:V.danger,pts});
  }

  // 6. Nutrition adherence (+5 bonus)
  if(tn&&s.goals){
    const protPct=tn.protein/s.goals.protein;
    if(protPct>=0.8){score+=5;factors.push({label:"Protein on track",val:`${Math.round(protPct*100)}%`,color:V.accent,pts:5});}
  }

  score=Math.max(0,Math.min(100,score));

  // Determine readiness level + recommendation
  let level,color,rec;
  if(score>=80){level="Peak";color=V.accent;rec="Full intensity. Push for PRs.";}
  else if(score>=60){level="Ready";color=V.accent2;rec="Normal training. Follow your program.";}
  else if(score>=40){level="Moderate";color=V.warn;rec="Reduce volume 15-20%. Focus on technique.";}
  else if(score>=25){level="Fatigued";color="#f97316";rec="Light session or active recovery.";}
  else{level="Rest";color=V.danger;rec="Take a rest day. Recovery is gains.";}

  return{score:Math.round(score),level,color,rec,factors,hasCheckin:!!checkin};
}

                  padding:"4px 10px",borderRadius:8,background:`${V.accent}12`,border:`1px solid ${V.accent}25`,

                  fontSize:10,fontWeight:700,color:V.accent,fontFamily:V.font
                }}>Check in</button>

              const w2=80,h2=20;
              const path=pts.map((p,i)=>`${i===0?"M":"L"}${(i/(pts.length-1))*w2},${h2-((p-min)/range)*h2}`).join(" ");

                    <path d={path} fill="none" stroke={r.color} strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                  <span style={{fontSize:8,color:trendColor,fontWeight:700}}>{trending} 7d</span>
                </div>
              );
            })()}
          </div>
        </div>
      </Card>

      {showCheckin&&<CheckinModal s={s} d={d} onClose={()=>setShowCheckin(false)}/>}
    </div>
  );
}

// ─── Readiness Trend (Track Hub) ───
function ReadinessTrend({s}){
  const data=useMemo(()=>{
    const days=[];
    for(let i=13;i>=0;i--){
      const d=ago(i);
      const checkin=(s.checkins||[]).find(c=>c.date===d);
      const tn=s.nutrition.find(n=>n.date===d);
      // Simplified readiness for historical (no self-report for past days without checkin)
      let score=50;
      const sleep=checkin?.sleep||tn?.sleep||0;
      if(sleep>=7.5)score+=25;else if(sleep>=6.5)score+=18;else if(sleep>=5)score+=8;
      if(checkin){
        const avg=(checkin.soreness+checkin.energy+checkin.motivation)/3;
        score+=Math.round(avg*4);
      }
      const wThatDay=s.workouts.find(w=>w.date===d);
      if(wThatDay)score+=5;
      days.push({date:fmtShort(d),score:Math.min(100,Math.max(0,score)),hasCheckin:!!checkin});
    }
    return days;
  },[s.checkins,s.nutrition,s.workouts]);

  const checkinHistory=(s.checkins||[]).slice(0,10);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{fontSize:16,fontWeight:800,color:V.text}}>Readiness Trend</div>

      {data.length>0&&(
        <Card style={{padding:14}}>
          <div style={{fontSize:12,color:V.text3,fontWeight:600,marginBottom:10}}>Last 14 Days</div>
          <div style={{height:120}}>
            <Recharts.ResponsiveContainer width="100%" height="100%">
              <Recharts.AreaChart data={data}>
                <Recharts.XAxis dataKey="date" tick={{fontSize:8,fill:V.text3}} tickLine={false} axisLine={false}/>
                <Recharts.YAxis domain={[0,100]} tick={{fontSize:8,fill:V.text3}} tickLine={false} axisLine={false} width={25}/>
                <Recharts.Area type="monotone" dataKey="score" stroke={V.accent} fill={`${V.accent}20`} strokeWidth={2}/>
                <ReferenceLine y={60} stroke={V.warn} strokeDasharray="3 3" strokeOpacity={0.4}/>
              </Recharts.AreaChart>
            </Recharts.ResponsiveContainer>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:6}}>
            <span style={{fontSize:9,color:V.text3}}>Above 60 = ready to train</span>
            <span style={{fontSize:9,color:V.warn}}>- - threshold</span>
          </div>
        </Card>
      )}

      {/* Check-in history */}
      <div style={{fontSize:13,fontWeight:700,color:V.text}}>Recent Check-ins</div>
      {checkinHistory.length===0?(
        <Card style={{padding:16,textAlign:"center"}}>
          <div style={{fontSize:12,color:V.text3}}>No check-ins yet. Log your first from the Home page.</div>
        </Card>
      ):checkinHistory.map(c=>(
        <Card key={c.date} style={{padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:700,color:V.text}}>{fmtShort(c.date)}</span>
            {c.sleep>0&&<span style={{fontSize:10,color:V.purple,fontFamily:V.mono}}>{Icons.moon({size:10,color:V.purple})} {(parseFloat(c.sleep)||0).toFixed(1)}h</span>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{l:"Soreness",v:c.soreness,c2:c.soreness>=4?V.accent:c.soreness>=3?V.warn:V.danger},
              {l:"Energy",v:c.energy,c2:c.energy>=4?V.accent:c.energy>=3?V.warn:V.danger},
              {l:"Motivation",v:c.motivation,c2:c.motivation>=4?V.accent:c.motivation>=3?V.warn:V.danger}
            ].map(m=>(
              <div key={m.l} style={{flex:1,textAlign:"center",padding:"6px 0",borderRadius:8,background:`${m.c2}08`}}>
                <div style={{fontSize:16,fontWeight:800,color:m.c2,fontFamily:V.mono}}>{m.v}</div>
                <div style={{fontSize:8,color:V.text3,fontWeight:600}}>{m.l}</div>
              </div>
            ))}
          </div>
          {c.notes&&<div style={{fontSize:10,color:V.text3,marginTop:6,fontStyle:"italic"}}>{c.notes}</div>}
        </Card>
      ))}
    </div>
  );
}

function HomeTab({s,d}){
  const [shareCard,setShareCard]=useState(false);
  const td=today();
  const streak=useStreak(s.workouts);
  const prs=usePRs(s.workouts,s.exercises);
  const tn=s.nutrition.find(n=>n.date===td);
  const todayW=s.workouts.find(w=>w.date===td);
  const ww=s.workouts.filter(w=>w.date>=ago(7)).length;
  const vol=s.workouts.filter(w=>w.date>=ago(7)).reduce((sum,w)=>sum+w.exercises.reduce((es,ex)=>es+ex.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0),0);
  const dow=new Date().getDay();
  const todayType=s.schedule.overrides[td]||s.schedule.weekly[dow]||"Rest";
  const u=wUnit(s.units);
  const hr=new Date().getHours();
  const greeting=hr<12?"Good morning":hr<17?"Good afternoon":"Good evening";
  const displayName=s.profile?.nickname||s.profile?.firstName||"";
  const latestBW=s.body.find(b=>b.weight)?.weight;


  const strengthData=useMemo(()=>{
    const map={};
    s.workouts.filter(w=>w.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{
      w.exercises.forEach(ex=>{
        if(["bench","squat","deadlift"].includes(ex.exerciseId)){
          const mx=Math.max(...ex.sets.map(st=>st.weight));
          if(!map[w.date])map[w.date]={date:fmtShort(w.date)};
          map[w.date][ex.exerciseId]=mx;
        }
      });
    });
    return Object.values(map);
  },[s.workouts,s.range]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:4}}>

      {/* Hero: Greeting + Today + Streak */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:12,color:V.text3}}>{greeting}{displayName?`, ${displayName}`:""}</div>
            {LS.get("ft-last-sync")&&<div style={{fontSize:9,color:V.text3,marginTop:2,display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:6,height:6,borderRadius:3,background:V.accent}}/>
              Synced {(()=>{const d2=new Date(LS.get("ft-last-sync"));const m=Math.round((Date.now()-d2)/60000);return m<1?"just now":m<60?`${m}m ago`:m<1440?`${Math.round(m/60)}h ago`:`${Math.round(m/1440)}d ago`;})()}
            </div>}
            <SyncStatus s={s}/>
          </div>
          <div style={{fontSize:20,fontWeight:800,color:V.text,lineHeight:1.2}}>
            {todayType==="Rest"?"Recovery Day":`${todayType} Day`}
          </div>
        </div>
        {streak>0&&(
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,
            background:"rgba(255,159,67,0.1)",border:"1px solid rgba(255,159,67,0.12)"}}>
            {Icons.flame({size:14,color:V.warn})}
            <span style={{fontSize:15,fontWeight:800,color:V.warn,fontFamily:V.mono}}>{streak}</span>
            {(()=>{
              // Calculate longest streak ever
              let best=0,cur=0;
              const dates=[...new Set(s.workouts.map(w=>w.date))].sort();
              for(let i=0;i<dates.length;i++){
                if(i===0||(new Date(dates[i])-new Date(dates[i-1]))/(86400000)<=1.5)cur++;
                else cur=1;
                if(cur>best)best=cur;
              }
              if(streak>=best&&streak>=7)return <span style={{fontSize:9,color:V.warn,marginLeft:2}}>🏆 Personal best!</span>;
              if(best>streak)return <span style={{fontSize:9,color:V.text3,marginLeft:2}}>{best-streak} to beat your record ({best})</span>;
              return null;
            })()}
          </div>
        )}
      </div>

      {/* #3: Next workout countdown */}

        if(todayType!=="Rest"&&todayType!=="Off"&&!todayW){
          const hoursLeft=23-hr;
          return(

              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,color:V.text2}}>{todayType} day — <span style={{fontWeight:700,color:hoursLeft<=4?V.danger:V.accent}}>{hoursLeft}h left</span></div>

                background:V.accent,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,color:V.bg}}>GO</button>

          );
        }

                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:9,color:m.c,fontWeight:700}}>{m.l}</span>
                  <span style={{fontSize:9,color:V.text3,fontFamily:V.mono}}>{m.v}/{m.g}</span>
                </div>
                <Progress val={m.v} max={m.g} color={m.c} h={4}/>
              </div>
            ))}
          </div>
          {(tn.water>0||tn.sleep>0)&&(
            <div style={{display:"flex",alignItems:"center",gap:14,marginTop:8}}>
              {tn.water>0&&<div style={{display:"flex",alignItems:"center",gap:4}}>
                {Icons.droplet({size:11,color:V.accent2})}<span style={{fontSize:11,color:V.accent2,fontFamily:V.mono,fontWeight:600}}>{tn.water}/8</span>
              </div>}
              {tn.sleep>0&&<div style={{display:"flex",alignItems:"center",gap:4}}>
                {Icons.moon({size:11,color:V.purple})}<span style={{fontSize:11,color:V.purple,fontFamily:V.mono,fontWeight:600}}>{(parseFloat(tn.sleep)||0).toFixed(1)}h</span>
              </div>}
            </div>
          )}
        </Card>
      ) : (
        <button onClick={()=>d({type:"TAB",tab:"log_nutrition"})} style={{
          display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"14px",
          background:V.card,border:`1px solid ${V.cardBorder}`,borderRadius:14,
          cursor:"pointer",WebkitTapHighlightColor:"transparent"
        }}>
          {Icons.fork({size:14,color:V.warn})}
          <span style={{fontSize:12,color:V.warn,fontWeight:600}}>Log today's nutrition</span>
        </button>
      )}

      {/* Today's Workout — only if completed */}
      {todayW&&(
        <Card glow style={{padding:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:shareCard?10:0}}>
            {Icons.check({size:14,color:V.accent})}
            <span style={{fontSize:12,color:V.accent,fontWeight:700}}>Workout Complete</span>
            <span style={{flex:1}}/>
            <span style={{fontSize:10,color:V.text3}}>{todayW.exercises.reduce((n,e)=>n+e.sets.length,0)}s · {todayW.dur}m</span>
            {todayW.rating&&<span style={{fontSize:9,color:V.warn}}>{"★".repeat(todayW.rating)}</span>}
            <button onClick={()=>setShareCard(!shareCard)} style={{marginLeft:4,padding:"3px 8px",borderRadius:6,
              background:`${V.accent}12`,border:"none",cursor:"pointer",fontSize:9,color:V.accent,fontWeight:700}}>
              {shareCard?"Hide":"Share"}
            </button>
          </div>
          {shareCard&&<WorkoutCard workout={todayW} s={s}/>}
        </Card>
      )}

      {/* Strength Chart — compact */}
      {strengthData.length>1&&(
        <Card style={{padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,color:V.text3,fontWeight:600}}>Strength</span>
            <div style={{display:"flex",gap:6}}>
              {[{c:V.accent,l:"B"},{c:V.accent2,l:"S"},{c:V.purple,l:"D"}].map(e=>(
                <span key={e.l} style={{fontSize:8,color:e.c,display:"flex",alignItems:"center",gap:2,fontWeight:700}}>
                  <span style={{width:5,height:2.5,background:e.c,borderRadius:1}}/>{e.l}</span>
              ))}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={120}>
            <LineChart data={strengthData}>
              <CartesianGrid {...chartCfg.grid} vertical={false}/>
              <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
              <YAxis {...chartCfg.axis} width={28}/>
              <Tooltip {...chartCfg.tip}/>
              <Line type="monotone" dataKey="bench" stroke={V.accent} strokeWidth={1.5} dot={{r:2}} connectNulls/>
              <Line type="monotone" dataKey="squat" stroke={V.accent2} strokeWidth={1.5} dot={{r:2}} connectNulls/>
              <Line type="monotone" dataKey="deadlift" stroke={V.purple} strokeWidth={1.5} dot={{r:2}} connectNulls/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
      )}

      {/* PR Wall — top 3 only, inline */}
      {Object.keys(prs).length>0&&(
        <Card style={{padding:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              {Icons.trophy({size:13,color:V.warn})}
              <span style={{fontSize:12,color:V.text3,fontWeight:600}}>Top PRs</span>
            </div>
            <button onClick={()=>d({type:"TAB",tab:"track_workouts"})} style={{background:"none",border:"none",cursor:"pointer",
              fontSize:10,color:V.accent,fontWeight:600,WebkitTapHighlightColor:"transparent"}}>All</button>
          </div>
          {Object.entries(prs).sort((a,b)=>b[1].e1rm-a[1].e1rm).slice(0,3).map(([id,pr])=>(
            <div key={id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
              <span style={{fontSize:11,color:V.text}}>{pr.name}</span>
              <span style={{fontSize:12,color:V.accent,fontFamily:V.mono,fontWeight:700}}>{pr.weight}×{pr.reps}</span>
            </div>
          ))}
        </Card>
      )}

      {/* Recent — 2 workouts, compact rows */}
      {s.workouts.length>0&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,color:V.text3,fontWeight:600}}>Recent</span>
            <button onClick={()=>d({type:"TAB",tab:"track_workouts"})} style={{background:"none",border:"none",cursor:"pointer",
              fontSize:10,color:V.accent,fontWeight:600,WebkitTapHighlightColor:"transparent"}}>All</button>
          </div>
          {s.workouts.slice(0,2).map(w=>{
            const names=w.exercises.map(e=>s.exercises.find(x=>x.id===e.exerciseId)?.name||e.exerciseId);
            const sets=w.exercises.reduce((n,e)=>n+e.sets.length,0);
            return(
              <div key={w.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",marginBottom:6,
                background:V.card,border:`1px solid ${V.cardBorder}`,borderRadius:12}}>
                <div style={{width:32,height:32,borderRadius:9,background:`${V.accent}10`,
                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {Icons.dumbbell({size:14,color:V.accent})}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:V.text,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{names.join(", ")}</div>
                  <div style={{fontSize:10,color:V.text3,marginTop:1}}>{fmtShort(w.date)} · {sets}s · {w.dur}m</div>
                </div>
                {w.rating&&<span style={{fontSize:8,color:V.warn}}>{"★".repeat(w.rating)}</span>}
              </div>
            );
          })}
        </div>
      )}

      {/* Empty State */}
      {s.workouts.length===0&&!tn&&(
        <Card style={{textAlign:"center",padding:"24px 16px"}}>
          <div style={{fontSize:32,marginBottom:8}}>💪</div>
          <div style={{fontSize:15,fontWeight:700,color:V.text,marginBottom:4}}>Ready to start?</div>
          <div style={{fontSize:11,color:V.text3,marginBottom:14}}>Log your first workout to see your dashboard come to life.</div>
          <Btn full onClick={()=>d({type:"TAB",tab:"log_workout"})}>{Icons.dumbbell({size:16,color:V.bg})} Log First Workout</Btn>
        </Card>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
//  WORKOUT TAB
// ═══════════════════════════════════════
function WorkoutTab({s,d}){
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),dur:"",exercises:[],notes:"",rating:3});
  const [selEx,setSelEx]=useState("");
  const [catFilter,setCatFilter]=useState("All");
  const [showTemplates,setShowTemplates]=useState(false);
  const [showPlates,setShowPlates]=useState(false);
  const [showAll,setShowAll]=useState(false);
  const [newPRs,setNewPRs]=useState([]);
  const [startTime,setStartTime]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [valWarnings,setValWarnings]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [expandedId,setExpandedId]=useState(null);
  const [shareWorkout,setShareWorkout]=useState(null);
  const cats=["All",...new Set(s.exercises.map(e=>e.cat))];
  const prs=usePRs(s.workouts,s.exercises);

  // #11: Crash recovery — ActiveWorkoutStore.load() was never called anywhere.
  // The IDB save path existed but the load path was missing entirely, making crash recovery write-only.
  // On mount, check for a saved workout < 4 hours old and offer to resume it.
  const [crashWorkout,setCrashWorkout]=useState(null);
  useEffect(()=>{
    if(show)return; // already in an active workout, skip
    ActiveWorkoutStore.load().then(saved=>{
      if(!saved)return;
      const age=(Date.now()-new Date(saved.savedAt||0).getTime())/1000/60; // minutes
      if(age<240)setCrashWorkout(saved); // offer restore if < 4 hours old
      else ActiveWorkoutStore.clear(); // stale — discard silently
    }).catch(()=>{});
  },[]);

  // Live workout timer
  useEffect(()=>{
    if(!startTime)return;
    const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),1000);
    return()=>clearInterval(iv);
  },[startTime]);

  const fmtElapsed=(sec)=>{const m=Math.floor(sec/60);const s2=sec%60;return`${m}:${s2<10?"0":""}${s2}`;};

  // Motivational messages
  const motivations=["Let's get it! 💪","Time to grind!","No excuses today.","Push your limits.","Stronger every rep.",
    "You showed up — that's half the battle.","Make it count.","Beast mode: ON"];
  const motiv=useMemo(()=>motivations[Math.floor(Math.random()*motivations.length)],[show]);

  const startNew=()=>{
    setForm({date:today(),dur:"",exercises:[],notes:"",rating:3});
    setNewPRs([]);setStartTime(Date.now());setElapsed(0);setShow(true);
  };

  // Start from last workout (repeat) — auto-fills exercises with last weights
  const repeatLast=()=>{
    if(s.workouts.length===0)return;
    const last=s.workouts[0];
    const exs=last.exercises.map(ex=>({
      exerciseId:ex.exerciseId,
      sets:ex.sets.map(st=>({weight:st.weight.toString(),reps:st.reps.toString(),rpe:st.rpe?st.rpe.toString():"",done:true}))
    }));
    setForm({date:today(),dur:"",exercises:exs,notes:"",rating:3});
    setNewPRs([]);setStartTime(Date.now());setElapsed(0);setShow(true);
  };

  const loadTemplate=(t)=>{
    // Pre-fill weights from last time each exercise was done
    const exs=t.exs.map(eid=>{
      const lastW=findLastSets(eid,s.workouts);
      return{exerciseId:eid,sets:lastW||[{weight:"",reps:"",rpe:"",done:true}]};
    });
    setForm(f=>({...f,exercises:exs}));
    setShowTemplates(false);setStartTime(Date.now());setElapsed(0);setShow(true);
  };

  const addEx=()=>{
    if(!selEx)return;
    Haptic.light();
    const lastW=findLastSets(selEx,s.workouts);
    // #6: Apply overload suggestion to auto-fill weights
    const sug=getOverloadSuggestion(selEx,s.workouts,s.units);
    let sets=lastW||[{weight:"",reps:"",rpe:"",done:true}];
    if(sug&&lastW){
      const sugW=parseFloat(sug.suggest.split("×")[0])||0;
      if(sugW>0)sets=sets.map(st=>({...st,weight:sugW.toString()}));
    }
    setForm(f=>({...f,exercises:[...f.exercises,{exerciseId:selEx,sets}]}));
    setSelEx("");
  };
  const addSet=(ei)=>{Haptic.light();setForm(f=>{const exs=[...f.exercises];const l=exs[ei].sets[exs[ei].sets.length-1];exs[ei]={...exs[ei],sets:[...exs[ei].sets,{weight:l.weight,reps:l.reps,rpe:l.rpe,done:true,warmup:false,drop:false,fail:false}]};const next={...f,exercises:exs};saveActiveWkt(next);return next;});};
  // I8: Persist active workout to IDB for crash recovery
  const saveActiveWkt=useCallback((f)=>{if(f.exercises?.length>0)ActiveWorkoutStore.save({...f,startTime}).catch(()=>{});},[startTime]);
  const updSet=(ei,si,k,v)=>{setForm(f=>{const exs=[...f.exercises],sets=[...exs[ei].sets];const prev=sets[si][k];sets[si]={...sets[si],[k]:v};exs[ei]={...exs[ei],sets};
    // #2: Auto-start rest timer when reps filled
    if(k==="reps"&&!prev&&v&&!sets[si].warmup)setTimeout(()=>RestTimerCtrl.trigger(),100);
    return{...f,exercises:exs};});};
  const toggleSetFlag=(ei,si,flag)=>{setForm(f=>{const exs=[...f.exercises],sets=[...exs[ei].sets];sets[si]={...sets[si],[flag]:!sets[si][flag]};exs[ei]={...exs[ei],sets};return{...f,exercises:exs};});};
  const rmSet=(ei,si)=>setForm(f=>{const exs=[...f.exercises];exs[ei]={...exs[ei],sets:exs[ei].sets.filter((_,i)=>i!==si)};return{...f,exercises:exs};});
  const rmEx=(ei)=>setForm(f=>({...f,exercises:f.exercises.filter((_,i)=>i!==ei)}));
  const updExNote=(ei,v)=>{setForm(f=>{const exs=[...f.exercises];exs[ei]={...exs[ei],note:v};return{...f,exercises:exs};});};
  // #1: Warm-up set generator
  const addWarmups=(ei)=>{
    Haptic.light();
    setForm(f=>{
      const exs=[...f.exercises];const topWeight=parseFloat(exs[ei].sets[0]?.weight)||0;
      if(topWeight<=0)return f;
      const bar=s.units==="kg"?20:45;const inc=s.units==="kg"?2.5:5;
      const warmups=[
        {weight:bar.toString(),reps:"10",rpe:"",done:true,warmup:true,drop:false,fail:false},
        {weight:Math.round(topWeight*0.5/inc)*inc+"",reps:"8",rpe:"",done:true,warmup:true,drop:false,fail:false},
        {weight:Math.round(topWeight*0.7/inc)*inc+"",reps:"5",rpe:"",done:true,warmup:true,drop:false,fail:false},
        {weight:Math.round(topWeight*0.85/inc)*inc+"",reps:"3",rpe:"",done:true,warmup:true,drop:false,fail:false},
      ].filter(w=>parseFloat(w.weight)>=bar&&parseFloat(w.weight)<topWeight);
      exs[ei]={...exs[ei],sets:[...warmups,...exs[ei].sets]};
      return{...f,exercises:exs};
    });
    SuccessToastCtrl.show("Warm-up sets added");
  };
  // #3: Superset toggle
  const toggleSuperset=(ei)=>{
    setForm(f=>{
      const exs=[...f.exercises];
      const current=exs[ei].supersetGroup||null;
      if(current){exs[ei]={...exs[ei],supersetGroup:null};}
      else{
        // Find the next exercise and link them
        const nextEi=ei+1<exs.length?ei+1:null;
        const groupId=uid().slice(0,4);
        exs[ei]={...exs[ei],supersetGroup:groupId};
        if(nextEi!==null)exs[nextEi]={...exs[nextEi],supersetGroup:groupId};
      }
      return{...f,exercises:exs};
    });
  };
  const getSupersetLabel=(ex,ei)=>{
    if(!ex.supersetGroup)return null;
    // Find position within superset group
    let pos=0;
    for(let i=0;i<=ei;i++){if(form.exercises[i].supersetGroup===ex.supersetGroup)pos++;}
    return String.fromCharCode(64+pos); // A, B, C
  };

  const buildWorkout=()=>{
    const dur=parseInt(form.dur)||Math.round(elapsed/60)||0;
    return{id:editingId||uid(),date:form.date,dur,rating:form.rating,
      exercises:form.exercises.map(e=>({exerciseId:e.exerciseId,note:e.note||"",supersetGroup:e.supersetGroup||null,
        sets:e.sets.filter(st=>!st.warmup).map(st=>({weight:parseFloat(st.weight)||0,reps:parseInt(st.reps)||0,rpe:parseFloat(st.rpe)||0,done:st.done,drop:!!st.drop,fail:!!st.fail}))})),
      notes:form.notes};
  };
  const save=()=>{
    const w=buildWorkout();
    const warnings=validateWorkout(w,s);
    if(warnings.length>0&&!valWarnings){setValWarnings(warnings);return;}
    setValWarnings(null);
    const detected=[];
