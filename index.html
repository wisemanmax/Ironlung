function SettingsTab({s,d}){
  const [goals,setGoals]=useState(s.goals);
  const [saved,setSaved]=useState(false);
  const [newEx,setNewEx]=useState("");
  const [newCat,setNewCat]=useState("Chest");
  const [newYt,setNewYt]=useState("");
  const [confirmClear,setConfirmClear]=useState(false);
  const [open,setOpen]=useState(null); // which section is expanded

  const saveGoals=()=>{
    d({type:"GOALS",g:{cal:parseInt(goals.cal)||2400,protein:parseInt(goals.protein)||180,carbs:parseInt(goals.carbs)||250,
      fat:parseInt(goals.fat)||70,goalWeight:parseInt(goals.goalWeight)||175}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const addEx=()=>{
    if(!newEx)return;
    let ytId=newYt.trim();
    if(ytId.includes("youtube.com/watch")){try{ytId=new URL(ytId).searchParams.get("v")||"";}catch(e){}}
    else if(ytId.includes("youtu.be/")){ytId=ytId.split("youtu.be/")[1]?.split(/[?&]/)[0]||"";}
    d({type:"ADD_EX",ex:{id:uid(),name:newEx,cat:newCat,...(ytId?{yt:ytId}:{})}});
    setNewEx("");setNewYt("");
  };

  const toggle=(id)=>setOpen(o=>o===id?null:id);

  const Row=({id,icon,label,desc,right,children})=>(
    <div style={{background:V.card,border:`1px solid ${V.cardBorder}`,borderRadius:14,overflow:"hidden",marginBottom:8}}>
      <button onClick={()=>toggle(id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
        width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
        <div style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,0.04)",
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {icon}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,color:V.text}}>{label}</div>
          {desc&&<div style={{fontSize:11,color:V.text3,marginTop:1}}>{desc}</div>}
        </div>
        {right||null}
        <div style={{transition:"transform .2s",transform:open===id?"rotate(90deg)":"none"}}>
          {Icons.chevRight({size:16,color:V.text3})}
        </div>
      </button>
      {open===id&&(
        <div style={{padding:"0 16px 16px",borderTop:`1px solid ${V.cardBorder}`}}>
          <div style={{paddingTop:12}}>{children}</div>
        </div>
      )}
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",paddingBottom:16}}>
      <div style={{fontSize:18,fontWeight:800,color:V.text,marginBottom:12}}>Settings</div>

      {/* Units — inline toggle, no expand needed */}
      <div style={{background:V.card,border:`1px solid ${V.cardBorder}`,borderRadius:14,padding:"12px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,0.04)",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {Icons.scale({size:16,color:V.accent2})}
          </div>
          <div style={{fontSize:14,fontWeight:600,color:V.text}}>Units</div>
        </div>
        <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:10,overflow:"hidden"}}>
          {["lbs","kg"].map(u=>(
            <button key={u} onClick={()=>d({type:"UNITS",u})} style={{
              padding:"7px 16px",border:"none",fontSize:12,fontWeight:700,cursor:"pointer",
              background:s.units===u?V.accent:"transparent",color:s.units===u?V.bg:V.text3,
              WebkitTapHighlightColor:"transparent",transition:"all .2s"
            }}>{u.toUpperCase()}</button>
          ))}
        </div>
      </div>

      {/* Date Range — inline chips, no expand needed */}
      <div style={{background:V.card,border:`1px solid ${V.cardBorder}`,borderRadius:14,padding:"12px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,0.04)",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {Icons.chart({size:16,color:V.purple})}
          </div>
          <div style={{fontSize:14,fontWeight:600,color:V.text}}>Range</div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[7,14,30,90].map(n=>(
            <button key={n} onClick={()=>d({type:"RANGE",d:n})} style={{
              padding:"7px 12px",border:"none",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",
              background:s.range===n?`${V.accent}15`:"rgba(255,255,255,0.04)",
              color:s.range===n?V.accent:V.text3,WebkitTapHighlightColor:"transparent"
            }}>{n}d</button>
          ))}
        </div>
      </div>

      {/* Goals — expandable */}
      <Row id="goals" icon={Icons.target({size:16,color:V.warn})} label="Daily Goals"
        desc={`${s.goals.cal} cal · ${s.goals.protein}p · ${s.goals.carbs}c · ${s.goals.fat}f`}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="Calories" type="number" value={goals.cal} onChange={v=>setGoals(g=>({...g,cal:v}))} unit="kcal"/>
          <Field label="Protein" type="number" value={goals.protein} onChange={v=>setGoals(g=>({...g,protein:v}))} unit="g"/>
          <Field label="Carbs" type="number" value={goals.carbs} onChange={v=>setGoals(g=>({...g,carbs:v}))} unit="g"/>
          <Field label="Fat" type="number" value={goals.fat} onChange={v=>setGoals(g=>({...g,fat:v}))} unit="g"/>
        </div>
        <Field label="Goal Weight" type="number" value={goals.goalWeight} onChange={v=>setGoals(g=>({...g,goalWeight:v}))} unit={s.units}/>
        <Btn full onClick={saveGoals} s={{marginTop:0}}>{Icons.check({size:16,color:V.bg})} {saved?"Saved!":"Save Goals"}</Btn>
      </Row>

      {/* Custom Exercise — expandable */}
      <Row id="exercise" icon={Icons.plus({size:16,color:V.accent})} label="Add Exercise"
        desc={`${s.exercises.length} exercises in library`}>
        <Field label="Name" value={newEx} onChange={setNewEx} placeholder="e.g. Bulgarian Split Squat"/>
        <Field label="YouTube (optional)" value={newYt} onChange={setNewYt} placeholder="Video URL or ID"/>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
          {["Chest","Back","Legs","Shoulders","Arms","Core","Cardio"].map(c=>(
            <Chip key={c} label={c} active={newCat===c} onClick={()=>setNewCat(c)}/>
          ))}
        </div>
        <Btn full onClick={addEx}>{Icons.plus({size:14,color:V.bg})} Add</Btn>
      </Row>

      {/* Backup — expandable */}
      <Row id="profile" icon={Icons.target({size:16,color:"#e879f9"})} label="Edit Profile"
        desc={s.profile?.firstName?`${s.profile.firstName} ${s.profile.lastName}`:"Not set"}>
        <ProfileEditor s={s} d={d}/>
      </Row>

      <Row id="backup" icon={Icons.refresh({size:16,color:V.accent2})} label="Backup & Restore"
        desc="Export or import your data">
        <DataManager s={s} d={d}/>
      </Row>

      {/* Data management — expandable */}
      <Row id="data" icon={Icons.trash({size:16,color:V.text3})} label="Data Management"
        desc="Demo data and reset">
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <Btn v="secondary" full onClick={()=>{const dm=genDemo();dm.workouts.forEach(w=>d({type:"ADD_W",w}));dm.nutrition.forEach(n=>d({type:"ADD_N",n}));dm.body.forEach(b=>d({type:"ADD_B",b}));setOpen(null);}}>{Icons.refresh({size:14,color:V.text2})} Load Demo Data</Btn>
          {!confirmClear?(
            <Btn v="secondary" full onClick={()=>setConfirmClear(true)} s={{borderColor:"rgba(255,107,107,0.2)"}}><span style={{color:V.danger}}>Clear All Data</span></Btn>
          ):(
            <div style={{display:"flex",gap:8}}>
              <Btn v="secondary" full onClick={()=>setConfirmClear(false)}>Cancel</Btn>
              <Btn v="secondary" full onClick={()=>{d({type:"CLEAR_ALL"});setConfirmClear(false);}} s={{borderColor:V.danger}}><span style={{color:V.danger}}>Confirm</span></Btn>
            </div>
          )}
        </div>
      </Row>

      <Footer/>
    </div>
  );
}

// ─── Onboarding Flow ───
function Onboarding({d}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState("");
  const [split,setSplit]=useState("PPL");
  const [units,setUnits]=useState("lbs");
  const [goals,setGoals]=useState({cal:"2400",protein:"180",carbs:"250",fat:"70",goalWeight:"175"});
  const [bw,setBw]=useState("");
  const [sending,setSending]=useState(false);
  const [profile,setProfile]=useState({
    firstName:"",lastName:"",nickname:"",email:"",dob:"",sex:"",state:"",
    height:"",fitnessLevel:"",activityLevel:"",weeklyAvailability:""
  });

  const splits={
    "PPL":{desc:"Push / Pull / Legs",days:{1:"Push",2:"Pull",3:"Legs",4:"Push",5:"Pull",6:"Legs",0:"Rest"}},
    "Bro":{desc:"Chest / Back / Shoulders / Arms / Legs",days:{1:"Chest",2:"Back",3:"Shoulders",4:"Arms",5:"Legs",6:"Cardio",0:"Rest"}},
    "Upper/Lower":{desc:"Upper / Lower / Rest / Repeat",days:{1:"Upper",2:"Lower",3:"Rest",4:"Upper",5:"Lower",6:"Cardio",0:"Rest"}},
    "Full Body":{desc:"3x per week full body",days:{1:"Full Body",2:"Rest",3:"Full Body",4:"Rest",5:"Full Body",6:"Cardio",0:"Rest"}},
    "Custom":{desc:"Set your own schedule later",days:{0:"Rest",1:"Rest",2:"Rest",3:"Rest",4:"Rest",5:"Rest",6:"Rest"}},
  };

  const US_STATES=["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware",
    "Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine",
    "Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada",
    "New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma",
    "Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont",
    "Virginia","Washington","West Virginia","Wisconsin","Wyoming","Other"];

  const sendToBackend=async(payload)=>{
    try{
      const res=await fetch("https://ironlog.space/api/users/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload),
      });
      if(!res.ok)throw new Error("Server error");
      return true;
    }catch(e){
      // Silently fail — data is stored locally regardless
      console.log("Backend sync deferred — data saved locally",e.message);
      return false;
    }
  };

  const finish=async()=>{
    setSending(true);

    // Build full payload
    const payload={
      ...profile,
      currentWeight:parseFloat(bw)||null,
      targetWeight:parseInt(goals.goalWeight)||null,
      units,split,
      goals:{cal:parseInt(goals.cal),protein:parseInt(goals.protein),carbs:parseInt(goals.carbs),fat:parseInt(goals.fat)},
      createdAt:new Date().toISOString(),
      deviceId:uid(),
    };

    // Send to backend (non-blocking — app works regardless)
    await sendToBackend(payload);

    // Apply to local state
    d({type:"UNITS",u:units});
    d({type:"GOALS",g:{cal:parseInt(goals.cal)||2400,protein:parseInt(goals.protein)||180,
      carbs:parseInt(goals.carbs)||250,fat:parseInt(goals.fat)||70,goalWeight:parseInt(goals.goalWeight)||175}});
    d({type:"SET_SCHEDULE",schedule:{weekly:splits[split].days,overrides:{}}});
    d({type:"SET_PROFILE",profile});
    if(bw){d({type:"ADD_B",b:{id:uid(),date:today(),weight:parseFloat(bw)||0,bf:"",chest:"",waist:"",arms:"",thighs:""}});}
    d({type:"ONBOARDED"});
    setSending(false);
  };

  const profileValid=profile.firstName.trim()&&profile.lastName.trim()&&profile.email.trim()&&profile.dob&&profile.sex&&profile.state;

  const steps=[
    // Step 0: Welcome
    ()=>(
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{width:64,height:64,borderRadius:18,background:`linear-gradient(135deg,${V.accent},${V.accent2})`,
          display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:20}}>
          {Icons.activity({size:32,color:V.bg,strokeWidth:2.5})}
        </div>
        <div style={{fontSize:28,fontWeight:800,marginBottom:8}}>IRON<span style={{color:V.accent}}>LOG</span></div>
        <div style={{fontSize:14,color:V.text3,marginBottom:30,lineHeight:1.5}}>Your personal fitness tracker.<br/>Let's get you set up.</div>
        <Btn full onClick={()=>setStep(1)}>Get Started</Btn>
      </div>
    ),
    // Step 1: Units
    ()=>(
      <div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Units</div>
        <div style={{fontSize:13,color:V.text3,marginBottom:16}}>How do you measure weight?</div>
        <div style={{display:"flex",gap:10}}>
          {["lbs","kg"].map(u=>(
            <button key={u} onClick={()=>setUnits(u)} style={{
              flex:1,padding:20,borderRadius:14,border:`2px solid ${units===u?V.accent:V.cardBorder}`,
              background:units===u?`${V.accent}10`:"rgba(255,255,255,0.02)",
              cursor:"pointer",textAlign:"center",WebkitTapHighlightColor:"transparent"
            }}>
              <div style={{fontSize:24,fontWeight:800,color:units===u?V.accent:V.text}}>{u==="lbs"?"LBS":"KG"}</div>
              <div style={{fontSize:11,color:V.text3,marginTop:4}}>{u==="lbs"?"Pounds":"Kilograms"}</div>
            </button>
          ))}
        </div>
        <Btn full onClick={()=>setStep(2)} s={{marginTop:16}}>Next</Btn>
      </div>
    ),
    // Step 2: Training Split
    ()=>(
      <div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Training Split</div>
        <div style={{fontSize:13,color:V.text3,marginBottom:16}}>Pick your weekly routine</div>
        {Object.entries(splits).map(([k,v])=>(
          <button key={k} onClick={()=>setSplit(k)} style={{
            display:"block",width:"100%",padding:14,marginBottom:8,borderRadius:14,textAlign:"left",
            border:`2px solid ${split===k?V.accent:V.cardBorder}`,
            background:split===k?`${V.accent}10`:"rgba(255,255,255,0.02)",
            cursor:"pointer",WebkitTapHighlightColor:"transparent"
          }}>
            <div style={{fontSize:15,fontWeight:700,color:split===k?V.accent:V.text}}>{k}</div>
            <div style={{fontSize:11,color:V.text3,marginTop:2}}>{v.desc}</div>
          </button>
        ))}
        <Btn full onClick={()=>setStep(3)} s={{marginTop:8}}>Next</Btn>
      </div>
    ),
    // Step 3: Goals + Body Weight
    ()=>(
      <div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Your Goals</div>
        <div style={{fontSize:13,color:V.text3,marginBottom:16}}>Set your daily targets</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Field label="Calories" type="number" value={goals.cal} onChange={v=>setGoals(g=>({...g,cal:v}))} unit="kcal"/>
          <Field label="Protein" type="number" value={goals.protein} onChange={v=>setGoals(g=>({...g,protein:v}))} unit="g"/>
          <Field label="Carbs" type="number" value={goals.carbs} onChange={v=>setGoals(g=>({...g,carbs:v}))} unit="g"/>
          <Field label="Fat" type="number" value={goals.fat} onChange={v=>setGoals(g=>({...g,fat:v}))} unit="g"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <Field label="Current Weight" type="number" value={bw} onChange={setBw} unit={units}/>

        </div>
        <Btn full onClick={()=>setStep(4)} s={{marginTop:16}}>Next</Btn>
      </div>

    // Step 4: Profile Setup

      <div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Profile Setup</div>
        <div style={{fontSize:13,color:V.text3,marginBottom:16}}>Tell us about yourself to personalize your experience</div>

        {/* Required fields */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Field label="First Name *" value={profile.firstName} onChange={v=>setProfile(p=>({...p,firstName:v}))} placeholder="John"/>
          <Field label="Last Name *" value={profile.lastName} onChange={v=>setProfile(p=>({...p,lastName:v}))} placeholder="Smith"/>
        </div>
        <Field label="Email *" type="email" value={profile.email} onChange={v=>setProfile(p=>({...p,email:v}))} placeholder="you@email.com"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Field label="Date of Birth *" type="date" value={profile.dob} onChange={v=>setProfile(p=>({...p,dob:v}))}/>
          <div>
            <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,fontWeight:600}}>Sex *</div>
            <div style={{display:"flex",gap:6}}>
              {["Male","Female"].map(sx=>(
                <button key={sx} onClick={()=>setProfile(p=>({...p,sex:sx}))} style={{

function DataManager({s,d}){
  const fileRef=useRef(null);
  const [msg,setMsg]=useState(null);
  const CURRENT_VERSION=3;

  const exportData=()=>{
    const data={
      _ironlog:{version:CURRENT_VERSION,exported:new Date().toISOString(),platform:"IRONLOG v3"},
      workouts:s.workouts,nutrition:s.nutrition,body:s.body,exercises:s.exercises,
      goals:s.goals,schedule:s.schedule,units:s.units,photos:s.photos||[],profile:s.profile||{}
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`ironlog-backup-${today()}.json`;a.click();
    URL.revokeObjectURL(url);
    setMsg({type:"success",text:`Exported ${s.workouts.length} workouts, ${s.nutrition.length} nutrition logs, ${s.body.length} measurements`});
    setTimeout(()=>setMsg(null),4000);
  };

  const importData=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const raw=JSON.parse(ev.target.result);
        // Strip metadata
        const data={...raw};delete data._ironlog;

        // Smart merge: count what's new vs existing
        const existingWIds=new Set(s.workouts.map(w=>w.id));
        const existingNIds=new Set(s.nutrition.map(n=>n.id));
        const existingBIds=new Set(s.body.map(b=>b.id));
        const newW=(data.workouts||[]).filter(w=>!existingWIds.has(w.id)).length;
        const newN=(data.nutrition||[]).filter(n=>!existingNIds.has(n.id)).length;
        const newB=(data.body||[]).filter(b=>!existingBIds.has(b.id)).length;

        // Merge arrays (keep existing + add new)
        const merged={
          ...data,
          workouts:[...s.workouts,...(data.workouts||[]).filter(w=>!existingWIds.has(w.id))],
          nutrition:[...s.nutrition,...(data.nutrition||[]).filter(n=>!existingNIds.has(n.id))],
          body:[...s.body,...(data.body||[]).filter(b=>!existingBIds.has(b.id))],
          exercises:[...s.exercises,...(data.exercises||[]).filter(e=>!s.exercises.some(x=>x.id===e.id))],
        };

        d({type:"IMPORT",data:merged});
        setMsg({type:"success",text:`Imported! +${newW} workouts, +${newN} nutrition, +${newB} measurements`});
        setTimeout(()=>setMsg(null),5000);
      }catch(err){
        setMsg({type:"error",text:"Invalid backup file. Make sure it's an IRONLOG JSON export."});
        setTimeout(()=>setMsg(null),4000);
      }
    };
    reader.readAsText(file);
    e.target.value=""; // reset file input
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {msg&&(
        <div style={{padding:"10px 14px",borderRadius:10,fontSize:12,fontWeight:600,
          background:msg.type==="success"?`${V.accent}12`:`${V.danger}12`,
          color:msg.type==="success"?V.accent:V.danger,
          border:`1px solid ${msg.type==="success"?V.accent:V.danger}20`}}>
          {msg.text}
        </div>
      )}
      <div style={{fontSize:11,color:V.text3,marginBottom:2}}>
        {s.workouts.length} workouts · {s.nutrition.length} nutrition logs · {s.body.length} measurements
      </div>
      <Btn full onClick={exportData}>{Icons.download({size:16,color:V.bg})} Export Backup</Btn>
      <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
      <Btn v="secondary" full onClick={()=>fileRef.current?.click()}>{Icons.upload({size:14,color:V.text2})} Import Backup</Btn>
      <div style={{fontSize:10,color:V.text3,marginTop:2}}>Import merges data — your existing entries won't be duplicated or lost.</div>
    </div>
  );
}

// ─── Progressive Overload Engine (Enhanced) ───
function getOverloadSuggestion(exerciseId, workouts, units){
  // Find last 3 sessions with this exercise
  const sessions=[];
  for(const w of workouts){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets.some(s=>s.weight>0)){sessions.push({date:w.date,sets:ex.sets});if(sessions.length>=3)break;}
  }
  if(sessions.length===0)return null;

  const latest=sessions[0];
  const bestSet=latest.sets.reduce((m,st)=>parseFloat(st.weight)>parseFloat(m.weight)?st:m,{weight:0,reps:0});
  const w=parseFloat(bestSet.weight)||0;
  const r=parseInt(bestSet.reps)||0;
  if(w===0)return null;

  const e1rm=Math.round(w*(1+r/30));
  const inc=units==="kg"?2.5:5;
  const targetReps=8;

  // Check if all sets hit target reps
  const allSetsHit=latest.sets.every(st=>parseInt(st.reps)>=targetReps);
  // Check for failure pattern (last 2-3 sessions struggling)
  const failCount=sessions.filter(sess=>{
    const bst=sess.sets.reduce((m,st)=>parseFloat(st.weight)>parseFloat(m.weight)?st:m,{weight:0,reps:0});
    return parseInt(bst.reps)<targetReps-2;
  }).length;

  let type,sugWeight,sugReps,reason;
  if(failCount>=2){
    // Deload
    sugWeight=Math.round((w-inc*2)/inc)*inc;
    sugReps=targetReps;
    type="deload";
    reason="Struggling multiple sessions — deload to rebuild";
  }else if(allSetsHit){
    // Increase weight
    sugWeight=w+inc;
    sugReps=r;
    type="increase";
    reason="All sets completed — increase weight";
  }else if(r<targetReps-1){
    // Keep same, failed reps
    sugWeight=w;
    sugReps=targetReps;
    type="repeat";
    reason="Missed reps — repeat and aim higher";
  }else{
    // Keep same, almost there
    sugWeight=w;
    sugReps=r+1;
    type="reps";
    reason="Close to target — add a rep";
  }

  const zone80=Math.round(e1rm*0.80);
  const zone70=Math.round(e1rm*0.70);

  return{type,last:`${w}×${r}`,suggest:`${sugWeight}×${sugReps}`,e1rm,zone80,zone70,reason,
    allSets:latest.sets.map(st=>`${st.weight}×${st.reps}`).join("  "),date:sessions[0].date};
}

// ─── Muscle Heat Map Calculator ───
function calcMuscleHeat(workouts,exercises,days=10){
  const now=new Date();
  const scores={};
  ALL_MUSCLES.forEach(m=>{scores[m]=0;});

  workouts.forEach(w=>{
    const daysAgo=Math.max(0,(now-new Date(w.date))/(1000*60*60*24));
    if(daysAgo>days)return;
    const decay=Math.max(0,1-daysAgo/days);

    w.exercises.forEach(ex=>{
      const map=MUSCLE_MAP[ex.exerciseId];
      if(!map)return;
      const setCount=ex.sets.length;
      const volume=ex.sets.reduce((s,st)=>(parseFloat(st.weight)||0)*(parseInt(st.reps)||0)+s,0);
      const intensity=Math.min(1,volume/5000)+setCount*0.3;

      map.primary.forEach(m=>{scores[m]+=(intensity*3)*decay;});
      map.secondary.forEach(m=>{scores[m]+=(intensity*1.5)*decay;});
    });
  });

  // Normalize 0-10
  const mx=Math.max(...Object.values(scores),1);
  const norm={};
  ALL_MUSCLES.forEach(m=>{norm[m]=Math.min(10,Math.round(scores[m]/mx*10*10)/10);});
  return norm;
}

function getMuscleColor(score){
  if(score<=0.5)return"rgba(255,255,255,0.06)";
  if(score<=3)return"rgba(250,204,21,0.4)";   // yellow
  if(score<=6)return"rgba(0,245,160,0.5)";     // green
  if(score<=8)return"rgba(0,245,160,0.8)";     // bright green
  return"rgba(255,107,107,0.7)";                // red (high fatigue)
}

function getMuscleLabel(score){
  if(score<=0.5)return"Untrained";
  if(score<=3)return"Light";
  if(score<=6)return"Moderate";
  if(score<=8)return"Well Trained";
  return"High Volume";
}

// ─── Strength Score System ───
function calcStrengthScore(workouts,bodyWeight){
  const bw=parseFloat(bodyWeight)||180;
  const lifts={bench:0,squat:0,deadlift:0};

  // Find best e1RM for each lift
  workouts.forEach(w=>{
    w.exercises.forEach(ex=>{
      if(lifts.hasOwnProperty(ex.exerciseId)){
        ex.sets.forEach(st=>{
          const wt=parseFloat(st.weight)||0;
          const rp=parseInt(st.reps)||0;
          if(wt>0&&rp>0){
            const e1rm=Math.round(wt*(1+rp/30));
            lifts[ex.exerciseId]=Math.max(lifts[ex.exerciseId],e1rm);
          }
        });
      }
    });
  });

  const benchRatio=lifts.bench/bw;
  const squatRatio=lifts.squat/bw;
  const deadRatio=lifts.deadlift/bw;
  const score=benchRatio*0.30+squatRatio*0.35+deadRatio*0.35;

  let rank,rankColor;
  if(score<0.5){rank="Novice";rankColor=V.text3;}
  else if(score<1.0){rank="Beginner";rankColor=V.warn;}
  else if(score<1.5){rank="Intermediate";rankColor=V.accent2;}
  else if(score<2.0){rank="Advanced";rankColor=V.accent;}
  else{rank="Elite";rankColor=V.purple;}

  // Badges
  const badges=[];
  if(benchRatio>=1.5)badges.push({label:"Bench 1.5x BW",icon:"🏋️"});
  if(benchRatio>=2.0)badges.push({label:"Bench 2x BW",icon:"💎"});
  if(squatRatio>=2.0)badges.push({label:"Squat 2x BW",icon:"🦵"});
  if(squatRatio>=2.5)badges.push({label:"Squat 2.5x BW",icon:"👑"});
  if(deadRatio>=2.5)badges.push({label:"Dead 2.5x BW",icon:"🔥"});
  if(deadRatio>=3.0)badges.push({label:"Dead 3x BW",icon:"⚡"});
  if(score>=1.0)badges.push({label:"1000lb Club",icon:"🏆",cond:lifts.bench+lifts.squat+lifts.deadlift>=1000});

  return{score:Math.round(score*100)/100,rank,rankColor,lifts,benchRatio:Math.round(benchRatio*100)/100,
    squatRatio:Math.round(squatRatio*100)/100,deadRatio:Math.round(deadRatio*100)/100,
    badges:badges.filter(b=>b.cond===undefined||b.cond),total:lifts.bench+lifts.squat+lifts.deadlift,bw};
}

  const bw=s.body.find(b=>b.weight)?.weight||s.goals.goalWeight||180;

  const u=wUnit(s.units);

  // Monthly trend
  const trend=useMemo(()=>{
    const months={};
    s.workouts.forEach(w=>{
      const mo=w.date.slice(0,7);
      if(!months[mo])months[mo]=[];
      months[mo].push(w);
    });
    return Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6).map(([mo,wks])=>{
      const sc=calcStrengthScore(wks,bw);
      return{date:mo.slice(5),score:sc.score};

  },[s.tab]);

  useEffect(()=>{
    (async()=>{
      try{
        const data={};
        ["ft-w","ft-n","ft-b","ft-ex","ft-g","ft-sched","ft-units","ft-onb","ft-photos","ft-profile"].forEach(k=>{const v=LS.get(k);if(v!==null)data[k]=v;});
        d({type:"INIT",p:{workouts:data["ft-w"]||[],nutrition:data["ft-n"]||[],body:data["ft-b"]||[],
          exercises:data["ft-ex"]||defaultExercises,goals:data["ft-g"]||init.goals,schedule:data["ft-sched"]||defaultSchedule,
          units:data["ft-units"]||"lbs",onboarded:data["ft-onb"]||false,photos:data["ft-photos"]||[],
          profile:data["ft-profile"]||init.profile}});
      }catch(e){
        d({type:"INIT",p:{exercises:defaultExercises,goals:init.goals,schedule:defaultSchedule}});
      }
    })();
  },[]);

  useEffect(()=>{
    if(!s.loaded)return;
    (async()=>{try{
      LS.set("ft-w",s.workouts);
      LS.set("ft-n",s.nutrition);
      LS.set("ft-b",s.body);
      LS.set("ft-ex",s.exercises);
      LS.set("ft-g",s.goals);
      LS.set("ft-sched",s.schedule);
      LS.set("ft-units",s.units);
      LS.set("ft-onb",s.onboarded);
      LS.set("ft-photos",s.photos);
      LS.set("ft-profile",s.profile);
    }catch(e){}})();
  },[s.workouts,s.nutrition,s.body,s.exercises,s.goals,s.schedule,s.units,s.onboarded,s.photos,s.profile,s.loaded]);

  // Show onboarding if first launch
  if(s.loaded&&!s.onboarded) return <Onboarding d={d}/>;

  // Back button component for sub-pages
  const SubBack=({to,label})=>(
    <button onClick={()=>d({type:"TAB",tab:to})} style={{background:"none",border:"none",display:"flex",alignItems:"center",
      gap:5,padding:"8px 0 12px",cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
      {Icons.chevLeft({size:18,color:V.accent})}
      <span style={{fontSize:14,color:V.accent,fontWeight:600}}>{label||"Back"}</span>
    </button>
  );

  // Map tab to parent for bottom nav highlighting
  const tabParent=(t)=>{
    if(t.startsWith("log_"))return"log";
    if(t.startsWith("track_"))return"track";
    return t;
  };
  const activeParent=tabParent(s.tab);

  const tabs=[
    {id:"home",icon:Icons.activity,label:"Home"},
    {id:"log",icon:Icons.plus,label:"Log"},
    {id:"track",icon:Icons.chart,label:"Track"},
    {id:"settings",icon:Icons.target,label:"Settings"},
  ];

  return(
    <div style={{
      height:"100%",maxWidth:430,margin:"0 auto",background:V.bg,color:V.text,fontFamily:V.font,
      display:"flex",flexDirection:"column",position:"relative",
    }}>

      {/* Status Bar Area */}
      <div style={{height:"env(safe-area-inset-top, 0px)",background:V.bg,flexShrink:0}}/>

      {/* Header */}
      <div style={{padding:"12px 20px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={()=>d({type:"TAB",tab:"home"})} style={{display:"flex",alignItems:"center",gap:8,
          background:"none",border:"none",cursor:"pointer",padding:0,WebkitTapHighlightColor:"transparent"}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${V.accent},${V.accent2})`,
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {Icons.activity({size:15,color:V.bg,strokeWidth:2.5})}
          </div>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:"-0.03em",color:V.text}}>
            IRON<span style={{color:V.accent}}>LOG</span>
          </span>
        </button>
        <div style={{display:"flex",gap:3}}>
          {[7,14,30].map(n=>(
            <button key={n} onClick={()=>d({type:"RANGE",d:n})} style={{
              padding:"5px 10px",borderRadius:8,border:"none",fontSize:10,fontWeight:700,fontFamily:V.font,
              background:s.range===n?`${V.accent}15`:"transparent",color:s.range===n?V.accent:V.text3,cursor:"pointer",
              WebkitTapHighlightColor:"transparent",
            }}>{n}d</button>
          ))}
        </div>
      </div>

      {/* Content — scrollable region */}
      <div ref={contentRef} style={{flex:1,minHeight:0,overflowY:"auto",overflowX:"hidden",
        WebkitOverflowScrolling:"touch",padding:"0 16px 24px",
        overscrollBehavior:"contain"}}>
        {s.tab==="home"&&<HomeTab s={s} d={d}/>}
        {s.tab==="log"&&<LogHub s={s} d={d}/>}
        {s.tab==="track"&&<TrackHub s={s} d={d}/>}
        {s.tab==="settings"&&<SettingsTab s={s} d={d}/>}

        {/* Log sub-pages */}
        {s.tab==="log_workout"&&<div><SubBack to="log" label="Log"/><WorkoutTab s={s} d={d}/></div>}
        {s.tab==="log_nutrition"&&<div><SubBack to="log" label="Log"/><NutritionTab s={s} d={d}/></div>}
        {s.tab==="log_body"&&<div><SubBack to="log" label="Log"/><BodyTab s={s} d={d}/></div>}

        {/* Track sub-pages */}
        {s.tab==="track_calendar"&&<div><SubBack to="track" label="Track"/><CalendarTab s={s} d={d}/></div>}
        {s.tab==="track_workouts"&&<div><SubBack to="track" label="Track"/><WorkoutTab s={s} d={d}/></div>}
        {s.tab==="track_nutrition"&&<div><SubBack to="track" label="Track"/><NutritionTab s={s} d={d}/></div>}
        {s.tab==="track_body"&&<div><SubBack to="track" label="Track"/><BodyTab s={s} d={d}/></div>}
        {s.tab==="track_photos"&&<div><SubBack to="track" label="Track"/><ProgressPhotos s={s} d={d}/></div>}
        {s.tab==="track_analytics"&&<div><SubBack to="track" label="Track"/><AnalyticsTab s={s} d={d}/></div>}
        {s.tab==="track_muscles"&&<div><SubBack to="track" label="Track"/><MuscleHeatMap s={s}/></div>}
        {s.tab==="track_strength"&&<div><SubBack to="track" label="Track"/><StrengthScoreCard s={s}/></div>}
        {s.tab==="track_onerm"&&<div><SubBack to="track" label="Track"/><OneRMCalc units={s.units}/></div>}

        {/* Global footer on every page */}
        <Footer/>
      </div>

      {/* Bottom Nav — always visible, highlights parent group */}
      <div style={{
        flexShrink:0,background:"rgba(8,8,13,0.95)",backdropFilter:"blur(24px) saturate(180%)",
        borderTop:`1px solid rgba(255,255,255,0.06)`,
        paddingBottom:"env(safe-area-inset-bottom, 8px)",
        display:"flex",justifyContent:"space-around",alignItems:"center",paddingTop:8,
      }}>
        {tabs.map(t=>{
          const active=activeParent===t.id;
          return(
            <button key={t.id} onClick={()=>d({type:"TAB",tab:t.id})} style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              background:"none",border:"none",cursor:"pointer",
              padding:"6px 16px",minWidth:64,
              WebkitTapHighlightColor:"transparent",transition:"all .15s",
            }}>
              <div style={{
                width:active?42:36,height:active?42:36,borderRadius:active?14:12,
                background:active?`${V.accent}18`:"transparent",
                display:"flex",alignItems:"center",justifyContent:"center",
                transition:"all .2s ease",
              }}>
                {t.id==="log"?(
                  <div style={{width:active?26:22,height:active?26:22,borderRadius:"50%",
                    background:active?V.accent:"rgba(255,255,255,0.12)",
                    display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    {Icons.plus({size:active?14:12,color:active?V.bg:V.text3,strokeWidth:3})}
                  </div>
                ):(
                  t.icon({size:active?22:20,color:active?V.accent:V.text3,strokeWidth:active?2.2:1.6})
                )}
              </div>
              <span style={{fontSize:10,fontWeight:active?700:500,color:active?V.accent:V.text3,
                fontFamily:V.font,letterSpacing:".02em"}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Mount ───
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>

<script>
(function(){
  var isGitHubPages = location.hostname.endsWith('github.io');
  var parts = location.pathname.split('/').filter(Boolean);
  var basePath = (isGitHubPages && parts.length) ? '/' + parts[0] + '/' : '/';

  var manifestLink = document.getElementById('manifest-link');
  var appleIconLink = document.getElementById('apple-touch-icon-link');
  if (manifestLink) manifestLink.href = basePath + 'manifest.json';
  if (appleIconLink) appleIconLink.href = basePath + 'icon.svg';

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(basePath + 'sw.js', { scope: basePath }).catch(function(){});
  }
})();
</script>
</body>
</html>
