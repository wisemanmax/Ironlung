*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;background:#08080d;margin:0;padding:0;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}
body{font-family:'Outfit',sans-serif;color:#e8e8ec;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
input,select,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
#loader{position:fixed;inset:0;background:#08080d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.done{opacity:0;pointer-events:none}
#loader .spin{width:36px;height:36px;border:3px solid rgba(0,245,160,0.15);border-top-color:#00f5a0;border-radius:50%;animation:spin .8s linear infinite}
#loader .msg{margin-top:16px;font-size:13px;color:#8b8b9e;font-family:'Outfit',sans-serif}
#loader .err{margin-top:16px;font-size:12px;color:#ff6b6b;font-family:'JetBrains Mono',monospace;max-width:90%;text-align:center;word-break:break-all}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

<script>
// ─── Script loader with error handling ───
var loadStatus = {};
function loadScript(url, name) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.crossOrigin = 'anonymous';
    s.onload = function() { loadStatus[name] = 'ok'; resolve(); };
    s.onerror = function() { loadStatus[name] = 'FAILED'; reject(new Error(name + ' failed to load from ' + url)); };
    document.head.appendChild(s);
  });
}

function showError(msg) {
  var loader = document.getElementById('loader');
  loader.innerHTML = '<div style="color:#ff6b6b;font-size:16px;font-weight:700;margin-bottom:12px">Failed to Load</div>' +
    '<div class="err">' + msg + '</div>' +
    '<div style="margin-top:20px;font-size:12px;color:#8b8b9e">Check your internet connection and reload</div>';
}

function updateMsg(msg) {
  var el = document.querySelector('#loader .msg');
  if (el) el.textContent = msg;
}

// Load scripts sequentially to guarantee order
updateMsg('Loading React...');
loadScript('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js', 'React')
.then(function() {
  updateMsg('Loading React DOM...');
  return loadScript('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js', 'ReactDOM');
})
.then(function() {
  updateMsg('Loading dependencies...');
  return loadScript('https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js', 'PropTypes');
})
.then(function() {
  updateMsg('Loading Charts...');
  return loadScript('https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js', 'Recharts')
    .catch(function() {
      updateMsg('Retrying charts from backup CDN...');
      return loadScript('https://unpkg.com/recharts@2.5.0/umd/Recharts.js', 'Recharts');
    });
})
.then(function() {
  updateMsg('Loading Compiler...');
  return loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js', 'Babel')
    .catch(function() {
      updateMsg('Retrying compiler from backup CDN...');
      return loadScript('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js', 'Babel');
    });
})
.then(function() {
  updateMsg('Starting app...');
  // Verify globals exist
  if (typeof React === 'undefined') throw new Error('React not defined');
  if (typeof ReactDOM === 'undefined') throw new Error('ReactDOM not defined');
  if (typeof Recharts === 'undefined') throw new Error('Recharts not defined');
  if (typeof Babel === 'undefined') throw new Error('Babel not defined');

  // Get the app source
  var appScript = document.getElementById('app-source');
  if (!appScript) throw new Error('App source not found');

  // Transpile JSX to JS
  var jsxCode = appScript.textContent;
  var compiled;
  try {
    compiled = Babel.transform(jsxCode, {
      presets: [['react', { runtime: 'classic' }]],
      filename: 'app.jsx'
    }).code;
  } catch(e) {
    throw new Error('Babel compile error: ' + e.message);
  }

  // Execute compiled JS
  try {
    var fn = new Function(compiled);
    fn();
  } catch(e) {
    throw new Error('Runtime error: ' + e.message);
  }

  // Hide loader
  setTimeout(function() {
    document.getElementById('loader').classList.add('done');
    setTimeout(function() { document.getElementById('loader').style.display = 'none'; }, 500);
  }, 200);
})
.catch(function(err) {
  console.error('IRONLOG Load Error:', err);
  showError(err.message || 'Unknown error');
});
</script>

function genDemo(){
  const w=[],n=[],b=[];
  const pool=["bench","squat","deadlift","ohp","row","pullup","curl","tricep","legpress","latpull"];
  for(let i=30;i>=0;i--){
    const d=ago(i);
    if(i%7!==0&&i%7!==3){
      const ne=3+Math.floor(Math.random()*3);
      const sh=[...pool].sort(()=>Math.random()-0.5).slice(0,ne);
      const exs=sh.map(eid=>{
        const bw={bench:185,squat:275,deadlift:315,ohp:135,row:185,pullup:0,curl:35,tricep:50,legpress:400,latpull:150}[eid]||100;
        const p=(30-i)*0.5;
        return{exerciseId:eid,sets:Array.from({length:3+Math.floor(Math.random()*2)},()=>({
          weight:Math.round(bw+p+(Math.random()*10-5)),reps:6+Math.floor(Math.random()*7),rpe:7+Math.floor(Math.random()*3),done:true
        }))};
      });
      w.push({id:uid(),date:d,dur:45+Math.floor(Math.random()*30),exercises:exs,notes:"",rating:3+Math.floor(Math.random()*3)});
    }
    const pr=140+Math.floor(Math.random()*60),ca=180+Math.floor(Math.random()*80),fa=55+Math.floor(Math.random()*30);
    const cal=pr*4+ca*4+fa*9;
    n.push({id:uid(),date:d,cal,protein:pr,carbs:ca,fat:fa,fiber:20+Math.floor(Math.random()*15),water:6+Math.floor(Math.random()*6),
      sleep:6+Math.random()*2.5,
      meals:[{name:"Breakfast",cal:Math.round(cal*.25),protein:Math.round(pr*.25),items:[]},{name:"Lunch",cal:Math.round(cal*.35),protein:Math.round(pr*.35),items:[]},
        {name:"Dinner",cal:Math.round(cal*.3),protein:Math.round(pr*.3),items:[]},{name:"Snacks",cal:Math.round(cal*.1),protein:Math.round(pr*.1),items:[]}]});
    if(i%3===0||i%7===0){
      b.push({id:uid(),date:d,weight:182-(30-i)*.15+Math.random()*2-1,bf:18-(30-i)*.05+Math.random()*.5,
        chest:42+(30-i)*.02,waist:34-(30-i)*.03,arms:15.5+(30-i)*.015,thighs:24+(30-i)*.01});
    }
  }
  return{workouts:w,nutrition:n,body:b};
}

// schedule.weekly = {0:"Rest",1:"Chest",2:"Back",...} (day-of-week 0=Sun)
// schedule.overrides = {"2026-03-05":"Legs",...} (specific date overrides)
const defaultSchedule = {
  weekly:{0:"Rest",1:"Chest",2:"Back",3:"Legs",4:"Shoulders",5:"Arms",6:"Cardio"},
  overrides:{}
};
const init={tab:"home",workouts:[],nutrition:[],body:[],exercises:defaultExercises,
  goals:{cal:2400,protein:180,carbs:250,fat:70,goalWeight:175},schedule:defaultSchedule,
  range:30,loaded:false,modal:null,units:"lbs",onboarded:false,photos:[],
  profile:{firstName:"",lastName:"",nickname:"",email:"",dob:"",sex:"",state:"",
    height:"",fitnessLevel:"",activityLevel:"",weeklyAvailability:""}};

function reducer(s,a){
  switch(a.type){
    case "INIT": return{...s,...a.p,loaded:true};
    case "TAB": return{...s,tab:a.tab};
    case "RANGE": return{...s,range:a.d};
    case "MODAL": return{...s,modal:a.modal};
    case "ADD_W": return{...s,workouts:[a.w,...s.workouts].sort((a,b)=>b.date.localeCompare(a.date))};
    case "DEL_W": return{...s,workouts:s.workouts.filter(w=>w.id!==a.id)};
    case "ADD_N": return{...s,nutrition:[...s.nutrition.filter(n=>n.date!==a.n.date),a.n].sort((a,b)=>b.date.localeCompare(a.date))};
    case "DEL_N": return{...s,nutrition:s.nutrition.filter(n=>n.id!==a.id)};
    case "ADD_B": return{...s,body:[a.b,...s.body].sort((a,b)=>b.date.localeCompare(a.date))};
    case "DEL_B": return{...s,body:s.body.filter(b=>b.id!==a.id)};
    case "GOALS": return{...s,goals:{...s.goals,...a.g}};
    case "ADD_EX": return{...s,exercises:[...s.exercises,a.ex]};
    case "SET_WEEKLY": return{...s,schedule:{...s.schedule,weekly:{...s.schedule.weekly,[a.day]:a.label}}};
    case "SET_OVERRIDE": {
      const ov={...s.schedule.overrides};
      if(a.label)ov[a.date]=a.label; else delete ov[a.date];
      return{...s,schedule:{...s.schedule,overrides:ov}};
    }
    case "SET_SCHEDULE": return{...s,schedule:a.schedule};
    case "UNITS": return{...s,units:a.u};
    case "ONBOARDED": return{...s,onboarded:true};
    case "SET_PROFILE": return{...s,profile:{...(s.profile||{}),...a.profile}};
    case "ADD_PHOTO": return{...s,photos:[a.photo,...s.photos]};
    case "DEL_PHOTO": return{...s,photos:s.photos.filter(p=>p.id!==a.id)};
    case "CLEAR_ALL": return{...init,exercises:defaultExercises,loaded:true,onboarded:true,units:s.units,profile:s.profile};
    case "IMPORT": return{...s,...a.data,loaded:true};
    default: return s;
  }
}

// ─── Rest Timer ───
function RestTimer(){
  const [active,setActive]=useState(false);
  const [secs,setSecs]=useState(90);
  const [rem,setRem]=useState(90);
  const iRef=useRef(null);
  const start=()=>{setRem(secs);setActive(true);};
  const stop=()=>{setActive(false);clearInterval(iRef.current);};
  useEffect(()=>{
    if(active&&rem>0){
      iRef.current=setInterval(()=>setRem(r=>{if(r<=1){setActive(false);try{navigator.vibrate?.(200);}catch(e){}return 0;}return r-1;}),1000);
      return()=>clearInterval(iRef.current);
    }
  },[active,rem]);
  const pct=active?(rem/secs)*100:100;
  return(
    <div style={{padding:"8px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{position:"relative",width:48,height:48}}>
          <svg width={48} height={48} style={{transform:"rotate(-90deg)"}}>
            <circle cx={24} cy={24} r={20} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={3}/>
            <circle cx={24} cy={24} r={20} fill="none" stroke={rem===0?"#ff6b6b":V.accent} strokeWidth={3}
              strokeDasharray={`${pct*1.257} ${125.7}`} strokeLinecap="round" style={{transition:"stroke-dasharray .3s"}}/>
          </svg>
          <span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:700,color:rem===0?V.danger:V.text,fontFamily:V.mono}}>{fmtTimer(active?rem:secs)}</span>
        </div>
        <div style={{display:"flex",gap:5}}>
          {[60,90,120,180].map(s=>(
            <button key={s} onClick={()=>{setSecs(s);if(!active)setRem(s);}}
              style={{padding:"6px 10px",borderRadius:8,border:"none",fontSize:10,fontWeight:700,fontFamily:V.font,
                background:secs===s?`${V.accent}15`:"rgba(255,255,255,0.04)",color:secs===s?V.accent:V.text3,
                cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>{s}s</button>
          ))}
        </div>
        <button onClick={active?stop:start} style={{marginLeft:"auto",width:40,height:40,borderRadius:12,border:"none",
          background:active?"rgba(255,107,107,0.15)":`${V.accent}15`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          WebkitTapHighlightColor:"transparent"}}>
          {active?Icons.pause({size:16,color:V.danger}):Icons.play({size:16,color:V.accent})}
        </button>
      </div>
      {rem===0&&!active&&<div style={{marginTop:6,fontSize:12,fontWeight:700,color:V.danger,textAlign:"center"}}>REST COMPLETE — GO!</div>}
    </div>
  );
}

// ─── Barcode Scanner ───
function BarcodeScanner({onResult,onClose}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const [status,setStatus]=useState("init"); // init, scanning, loading, found, error, unsupported
  const [product,setProduct]=useState(null);
  const [manualCode,setManualCode]=useState("");
  const scanningRef=useRef(false);

  const stopCam=useCallback(()=>{
    scanningRef.current=false;
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
  },[]);

  const lookupBarcode=useCallback(async(code)=>{
    setStatus("loading");
    try{
      const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
      const data=await res.json();
      if(data.status===1&&data.product){
        const p=data.product;
        const n=p.nutriments||{};
        const name=p.product_name||p.product_name_en||"Unknown Product";
        const serving=p.serving_quantity||100;
        const prod={
          name:name.length>40?name.slice(0,37)+"...":name,
          brand:p.brands||"",
          cal:Math.round(n["energy-kcal_serving"]||n["energy-kcal_100g"]||0),
          protein:Math.round(n.proteins_serving||n.proteins_100g||0),
          carbs:Math.round(n.carbohydrates_serving||n.carbohydrates_100g||0),
          fat:Math.round(n.fat_serving||n.fat_100g||0),
          fiber:Math.round(n.fiber_serving||n.fiber_100g||0),
          serving:p.serving_size||`${serving}g`,
          barcode:code,
          image:p.image_small_url||null,
        };
        setProduct(prod);setStatus("found");
      }else{setStatus("error");}
    }catch(e){setStatus("error");}
  },[]);

  const startCam=useCallback(async()=>{
    if(!navigator.mediaDevices?.getUserMedia){setStatus("unsupported");return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
      setStatus("scanning");scanningRef.current=true;
      // Use BarcodeDetector if available
      if("BarcodeDetector" in window){
        const detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39"]});
        const scan=async()=>{
          if(!scanningRef.current||!videoRef.current)return;
          try{
            const barcodes=await detector.detect(videoRef.current);
            if(barcodes.length>0){stopCam();lookupBarcode(barcodes[0].rawValue);return;}
          }catch(e){}
          if(scanningRef.current)requestAnimationFrame(scan);
        };
        requestAnimationFrame(scan);
      }else{setStatus("unsupported");}
    }catch(e){setStatus("unsupported");}
  },[stopCam,lookupBarcode]);

  useEffect(()=>{startCam();return stopCam;},[startCam,stopCam]);

  const addProduct=()=>{
    if(product){onResult({name:product.name+(product.brand?` (${product.brand})`:""),cal:product.cal,protein:product.protein,carbs:product.carbs,fat:product.fat});onClose();}
  };

  const manualLookup=()=>{if(manualCode.trim().length>=8)lookupBarcode(manualCode.trim());};

  return(
    <div style={{position:"fixed",inset:0,zIndex:1100,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",flexShrink:0}}>
        <button onClick={()=>{stopCam();onClose();}} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",color:V.accent}}>
          {Icons.chevLeft({size:18,color:V.accent})}<span style={{fontSize:14,fontWeight:600}}>Back</span>
        </button>
        <span style={{fontSize:15,fontWeight:700,color:V.text}}>Scan Barcode</span>
        <div style={{width:60}}/>
      </div>

      {/* Camera / Status */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 20px",gap:16}}>
        {(status==="init"||status==="scanning")&&(
          <div style={{position:"relative",width:"100%",maxWidth:320,aspectRatio:"4/3",borderRadius:16,overflow:"hidden",border:`2px solid ${V.accent}30`}}>
            <video ref={videoRef} playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            {/* Scan overlay */}
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:"70%",height:2,background:V.accent,opacity:0.7,boxShadow:`0 0 20px ${V.accent}`,
                animation:"scanLine 2s ease-in-out infinite"}}/>
            </div>
            <div style={{position:"absolute",inset:0,border:"2px solid transparent",
              borderImage:`linear-gradient(${V.accent},${V.accent2}) 1`,opacity:0.3}}/>
          </div>
        )}

        {status==="scanning"&&(
          <div style={{fontSize:12,color:V.text3,textAlign:"center"}}>Point camera at barcode</div>
        )}

        {status==="loading"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:20,border:`3px solid ${V.accent}30`,borderTopColor:V.accent,
              animation:"spin 0.8s linear infinite"}}/>
            <span style={{fontSize:13,color:V.text3}}>Looking up product...</span>
          </div>
        )}

        {status==="found"&&product&&(
          <div style={{width:"100%",maxWidth:340}}>
            <Card style={{padding:16}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                {product.image&&<img src={product.image} alt="" style={{width:48,height:48,borderRadius:10,objectFit:"cover",background:"rgba(255,255,255,0.05)"}}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:V.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{product.name}</div>
                  {product.brand&&<div style={{fontSize:11,color:V.text3}}>{product.brand}</div>}
                  <div style={{fontSize:10,color:V.text3,marginTop:2}}>Per {product.serving}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
                {[{l:"Cal",v:product.cal,c:V.warn},{l:"Protein",v:`${product.protein}g`,c:V.accent},
                  {l:"Carbs",v:`${product.carbs}g`,c:V.accent2},{l:"Fat",v:`${product.fat}g`,c:V.warn}].map(m=>(
                  <div key={m.l} style={{textAlign:"center",padding:"8px 4px",background:`${m.c}08`,borderRadius:8}}>
                    <div style={{fontSize:16,fontWeight:800,color:m.c,fontFamily:V.mono}}>{m.v}</div>
                    <div style={{fontSize:8,color:V.text3,fontWeight:600,textTransform:"uppercase",marginTop:2}}>{m.l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn v="secondary" full onClick={()=>{setProduct(null);setStatus("init");startCam();}}>Scan Again</Btn>
                <Btn full onClick={addProduct}>{Icons.plus({size:14,color:V.bg})} Add</Btn>
              </div>
            </Card>
          </div>
        )}

        {status==="error"&&(
          <div style={{width:"100%",maxWidth:340}}>
            <Card style={{padding:16,textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔍</div>
              <div style={{fontSize:14,fontWeight:700,color:V.text,marginBottom:4}}>Product Not Found</div>
              <div style={{fontSize:12,color:V.text3,marginBottom:12}}>This barcode isn't in the database. Try another product or enter nutrition manually.</div>
              <Btn v="secondary" full onClick={()=>{setProduct(null);setStatus("init");startCam();}}>Try Again</Btn>
            </Card>
          </div>
        )}

        {status==="unsupported"&&(
          <div style={{width:"100%",maxWidth:340}}>
            <Card style={{padding:16}}>
              <div style={{fontSize:14,fontWeight:700,color:V.text,marginBottom:8,textAlign:"center"}}>Enter Barcode Manually</div>
              <div style={{fontSize:11,color:V.text3,marginBottom:12,textAlign:"center"}}>Camera scanning unavailable. Type or paste the barcode number.</div>
              <div style={{display:"flex",gap:8}}>
                <input value={manualCode} onChange={e=>setManualCode(e.target.value)} placeholder="e.g. 049000042566"
                  inputMode="numeric" style={{flex:1,padding:"12px 14px",background:"rgba(255,255,255,0.04)",
                    border:`1px solid ${V.cardBorder}`,borderRadius:12,color:V.text,fontSize:15,fontFamily:V.mono,
                    outline:"none",boxSizing:"border-box",minHeight:44}}/>
                <Btn onClick={manualLookup}>{Icons.search({size:16,color:V.bg})}</Btn>
              </div>
            </Card>
          </div>
        )}
      </div>

      {/* Manual entry fallback always available */}
      {(status==="scanning"||status==="init")&&(
        <div style={{padding:"0 20px 24px",flexShrink:0}}>
          <div style={{display:"flex",gap:8}}>
            <input value={manualCode} onChange={e=>setManualCode(e.target.value)} placeholder="Or type barcode..."
              inputMode="numeric" style={{flex:1,padding:"10px 12px",background:"rgba(255,255,255,0.04)",
                border:`1px solid ${V.cardBorder}`,borderRadius:10,color:V.text,fontSize:13,fontFamily:V.mono,
                outline:"none",boxSizing:"border-box",minHeight:40}}/>
            <button onClick={manualLookup} disabled={manualCode.trim().length<8} style={{padding:"10px 16px",borderRadius:10,border:"none",
              background:manualCode.trim().length>=8?V.accent:"rgba(255,255,255,0.04)",
              color:manualCode.trim().length>=8?V.bg:V.text3,fontWeight:700,fontSize:12,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
              Look Up
            </button>
          </div>
        </div>
      )}

      <style>{`
        @keyframes scanLine{0%,100%{transform:translateY(-30px);opacity:0.3}50%{transform:translateY(30px);opacity:0.9}}
        @keyframes spin{to{transform:rotate(360deg)}}
      `}</style>
    </div>
  );
}

// ─── Hooks ───
function useStreak(workouts){
  return useMemo(()=>{
    let streak=0;const d=new Date();
    if(!workouts.find(w=>w.date===today()))d.setDate(d.getDate()-1);
    while(true){const ds=d.toISOString().split("T")[0];
      if(workouts.find(w=>w.date===ds)){streak++;d.setDate(d.getDate()-1);}else break;}
    return streak;
  },[workouts]);
}
function usePRs(workouts,exercises){
  return useMemo(()=>{
    const prs={};
    workouts.forEach(w=>w.exercises.forEach(ex=>{
      const name=exercises.find(e=>e.id===ex.exerciseId)?.name||ex.exerciseId;
      ex.sets.forEach(s=>{const e1rm=calc1RM(s.weight,s.reps);
        if(s.weight>0&&(!prs[ex.exerciseId]||e1rm>prs[ex.exerciseId].e1rm))
          prs[ex.exerciseId]={weight:s.weight,reps:s.reps,e1rm,date:w.date,name};
      });
    }));
    return prs;
  },[workouts,exercises]);
}

// ─── Find last sets for an exercise (for auto-fill) ───
function findLastSets(exerciseId,workouts){
  for(const w of workouts){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets.length>0){
      return ex.sets.map(st=>({weight:st.weight.toString(),reps:st.reps.toString(),rpe:st.rpe?st.rpe.toString():"",done:true}));
    }
  }
  return null;
}

function WorkoutTab({s,d}){
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),dur:"",exercises:[],notes:"",rating:3});
  const [selEx,setSelEx]=useState("");
  const [catFilter,setCatFilter]=useState("All");
  const [showTemplates,setShowTemplates]=useState(false);
  const [showPlates,setShowPlates]=useState(false);
  const [newPRs,setNewPRs]=useState([]);
  const [startTime,setStartTime]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const cats=["All",...new Set(s.exercises.map(e=>e.cat))];
  const prs=usePRs(s.workouts,s.exercises);

  // Live workout timer
  useEffect(()=>{
    if(!startTime)return;
    const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),1000);
    return()=>clearInterval(iv);
  },[startTime]);

  const fmtElapsed=(sec)=>{const m=Math.floor(sec/60);const s2=sec%60;return`${m}:${s2<10?"0":""}${s2}`;};

  // Motivational messages
  const motivations=["Let's get it! 💪","Time to grind!","No excuses today.","Push your limits.","Stronger every rep.",
    "You showed up — that's half the battle.","Make it count.","Beast mode: ON"];
  const motiv=useMemo(()=>motivations[Math.floor(Math.random()*motivations.length)],[show]);

  const startNew=()=>{
    setForm({date:today(),dur:"",exercises:[],notes:"",rating:3});
    setNewPRs([]);setStartTime(Date.now());setElapsed(0);setShow(true);
  };

  // Start from last workout (repeat) — auto-fills exercises with last weights
  const repeatLast=()=>{
    if(s.workouts.length===0)return;
    const last=s.workouts[0];
    const exs=last.exercises.map(ex=>({
      exerciseId:ex.exerciseId,
      sets:ex.sets.map(st=>({weight:st.weight.toString(),reps:st.reps.toString(),rpe:st.rpe?st.rpe.toString():"",done:true}))
    }));
    setForm({date:today(),dur:"",exercises:exs,notes:"",rating:3});
    setNewPRs([]);setStartTime(Date.now());setElapsed(0);setShow(true);
  };

  const loadTemplate=(t)=>{
    // Pre-fill weights from last time each exercise was done
    const exs=t.exs.map(eid=>{
      const lastW=findLastSets(eid,s.workouts);
      return{exerciseId:eid,sets:lastW||[{weight:"",reps:"",rpe:"",done:true}]};
    });
    setForm(f=>({...f,exercises:exs}));
    setShowTemplates(false);setStartTime(Date.now());setElapsed(0);setShow(true);
  };

  const addEx=()=>{
    if(!selEx)return;
    // Auto-fill from last workout
    const lastW=findLastSets(selEx,s.workouts);
    setForm(f=>({...f,exercises:[...f.exercises,{exerciseId:selEx,sets:lastW||[{weight:"",reps:"",rpe:"",done:true}]}]}));
    setSelEx("");
  };
  const addSet=(ei)=>{setForm(f=>{const exs=[...f.exercises];const l=exs[ei].sets[exs[ei].sets.length-1];exs[ei]={...exs[ei],sets:[...exs[ei].sets,{weight:l.weight,reps:l.reps,rpe:l.rpe,done:true}]};return{...f,exercises:exs};});};
  const updSet=(ei,si,k,v)=>{setForm(f=>{const exs=[...f.exercises],sets=[...exs[ei].sets];sets[si]={...sets[si],[k]:v};exs[ei]={...exs[ei],sets};return{...f,exercises:exs};});};
  const rmSet=(ei,si)=>setForm(f=>{const exs=[...f.exercises];exs[ei]={...exs[ei],sets:exs[ei].sets.filter((_,i)=>i!==si)};return{...f,exercises:exs};});
  const rmEx=(ei)=>setForm(f=>({...f,exercises:f.exercises.filter((_,i)=>i!==ei)}));

  const save=()=>{
    // Auto-fill duration from timer if not manually set
    const dur=parseInt(form.dur)||Math.round(elapsed/60)||0;
    const w={id:uid(),date:form.date,dur,rating:form.rating,
      exercises:form.exercises.map(e=>({...e,sets:e.sets.map(st=>({weight:parseFloat(st.weight)||0,reps:parseInt(st.reps)||0,rpe:parseFloat(st.rpe)||0,done:st.done}))})),
      notes:form.notes};
    const detected=[];
    w.exercises.forEach(ex=>{
      const name=s.exercises.find(e=>e.id===ex.exerciseId)?.name||ex.exerciseId;
      ex.sets.forEach(st=>{const e1rm=calc1RM(st.weight,st.reps);const prev=prs[ex.exerciseId];
        if(st.weight>0&&(!prev||e1rm>prev.e1rm))detected.push({name,weight:st.weight,reps:st.reps,e1rm});});});
    setNewPRs(detected);d({type:"ADD_W",w});setStartTime(null);
    if(detected.length===0)setShow(false);
  };

  const prevBest=(eid)=>{for(const w of s.workouts){const ex=w.exercises.find(e=>e.exerciseId===eid);
    if(ex){const b=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});if(b.weight>0)return`${b.weight}×${b.reps}`;}};return null;};

  // PR celebration
  if(newPRs.length>0){
    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",gap:20}}>
        <div style={{fontSize:60}}>🏆</div>

        {newPRs.map((pr,i)=>(
          <Card key={i} glow style={{width:"100%",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:V.text}}>{pr.name}</div>
            <div style={{fontSize:24,fontWeight:800,color:V.accent,fontFamily:V.mono,marginTop:4}}>{pr.weight} × {pr.reps}</div>
            <div style={{fontSize:12,color:V.text3,marginTop:2}}>Est. 1RM: {pr.e1rm} lbs</div>
          </Card>
        ))}
        <Btn full onClick={()=>{setNewPRs([]);setShow(false);}}>Done</Btn>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:8}}>
        <Btn full onClick={startNew}>{Icons.plus({size:16,color:V.bg})} New Workout</Btn>
        {s.workouts.length>0&&<Btn v="secondary" onClick={repeatLast} s={{flexShrink:0,fontSize:11}}>{Icons.refresh({size:14,color:V.text2})} Repeat</Btn>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn v="secondary" full onClick={()=>setShowTemplates(true)}>{Icons.copy({size:14,color:V.text2})} Templates</Btn>
        <Btn v="secondary" full onClick={()=>setShowPlates(true)}>{Icons.hash({size:14,color:V.text2})} Plates</Btn>
      </div>

      {showTemplates&&(
        <Sheet title="Workout Templates" onClose={()=>setShowTemplates(false)}>
          {TEMPLATES.map((t,i)=>(
            <Card key={i} onClick={()=>loadTemplate(t)} style={{marginBottom:8,padding:14}}>
              <div style={{fontSize:14,fontWeight:700,color:V.text}}>{t.name}</div>
              <div style={{fontSize:11,color:V.text3,marginTop:2}}>{t.desc}</div>
              <div style={{fontSize:10,color:V.accent,marginTop:4,fontFamily:V.mono}}>{t.exs.length} exercises</div>
            </Card>
          ))}
        </Sheet>
      )}
      {showPlates&&(<Sheet title="Plate Calculator" onClose={()=>setShowPlates(false)}><PlateCalc/></Sheet>)}

      {show&&(
        <Sheet title="Log Workout" onClose={()=>{setShow(false);setStartTime(null);}}>
          {/* Live timer + motivation */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,
            padding:"10px 14px",background:`${V.accent}06`,borderRadius:12,border:`1px solid ${V.accent}12`}}>
            <div style={{fontSize:11,color:V.text3,fontStyle:"italic"}}>{motiv}</div>
            {startTime&&(
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:6,height:6,borderRadius:3,background:V.accent,animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:14,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{fmtElapsed(elapsed)}</span>
              </div>
            )}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
            <Field label="Duration" type="number" value={form.dur} onChange={v=>setForm(f=>({...f,dur:v}))} unit="min" placeholder="60"/>
          </div>

          <RestTimer/>

          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,fontWeight:600}}>Add Exercise</div>
            <div style={{display:"flex",gap:8}}>
              <select value={selEx} onChange={e=>setSelEx(e.target.value)}
                style={{flex:1,padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
                  borderRadius:12,color:V.text,fontSize:14,outline:"none",minHeight:44,WebkitAppearance:"none"}}>
                <option value="" style={{background:"#14141f"}}>Select...</option>
                {s.exercises.filter(e=>catFilter==="All"||e.cat===catFilter).map(e=>(
                  <option key={e.id} value={e.id} style={{background:"#14141f"}}>{e.name}</option>
                ))}
              </select>
              {selEx&&(()=>{const yt=s.exercises.find(e=>e.id===selEx)?.yt;return yt?<YTBtn yt={yt} size={44}/>:null;})()}
              <Btn v="small" onClick={addEx} s={{minHeight:44,padding:"0 14px"}}>{Icons.plus({size:16,color:V.accent})}</Btn>
            </div>
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>{cats.map(c=><Chip key={c} label={c} active={catFilter===c} onClick={()=>setCatFilter(c)}/>)}</div>
          </div>

          {form.exercises.map((ex,ei)=>{
            const info=s.exercises.find(e=>e.id===ex.exerciseId);
            const pb=prevBest(ex.exerciseId);
            return(
              <div key={ei} style={{marginBottom:14,padding:14,background:"rgba(255,255,255,0.02)",borderRadius:14,border:`1px solid ${V.cardBorder}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
                    <span style={{fontSize:14,color:V.text,fontWeight:700}}>{info?.name}</span>
                    <YTBtn yt={info?.yt} size={24}/>
                    {pb&&<span style={{fontSize:10,color:V.text3}}>PR:{pb}</span>}
                  </div>
                  <button onClick={()=>rmEx(ei)} style={{background:"none",border:"none",padding:8,cursor:"pointer"}}>{Icons.trash({size:14,color:V.text3})}</button>
                </div>
                {(()=>{const sug=getOverloadSuggestion(ex.exerciseId,s.workouts,s.units);return sug?(
                  <div style={{marginBottom:10,padding:"8px 10px",
                    background:sug.type==="deload"?`${V.warn}08`:sug.type==="increase"?`${V.accent}08`:`${V.accent2}08`,
                    borderRadius:8,border:`1px solid ${sug.type==="deload"?V.warn:sug.type==="increase"?V.accent:V.accent2}15`}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {Icons.zap({size:12,color:sug.type==="deload"?V.warn:V.accent})}
                      <span style={{fontSize:11,color:sug.type==="deload"?V.warn:V.accent,fontWeight:700}}>
                        {sug.type==="increase"?"↑ Increase":sug.type==="deload"?"↓ Deload":sug.type==="repeat"?"→ Repeat":"→ +1 Rep"}
                      </span>
                      <span style={{flex:1}}/>
                      <span style={{fontSize:10,color:V.text3,fontFamily:V.mono}}>E1RM: {sug.e1rm}</span>
                    </div>
                    <div style={{fontSize:11,color:V.text2,marginTop:4}}>
                      Last: <span style={{fontFamily:V.mono}}>{sug.allSets}</span>
                    </div>
                    <div style={{fontSize:12,color:V.text,fontWeight:700,marginTop:2,fontFamily:V.mono}}>
                      → Try {sug.suggest}
                    </div>
                    <div style={{fontSize:9,color:V.text3,marginTop:2}}>{sug.reason}</div>
                  </div>
                ):null;})()}
                <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 28px",gap:4,marginBottom:6}}>
                  <span style={{fontSize:9,color:V.text3,textAlign:"center"}}>#</span>
                  <span style={{fontSize:9,color:V.text3}}>{wUnit(s.units).toUpperCase()}</span><span style={{fontSize:9,color:V.text3}}>REPS</span>
                  <span style={{fontSize:9,color:V.text3}}>RPE</span><span/>
                </div>
                {ex.sets.map((st,si)=>(
                  <div key={si} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 28px",gap:4,marginBottom:4,alignItems:"center"}}>
                    <span style={{fontSize:12,color:V.text3,textAlign:"center",fontFamily:V.mono}}>{si+1}</span>
                    {["weight","reps","rpe"].map(k=>(
                      <input key={k} type="number" inputMode="decimal" value={st[k]} onChange={e=>updSet(ei,si,k,e.target.value)}
                        placeholder="0" style={{padding:"10px 8px",background:"rgba(255,255,255,0.04)",border:`1px solid rgba(255,255,255,0.05)`,
                          borderRadius:10,color:V.text,fontSize:15,fontFamily:V.mono,outline:"none",width:"100%",
                          boxSizing:"border-box",textAlign:"center",minHeight:40,WebkitAppearance:"none"}}/>
                    ))}
                    <button onClick={()=>rmSet(ei,si)} disabled={ex.sets.length<=1}
                      style={{background:"none",border:"none",padding:4,cursor:ex.sets.length<=1?"default":"pointer",opacity:ex.sets.length<=1?.2:1}}>
                      {Icons.x({size:13,color:V.text3})}</button>
                  </div>
                ))}
                <Btn v="small" onClick={()=>addSet(ei)} s={{marginTop:8,width:"100%"}}>{Icons.plus({size:13,color:V.accent})} Add Set</Btn>
              </div>
            );
          })}

          {/* Rating */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,fontWeight:600}}>Workout Rating</div>
            <div style={{display:"flex",gap:6}}>
              {[1,2,3,4,5].map(r=>(
                <button key={r} onClick={()=>setForm(f=>({...f,rating:r}))}
                  style={{fontSize:22,background:"none",border:"none",cursor:"pointer",padding:4,
                    color:r<=form.rating?V.warn:V.text3,WebkitTapHighlightColor:"transparent"}}>★</button>
              ))}
            </div>
          </div>

          <Field label="Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} placeholder="How did it feel?"/>
          <Btn full onClick={save} disabled={form.exercises.length===0} s={{marginTop:12}}>{Icons.check({size:16,color:V.bg})} Save Workout</Btn>
        </Sheet>
      )}

      {/* History */}
      {s.workouts.length===0?(
        <div style={{textAlign:"center",padding:40,color:V.text3,fontSize:13}}>No workouts yet</div>
      ):s.workouts.slice(0,15).map(w=>{
        const vol=w.exercises.reduce((s,e)=>s+e.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0);
        return(
          <Card key={w.id} style={{padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,color:V.text2}}>{fmtFull(w.date)}</span>
                {w.rating&&<span style={{fontSize:8,color:V.warn}}>{Array.from({length:w.rating}).map(()=>"★").join("")}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,color:V.text3}}>{w.dur}min</span>
                <button onClick={()=>d({type:"DEL_W",id:w.id})} style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:12,color:V.text3})}</button>
              </div>
            </div>
            {w.exercises.map((ex,i)=>{
              const exInfo=s.exercises.find(e=>e.id===ex.exerciseId);
              const top=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});
              return(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",
                  borderBottom:i<w.exercises.length-1?`1px solid rgba(255,255,255,0.03)`:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:12,color:V.text}}>{exInfo?.name||ex.exerciseId}</span>
                    <YTBtn yt={exInfo?.yt} size={18}/>
                  </div>
                  <span style={{fontSize:11,color:V.accent,fontFamily:V.mono}}>{top.weight}×{top.reps} · {ex.sets.length}s</span>
                </div>
              );
            })}
            <div style={{marginTop:4,fontSize:11,color:V.accent2,fontFamily:V.mono,textAlign:"right"}}>{vol.toLocaleString()} lbs</div>
          </Card>
        );
      })}
    </div>
  );
}


// ═══════════════════════════════════════
//  NUTRITION TAB
// ═══════════════════════════════════════
function NutritionTab({s,d}){
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),cal:"",protein:"",carbs:"",fat:"",fiber:"",water:"",sleep:"",
    meals:[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
  const [activeMeal,setActiveMeal]=useState(null);
  const [scanMeal,setScanMeal]=useState(null);

  const start=()=>{
    const ex=s.nutrition.find(n=>n.date===today());
    if(ex)setForm({...ex,cal:ex.cal.toString(),protein:ex.protein.toString(),carbs:ex.carbs.toString(),fat:ex.fat.toString(),
      fiber:(ex.fiber||"").toString(),water:(ex.water||"").toString(),sleep:(ex.sleep||"").toString(),
      meals:ex.meals||[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
    else setForm({date:today(),cal:"",protein:"",carbs:"",fat:"",fiber:"",water:"",sleep:"",
      meals:[{name:"Breakfast",items:[]},{name:"Lunch",items:[]},{name:"Dinner",items:[]},{name:"Snacks",items:[]}]});
    setShow(true);
  };

  const addFoodToMeal=(mi,food)=>{setForm(f=>{const m=[...f.meals];m[mi]={...m[mi],items:[...(m[mi].items||[]),food]};return{...f,meals:m};});};
  const rmFoodFromMeal=(mi,fi)=>{setForm(f=>{const m=[...f.meals];m[mi]={...m[mi],items:m[mi].items.filter((_,i)=>i!==fi)};return{...f,meals:m};});};

  const autoCalc=()=>{
    let cal=0,protein=0,carbs=0,fat=0;
    form.meals.forEach(m=>(m.items||[]).forEach(i=>{cal+=i.cal;protein+=i.protein;carbs+=i.carbs||0;fat+=i.fat||0;}));
    setForm(f=>({...f,cal:cal.toString(),protein:protein.toString(),carbs:carbs.toString(),fat:fat.toString()}));
  };

  const save=()=>{
    d({type:"ADD_N",n:{id:uid(),date:form.date,cal:parseInt(form.cal)||0,protein:parseInt(form.protein)||0,
      carbs:parseInt(form.carbs)||0,fat:parseInt(form.fat)||0,fiber:parseInt(form.fiber)||0,
      water:parseInt(form.water)||0,sleep:parseFloat(form.sleep)||0,meals:form.meals}});
    setShow(false);
  };

  const week=s.nutrition.filter(n=>n.date>=ago(7));
  const avgCal=week.length?Math.round(week.reduce((s,n)=>s+n.cal,0)/week.length):0;
  const avgP=week.length?Math.round(week.reduce((s,n)=>s+n.protein,0)/week.length):0;
  const totalItems=form.meals.reduce((s,m)=>(m.items||[]).length+s,0);

  const macroChart=useMemo(()=>
    s.nutrition.filter(n=>n.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date))
      .map(n=>({date:fmtShort(n.date),P:n.protein,C:n.carbs,F:n.fat}))
  ,[s.nutrition,s.range]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={start}>{Icons.plus({size:16,color:V.bg})} Log Nutrition</Btn>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat icon={Icons.flame} label="Avg Calories" value={avgCal} unit="kcal" color={V.warn}/>
        <Stat icon={Icons.target} label="Avg Protein" value={avgP} unit="g" color={V.accent}/>
      </div>

      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Macros</span>
        <ResponsiveContainer width="100%" height={150}>
          <BarChart data={macroChart} barSize={8}>
            <CartesianGrid {...chartCfg.grid} vertical={false}/>
            <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
            <YAxis {...chartCfg.axis} width={28}/>
            <Tooltip {...chartCfg.tip}/>
            <Bar dataKey="P" stackId="a" fill={V.accent}/>
            <Bar dataKey="C" stackId="a" fill={V.accent2}/>
            <Bar dataKey="F" stackId="a" fill={V.warn} radius={[3,3,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>

      {show&&(
        <Sheet title="Log Nutrition" onClose={()=>setShow(false)}>
          <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>

          {/* Meals with food database search */}
          {form.meals.map((meal,mi)=>{
            const mCal=(meal.items||[]).reduce((s,i)=>s+i.cal,0);
            const mP=(meal.items||[]).reduce((s,i)=>s+i.protein,0);
            return(
              <div key={mi} style={{marginBottom:12,padding:12,background:"rgba(255,255,255,0.02)",borderRadius:14,border:`1px solid ${V.cardBorder}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:700,color:V.text}}>{meal.name}</span>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {mCal>0&&<span style={{fontSize:10,color:V.warn,fontFamily:V.mono}}>{mCal}cal · {mP}P</span>}
                    <button onClick={()=>setScanMeal(mi)}
                      style={{background:`${V.accent2}15`,border:"none",borderRadius:8,padding:"4px 8px",cursor:"pointer",
                        display:"flex",alignItems:"center",gap:3,WebkitTapHighlightColor:"transparent"}}>
                      {Icons.scan({size:12,color:V.accent2})}
                    </button>
                    <button onClick={()=>setActiveMeal(activeMeal===mi?null:mi)}
                      style={{background:`${V.accent}15`,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",
                        fontSize:11,color:V.accent,fontWeight:600,WebkitTapHighlightColor:"transparent"}}>
                      {activeMeal===mi?"Close":"+ Food"}
                    </button>
                  </div>
                </div>
                {(meal.items||[]).map((item,fi)=>(
                  <div key={fi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                    <span style={{fontSize:12,color:V.text2,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      <span style={{fontSize:10,color:V.text3,fontFamily:V.mono}}>{item.cal} · {item.protein}P</span>
                      <button onClick={()=>rmFoodFromMeal(mi,fi)} style={{background:"none",border:"none",padding:2,cursor:"pointer"}}>{Icons.x({size:12,color:V.text3})}</button>
                    </div>
                  </div>
                ))}
                {activeMeal===mi&&<div style={{marginTop:8}}><FoodSearch onAdd={(food)=>addFoodToMeal(mi,food)}/></div>}
              </div>
            );
          })}

          {totalItems>0&&<Btn v="small" full onClick={autoCalc} s={{marginBottom:12}}>Auto-calculate totals from food items</Btn>}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Calories" type="number" value={form.cal} onChange={v=>setForm(f=>({...f,cal:v}))} unit="kcal"/>
            <Field label="Protein" type="number" value={form.protein} onChange={v=>setForm(f=>({...f,protein:v}))} unit="g"/>
            <Field label="Carbs" type="number" value={form.carbs} onChange={v=>setForm(f=>({...f,carbs:v}))} unit="g"/>
            <Field label="Fat" type="number" value={form.fat} onChange={v=>setForm(f=>({...f,fat:v}))} unit="g"/>
            <Field label="Water" type="number" value={form.water} onChange={v=>setForm(f=>({...f,water:v}))} unit="cups"/>
            <Field label="Sleep" type="number" value={form.sleep} onChange={v=>setForm(f=>({...f,sleep:v}))} unit="hrs" step="0.5"/>
          </div>

          <Btn full onClick={save} s={{marginTop:12}}>{Icons.check({size:16,color:V.bg})} Save Nutrition</Btn>
        </Sheet>
      )}

      {scanMeal!==null&&(
        <BarcodeScanner
          onResult={(food)=>addFoodToMeal(scanMeal,food)}
          onClose={()=>setScanMeal(null)}
        />
      )}

      {/* History */}
      {s.nutrition.slice(0,14).map(n=>(
        <Card key={n.id} style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:12,color:V.text2}}>{fmtFull(n.date)}</span>
              {n.sleep>0&&<span style={{fontSize:10,color:V.purple}}>{Icons.moon({size:10,color:V.purple})} {n.sleep.toFixed(1)}h</span>}
            </div>
            <button onClick={()=>d({type:"DEL_N",id:n.id})} style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:13,color:V.text3})}</button>
          </div>
          <div style={{display:"flex",gap:12,marginTop:8,alignItems:"baseline"}}>
            <span style={{fontSize:18,fontWeight:700,color:V.warn,fontFamily:V.mono}}>{n.cal}<span style={{fontSize:10,color:V.text3}}> kcal</span></span>
            <span style={{fontSize:12,color:V.accent,fontFamily:V.mono}}>{n.protein}P</span>
            <span style={{fontSize:12,color:V.accent2,fontFamily:V.mono}}>{n.carbs}C</span>
            <span style={{fontSize:12,color:V.warn,fontFamily:V.mono}}>{n.fat}F</span>
          </div>
          <Progress val={n.cal} max={s.goals.cal} color={V.warn} h={4}/>
        </Card>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════
//  BODY TAB
// ═══════════════════════════════════════
function BodyTab({s,d}){
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),weight:"",bf:"",chest:"",waist:"",arms:"",thighs:""});

  const save=()=>{
    d({type:"ADD_B",b:{id:uid(),date:form.date,weight:parseFloat(form.weight)||0,bf:parseFloat(form.bf)||0,
      chest:parseFloat(form.chest)||0,waist:parseFloat(form.waist)||0,arms:parseFloat(form.arms)||0,thighs:parseFloat(form.thighs)||0}});
    setShow(false);
  };

  const latest=s.body[0]; const prev=s.body[1];
  const wc=latest&&prev?latest.weight-prev.weight:0;

  const trend=useMemo(()=>
    s.body.filter(m=>m.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date))
      .map(m=>({date:fmtShort(m.date),wt:+m.weight.toFixed(1),bf:+m.bf.toFixed(1)}))
  ,[s.body,s.range]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={()=>{setForm({date:today(),weight:"",bf:"",chest:"",waist:"",arms:"",thighs:""});setShow(true);}}>
        {Icons.plus({size:16,color:V.bg})} Log Measurement
      </Btn>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat icon={Icons.scale} label="Weight" value={latest?.weight.toFixed(1)||"—"} unit="lbs" color={V.purple}
          sub={wc!==0?`${wc>0?"+":""}${wc.toFixed(1)} lbs`:undefined}/>
        <Stat icon={Icons.activity} label="Body Fat" value={latest?.bf.toFixed(1)||"—"} unit="%" color={V.danger}/>
      </div>

      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Weight & BF%</span>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={trend}>
            <CartesianGrid {...chartCfg.grid} vertical={false}/>
            <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
            <YAxis yAxisId="w" domain={["dataMin-2","dataMax+2"]} {...chartCfg.axis} width={30}/>
            <YAxis yAxisId="b" orientation="right" domain={["dataMin-1","dataMax+1"]} {...chartCfg.axis} width={28}/>
            <Tooltip {...chartCfg.tip}/>
            <Line yAxisId="w" type="monotone" dataKey="wt" stroke={V.purple} strokeWidth={2} dot={{r:3}} name="Weight"/>
            <Line yAxisId="b" type="monotone" dataKey="bf" stroke={V.danger} strokeWidth={2} dot={{r:3}} name="BF%"/>
          </LineChart>
        </ResponsiveContainer>
      </Card>

      {latest&&(
        <Card>
          <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Measurements</span>
          {[{l:"Chest",v:latest.chest},{l:"Waist",v:latest.waist},{l:"Arms",v:latest.arms},{l:"Thighs",v:latest.thighs}].map(m=>(
            <div key={m.l} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{width:54,fontSize:12,color:V.text2}}>{m.l}</span>
              <div style={{flex:1,height:22,background:"rgba(255,255,255,0.03)",borderRadius:6,overflow:"hidden"}}>
                <div style={{width:`${(m.v/50)*100}%`,height:"100%",background:`linear-gradient(90deg,${V.accent}30,${V.accent2}30)`,borderRadius:6}}/>
              </div>
              <span style={{fontSize:14,color:V.text,fontFamily:V.mono,minWidth:44,textAlign:"right"}}>{m.v.toFixed(1)}"</span>
            </div>
          ))}
        </Card>
      )}

      {show&&(
        <Sheet title="Log Measurement" onClose={()=>setShow(false)}>
          <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Weight" type="number" value={form.weight} onChange={v=>setForm(f=>({...f,weight:v}))} unit="lbs" step="0.1"/>
            <Field label="Body Fat" type="number" value={form.bf} onChange={v=>setForm(f=>({...f,bf:v}))} unit="%" step="0.1"/>
            <Field label="Chest" type="number" value={form.chest} onChange={v=>setForm(f=>({...f,chest:v}))} unit="in" step="0.1"/>
            <Field label="Waist" type="number" value={form.waist} onChange={v=>setForm(f=>({...f,waist:v}))} unit="in" step="0.1"/>
            <Field label="Arms" type="number" value={form.arms} onChange={v=>setForm(f=>({...f,arms:v}))} unit="in" step="0.1"/>
            <Field label="Thighs" type="number" value={form.thighs} onChange={v=>setForm(f=>({...f,thighs:v}))} unit="in" step="0.1"/>
          </div>
          <Btn full onClick={save} s={{marginTop:12}}>{Icons.check({size:16,color:V.bg})} Save Nutrition</Btn>
        </Sheet>
      )}

      {/* History Table */}
      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:10}}>History</span>
        {s.body.slice(0,10).map(m=>(
          <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",
            borderBottom:`1px solid rgba(255,255,255,0.03)`}}>
            <span style={{fontSize:12,color:V.text3}}>{fmtShort(m.date)}</span>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:13,color:V.purple,fontFamily:V.mono}}>{m.weight.toFixed(1)}</span>
              <span style={{fontSize:12,color:V.danger,fontFamily:V.mono}}>{m.bf.toFixed(1)}%</span>
              <button onClick={()=>d({type:"DEL_B",id:m.id})} style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>{Icons.trash({size:12,color:V.text3})}</button>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════
//  ANALYTICS TAB
// ═══════════════════════════════════════
function AnalyticsTab({s}){
  const [selEx,setSelEx]=useState("bench");

  const exProg=useMemo(()=>{
    return s.workouts.filter(w=>w.date>=ago(s.range)).sort((a,b)=>a.date.localeCompare(b.date)).reduce((arr,w)=>{
      const ex=w.exercises.find(e=>e.exerciseId===selEx);
      if(ex){
        const mw=Math.max(...ex.sets.map(st=>st.weight));
        const vol=ex.sets.reduce((s,st)=>s+st.weight*st.reps,0);
        const e1rm=Math.max(...ex.sets.map(st=>st.weight*(1+st.reps/30)));
        arr.push({date:fmtShort(w.date),max:mw,vol,e1rm:Math.round(e1rm)});
      }
      return arr;
    },[]);
  },[s.workouts,selEx,s.range]);

  const volByGroup=useMemo(()=>{
    const g={};
    s.workouts.filter(w=>w.date>=ago(s.range)).forEach(w=>w.exercises.forEach(ex=>{
      const info=s.exercises.find(e=>e.id===ex.exerciseId);
      if(info){const v=ex.sets.reduce((s,st)=>s+st.weight*st.reps,0);g[info.cat]=(g[info.cat]||0)+v;}
    }));
    return Object.entries(g).map(([name,value])=>({name,value}));
  },[s.workouts,s.exercises,s.range]);

  const freq=useMemo(()=>{
    const c={};
    s.workouts.filter(w=>w.date>=ago(s.range)).forEach(w=>{const dy=new Date(w.date+"T12:00:00").getDay();c[dy]=(c[dy]||0)+1;});
    return["S","M","T","W","T","F","S"].map((d,i)=>({d,n:c[i]||0}));
  },[s.workouts,s.range]);

  const maxF=Math.max(...freq.map(f=>f.n),1);
  const colors=[V.accent,V.accent2,V.purple,V.warn,V.danger,"#ffd93d"];
  const exOpts=[...new Set(s.workouts.flatMap(w=>w.exercises.map(e=>e.exerciseId)))];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Exercise Selector */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:13,color:V.text2,fontWeight:600}}>Exercise Progression</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {exOpts.map(id=>(
            <Chip key={id} label={s.exercises.find(e=>e.id===id)?.name||id} active={selEx===id} onClick={()=>setSelEx(id)}/>
          ))}
        </div>
        <span style={{fontSize:11,color:V.text3,display:"block",marginBottom:6}}>Max Weight & Est. 1RM</span>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={exProg}>
            <CartesianGrid {...chartCfg.grid} vertical={false}/>
            <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
            <YAxis {...chartCfg.axis} width={30}/>
            <Tooltip {...chartCfg.tip}/>
            <Line type="monotone" dataKey="max" stroke={V.accent} strokeWidth={2} dot={{r:3}} name="Max"/>
            <Line type="monotone" dataKey="e1rm" stroke={V.purple} strokeWidth={2} strokeDasharray="5 5" dot={{r:2}} name="E1RM"/>
          </LineChart>
        </ResponsiveContainer>
      </Card>

      {/* Volume Pie */}
      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:12}}>Volume by Muscle</span>
        <ResponsiveContainer width="100%" height={200}>
          <PieChart>
            <Pie data={volByGroup} cx="50%" cy="50%" innerRadius={50} outerRadius={75} dataKey="value" paddingAngle={3}>
              {volByGroup.map((_,i)=><Cell key={i} fill={colors[i%colors.length]}/>)}
            </Pie>
            <Tooltip {...chartCfg.tip}/>
          </PieChart>
        </ResponsiveContainer>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
          {volByGroup.map((g,i)=>(
            <span key={g.name} style={{fontSize:10,color:colors[i%colors.length],display:"flex",alignItems:"center",gap:4,fontWeight:600}}>
              <span style={{width:7,height:7,borderRadius:2,background:colors[i%colors.length]}}/>{g.name}
            </span>
          ))}
        </div>
      </Card>

      {/* Frequency */}
      <Card>
        <span style={{fontSize:13,color:V.text2,fontWeight:600,display:"block",marginBottom:14}}>Weekly Frequency</span>
        <div style={{display:"flex",gap:8,justifyContent:"center",padding:"8px 0"}}>
          {freq.map((f,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flex:1}}>
              <div style={{width:"100%",maxWidth:32,height:80,borderRadius:8,background:"rgba(255,255,255,0.03)",
                position:"relative",overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
                <div style={{width:"100%",height:`${(f.n/maxF)*100}%`,background:`linear-gradient(to top,${V.accent}40,${V.accent2}40)`,
                  borderRadius:6,transition:"height .4s ease",minHeight:f.n>0?6:0}}/>
              </div>
              <span style={{fontSize:10,color:V.text3,fontWeight:600}}>{f.d}</span>
              <span style={{fontSize:11,color:V.accent,fontFamily:V.mono}}>{f.n}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════
//  CALENDAR TAB
// ═══════════════════════════════════════
const WORKOUT_TYPES = ["Rest","Chest","Back","Legs","Shoulders","Arms","Core","Cardio","Push","Pull","Upper","Lower","Full Body","Custom"];
const typeColors = {
  "Rest":"#333","Chest":V.accent,"Back":V.accent2,"Legs":V.purple,"Shoulders":V.warn,
  "Arms":"#ff6b9d","Core":"#ffd93d","Cardio":"#ff6b6b","Push":V.accent,"Pull":V.accent2,
  "Upper":"#e879f9","Lower":"#fb923c","Full Body":"#34d399","Custom":"#94a3b8",
};
const WORKOUT_TYPES_COLORS = typeColors;

function CalendarTab({s,d}){
  const [viewDate,setViewDate]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const [selDate,setSelDate]=useState(null);
  const [editWeekly,setEditWeekly]=useState(false);
  const [weeklyDraft,setWeeklyDraft]=useState(s.schedule.weekly);
  const [assignSheet,setAssignSheet]=useState(null); // date string for override assign

  const todayStr=today();
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];

  // Build calendar grid
  const calDays=useMemo(()=>{
    const first=new Date(viewDate.y,viewDate.m,1);
    const startDay=first.getDay();
    const daysInMonth=new Date(viewDate.y,viewDate.m+1,0).getDate();
    const prevMonthDays=new Date(viewDate.y,viewDate.m,0).getDate();
    const cells=[];
    // Previous month filler
    for(let i=startDay-1;i>=0;i--){
      const d=prevMonthDays-i;
      const dt=new Date(viewDate.y,viewDate.m-1,d);
      cells.push({day:d,date:dt.toISOString().split("T")[0],inMonth:false});
    }
    // Current month
    for(let i=1;i<=daysInMonth;i++){
      const dt=new Date(viewDate.y,viewDate.m,i);
      cells.push({day:i,date:dt.toISOString().split("T")[0],inMonth:true});
    }
    // Next month filler
    const remaining=7-(cells.length%7);
    if(remaining<7){
      for(let i=1;i<=remaining;i++){
        const dt=new Date(viewDate.y,viewDate.m+1,i);
        cells.push({day:i,date:dt.toISOString().split("T")[0],inMonth:false});
      }
    }
    return cells;
  },[viewDate]);

  // Get workout type for a date
  const getType=(dateStr)=>{
    if(s.schedule.overrides[dateStr])return s.schedule.overrides[dateStr];
    const dow=new Date(dateStr+"T12:00:00").getDay();
    return s.schedule.weekly[dow]||"Rest";
  };

  // Get the workout done on a date
  const getWorkout=(dateStr)=>s.workouts.find(w=>w.date===dateStr);

  // Get the LAST workout matching a type (looking backwards from date)
  const getLastOfType=(type,beforeDate)=>{
    // Map type to exercise categories
    const catMap={"Chest":"Chest","Back":"Back","Legs":"Legs","Shoulders":"Shoulders","Arms":"Arms","Core":"Core","Cardio":"Cardio",
      "Push":"Chest","Pull":"Back","Upper":"Chest","Lower":"Legs","Full Body":"Chest"};
    // Find workouts that had exercises in this category
    const matchingCat=catMap[type];
    if(!matchingCat)return null;
    // For compound types, just find any recent workout
    if(["Push","Pull","Upper","Lower","Full Body"].includes(type)){
      return s.workouts.filter(w=>w.date<beforeDate).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
    }
    // For specific categories, find workouts that included that muscle group
    for(const w of s.workouts.filter(wk=>wk.date<beforeDate).sort((a,b)=>b.date.localeCompare(a.date))){
      const hasCategory=w.exercises.some(ex=>{
        const info=s.exercises.find(e=>e.id===ex.exerciseId);
        return info?.cat===matchingCat;
      });
      if(hasCategory)return w;
    }
    return null;
  };

  // Get recommended exercises for a workout type
  const getExercisesForType=(type)=>{
    const catMap={"Chest":"Chest","Back":"Back","Legs":"Legs","Shoulders":"Shoulders","Arms":"Arms","Core":"Core","Cardio":"Cardio"};
    const multiMap={"Push":["Chest","Shoulders","Arms"],"Pull":["Back","Arms"],"Upper":["Chest","Back","Shoulders","Arms"],
      "Lower":["Legs","Core"],"Full Body":["Chest","Back","Legs","Shoulders","Arms"]};
    const cats=multiMap[type]?multiMap[type]:(catMap[type]?[catMap[type]]:[]);
    return s.exercises.filter(e=>cats.includes(e.cat));
  };

  const prevMonth=()=>setViewDate(v=>v.m===0?{y:v.y-1,m:11}:{...v,m:v.m-1});
  const nextMonth=()=>setViewDate(v=>v.m===11?{y:v.y+1,m:0}:{...v,m:v.m+1});
  const goToday=()=>{const n=new Date();setViewDate({y:n.getFullYear(),m:n.getMonth()});};

  const saveWeekly=()=>{
    Object.entries(weeklyDraft).forEach(([day,label])=>{
      d({type:"SET_WEEKLY",day:parseInt(day),label});
    });
    setEditWeekly(false);
  };

  // Selected day detail
  const selType=selDate?getType(selDate):null;
  const selWorkout=selDate?getWorkout(selDate):null;
  const selLastOfType=selDate&&selType&&selType!=="Rest"?getLastOfType(selType,selDate):null;
  const selExercises=selType?getExercisesForType(selType):[];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Month Navigation */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",padding:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          {Icons.chevLeft({size:20,color:V.text2})}
        </button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:700,color:V.text}}>{monthNames[viewDate.m]}</div>
          <div style={{fontSize:12,color:V.text3}}>{viewDate.y}</div>
        </div>
        <button onClick={nextMonth} style={{background:"none",border:"none",padding:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          {Icons.chevRight({size:20,color:V.text2})}
        </button>
      </div>

      {/* Today button */}
      <div style={{display:"flex",justifyContent:"center"}}>
        <Btn v="small" onClick={goToday} s={{fontSize:11}}>Today</Btn>
      </div>

      {/* Weekly Plan Strip */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,color:V.text2,fontWeight:700}}>Weekly Plan</span>
          <Btn v="ghost" onClick={()=>{setWeeklyDraft({...s.schedule.weekly});setEditWeekly(true);}} s={{fontSize:11,padding:"4px 8px"}}>Edit</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {dayNames.map((dn,i)=>{
            const type=s.schedule.weekly[i]||"Rest";
            const color=typeColors[type]||V.text3;
            return(
              <div key={i} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:V.text3,marginBottom:3,fontWeight:600}}>{dn}</div>
                <div style={{fontSize:9,color:color,fontWeight:700,padding:"4px 2px",
                  background:`${color}12`,borderRadius:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {type==="Rest"?"—":type.slice(0,4)}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Calendar Grid */}
      <Card style={{padding:12}}>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
          {dayNames.map(dn=>(
            <div key={dn} style={{textAlign:"center",fontSize:10,color:V.text3,fontWeight:700,padding:"4px 0"}}>{dn}</div>
          ))}
        </div>
        {/* Date cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {calDays.map((cell,i)=>{
            const type=getType(cell.date);
            const isToday=cell.date===todayStr;
            const isSel=cell.date===selDate;
            const hasWorkout=!!getWorkout(cell.date);
            const color=typeColors[type]||"#333";
            const isOverride=!!s.schedule.overrides[cell.date];
            return(
              <button key={i} onClick={()=>setSelDate(cell.date===selDate?null:cell.date)}
                style={{
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  aspectRatio:"1",borderRadius:10,border:isSel?`2px solid ${V.accent}`:isToday?`1.5px solid ${V.accent}50`:"2px solid transparent",
                  background:isSel?`${V.accent}12`:type!=="Rest"?`${color}08`:"transparent",
                  cursor:"pointer",padding:2,WebkitTapHighlightColor:"transparent",position:"relative",
                  opacity:cell.inMonth?1:0.25,
                }}>
                <span style={{fontSize:13,fontWeight:isToday?800:500,color:cell.inMonth?V.text:V.text3,
                  fontFamily:V.mono,lineHeight:1}}>{cell.day}</span>
                {type!=="Rest"&&cell.inMonth&&(
                  <span style={{fontSize:6,color:color,fontWeight:800,marginTop:1,textTransform:"uppercase",lineHeight:1}}>
                    {type.slice(0,3)}
                  </span>
                )}
                {hasWorkout&&cell.inMonth&&(
                  <div style={{position:"absolute",bottom:3,width:4,height:4,borderRadius:2,background:V.accent}}/>
                )}
                {isOverride&&cell.inMonth&&(
                  <div style={{position:"absolute",top:2,right:3,width:4,height:4,borderRadius:2,background:V.warn}}/>
                )}
              </button>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
          <span style={{fontSize:9,color:V.text3,display:"flex",alignItems:"center",gap:3}}>
            <span style={{width:5,height:5,borderRadius:3,background:V.accent}}/> Completed
          </span>
          <span style={{fontSize:9,color:V.text3,display:"flex",alignItems:"center",gap:3}}>
            <span style={{width:5,height:5,borderRadius:3,background:V.warn}}/> Override
          </span>
        </div>
      </Card>

      {/* Selected Day Detail */}
      {selDate&&(
        <Card glow>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:V.text}}>{fmtFull(selDate)}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                <span style={{fontSize:12,fontWeight:700,color:typeColors[selType]||V.text3,
                  background:`${typeColors[selType]||V.text3}15`,padding:"3px 10px",borderRadius:8}}>
                  {selType}
                </span>
                {selDate===todayStr&&<span style={{fontSize:10,color:V.accent,fontWeight:700}}>TODAY</span>}
              </div>
            </div>
            <Btn v="small" onClick={()=>setAssignSheet(selDate)} s={{fontSize:11}}>Change</Btn>
          </div>

          {/* What was done */}
          {selWorkout?(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:V.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8,
                display:"flex",alignItems:"center",gap:5}}>
                {Icons.check({size:13,color:V.accent})} Completed · {selWorkout.dur}min
              </div>
              {selWorkout.exercises.map((ex,i)=>{
                const exInfo=s.exercises.find(e=>e.id===ex.exerciseId);
                const top=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",
                    borderBottom:i<selWorkout.exercises.length-1?`1px solid rgba(255,255,255,0.04)`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13,color:V.text}}>{exInfo?.name||ex.exerciseId}</span>
                      {exInfo?.yt&&(
                        <a href={`https://www.youtube.com/watch?v=${exInfo.yt}`} target="_blank" rel="noopener noreferrer"
                          style={{width:20,height:20,borderRadius:5,background:"rgba(255,0,0,0.10)",
                            display:"inline-flex",alignItems:"center",justifyContent:"center",textDecoration:"none",
                            WebkitTapHighlightColor:"transparent"}}>
                          {Icons.play({size:8,color:"#ff4444"})}
                        </a>
                      )}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:12,color:V.accent,fontFamily:V.mono}}>{top.weight}×{top.reps}</span>
                      <span style={{fontSize:10,color:V.text3,marginLeft:6}}>{ex.sets.length}s</span>
                    </div>
                  </div>
                );
              })}
            </div>
          ):(
            selType!=="Rest"&&(
              <div style={{padding:"12px 0",marginBottom:10,borderBottom:`1px solid ${V.cardBorder}`}}>
                <div style={{fontSize:11,color:V.text3,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                  {Icons.clock({size:13,color:V.text3})} Not yet completed
                </div>
              </div>
            )
          )}

          {/* Last time this type was done */}
          {selType!=="Rest"&&selLastOfType&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:V.warn,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>
                Last {selType} Day — {fmtFull(selLastOfType.date)}
              </div>
              {selLastOfType.exercises.map((ex,i)=>{
                const exInfo=s.exercises.find(e=>e.id===ex.exerciseId);
                const top=ex.sets.reduce((m,st)=>st.weight>m.weight?st:m,{weight:0,reps:0});
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",
                    borderBottom:i<selLastOfType.exercises.length-1?`1px solid rgba(255,255,255,0.03)`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:12,color:V.text2}}>{exInfo?.name||ex.exerciseId}</span>
                      {exInfo?.yt&&(
                        <a href={`https://www.youtube.com/watch?v=${exInfo.yt}`} target="_blank" rel="noopener noreferrer"
                          style={{width:18,height:18,borderRadius:5,background:"rgba(255,0,0,0.08)",
                            display:"inline-flex",alignItems:"center",justifyContent:"center",textDecoration:"none"}}>

      {/* Assign Override Sheet */}
      {assignSheet&&(
        <Sheet title={`Assign — ${fmtFull(assignSheet)}`} onClose={()=>setAssignSheet(null)}>
          <div style={{fontSize:12,color:V.text3,marginBottom:12}}>

          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {WORKOUT_TYPES.map(t=>{
              const current=s.schedule.overrides[assignSheet];
              const isActive=current===t;
              return(
                <button key={t} onClick={()=>{d({type:"SET_OVERRIDE",date:assignSheet,label:t});setAssignSheet(null);setSelDate(assignSheet);}}
                  style={{padding:"12px 16px",borderRadius:12,border:`1.5px solid ${isActive?typeColors[t]||V.text3:V.cardBorder}`,

            <Btn v="ghost" full onClick={()=>{d({type:"SET_OVERRIDE",date:assignSheet,label:null});setAssignSheet(null);}}

          )}
        </Sheet>
      )}
    </div>
  );
}
