//  SYSTEM HEALTH PANEL
// ═══════════════════════════════════════
function SystemHealthPanel({s}) {
  const [reconcile, setReconcile] = useState(() => ReconcileAPI.last());
  const [running, setRunning]     = useState(false);
  const [pending, setPending]     = useState(() => parseInt(LS.get('ft-pending-sync')) || 0);
  const [pushOk, setPushOk]       = useState(null); // null = checking
  const [swVer, setSwVer]         = useState(null);
  const [storageInfo, setStorageInfo] = useState({ used: 0, quota: 0, pct: 0 });

  // Live pending-queue updates
  useEffect(() => {
    const iv = setInterval(() => setPending(parseInt(LS.get('ft-pending-sync')) || 0), 3000);
    return () => clearInterval(iv);
  }, []);

  // SW version + push subscription status on mount
  useEffect(() => {
    (async () => {
      try {
        const regs = await navigator.serviceWorker?.getRegistrations();
        const reg = regs?.[0];
        if (reg) {
          // SW version is embedded as a query param on the SW script URL
          const url = reg.active?.scriptURL || '';
          const match = url.match(/sw\.js/);
          setSwVer(match ? SW_VERSION : 'unknown');
          const sub = await reg.pushManager?.getSubscription();
          setPushOk(!!sub);
        } else {
          setSwVer('not registered');
          setPushOk(false);
        }
      } catch(e) {
        setSwVer('unavailable');
        setPushOk(null);
      }
    })();
  }, []);

  // Storage quota via StorageManager API with localStorage fallback
  useEffect(() => {
    (async () => {
      try {
        if (navigator.storage?.estimate) {
          const { usage, quota } = await navigator.storage.estimate();
          setStorageInfo({
            used: usage,
            quota,
            pct: quota > 0 ? Math.round((usage / quota) * 100) : 0,
            source: 'quota',
          });
        } else {
          // Fallback: measure ft- keys in localStorage
          let bytes = 0;
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k?.startsWith('ft-')) bytes += (localStorage.getItem(k)?.length || 0) * 2;
          }
          setStorageInfo({ used: bytes, quota: 5 * 1024 * 1024, pct: Math.min(100, Math.round((bytes / (5 * 1024 * 1024)) * 100)), source: 'ls' });
        }
      } catch(e) { /* ignore */ }
    })();
  }, []);

  const runCheck = async () => {
    if (running) return;
    setRunning(true);
    const result = await ReconcileAPI.run(s);
    setReconcile(result);
    setRunning(false);
  };

  const lastSync = LS.get('ft-last-sync');
  const email    = s.profile?.email;

  const fmtAgo = (iso) => {
    if (!iso) return 'Never';
    const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (sec < 60)    return 'Just now';
    if (sec < 3600)  return `${Math.floor(sec/60)}m ago`;
    if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
    return `${Math.floor(sec/86400)}d ago`;
  };

  const fmtBytes = (n) => {
    if (!n) return '0 B';
    if (n < 1024)        return `${n} B`;
    if (n < 1024*1024)   return `${(n/1024).toFixed(1)} KB`;
    return `${(n/1024/1024).toFixed(2)} MB`;
  };

  // ── sub-components ──
  const HealthRow = ({ label, value, status, sub }) => {
    const dot = status === 'ok' ? V.accent : status === 'warn' ? V.warn : status === 'error' ? V.danger : 'rgba(255,255,255,0.2)';
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'10px 0', borderBottom:`1px solid rgba(255,255,255,0.03)` }}>
        <div>
          <div style={{ fontSize:12, color:V.text, fontWeight:600 }}>{label}</div>
          {sub && <div style={{ fontSize:10, color:V.text3, marginTop:1 }}>{sub}</div>}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ fontSize:12, color:V.text2, fontFamily:V.mono, textAlign:'right' }}>{value}</span>
          <div style={{ width:7, height:7, borderRadius:4, background:dot, flexShrink:0 }}/>
        </div>
      </div>
    );
  };

  const DomainRow = ({ label, result }) => {
    if (!result) return null;
    const { client, server, match, delta, status } = result;
    const s_icon = status === 'ok' ? '✓' : status === 'mismatch' ? '!' : status === 'error' ? '✕' : '?';
    const s_color = status === 'ok' ? V.accent : status === 'mismatch' ? V.warn : status === 'error' ? V.danger : V.text3;
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'8px 10px', borderRadius:8, background:'rgba(255,255,255,0.02)', marginBottom:4 }}>
        <span style={{ fontSize:11, color:V.text2 }}>{label}</span>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {server !== null && (
            <span style={{ fontSize:10, color:V.text3, fontFamily:V.mono }}>
              {client} local · {server} server
              {!match && delta !== 0 && (
                <span style={{ color:V.warn }}> ({delta > 0 ? '+' : ''}{delta})</span>
              )}
            </span>
          )}
          <span style={{ fontSize:11, fontWeight:700, color:s_color }}>{s_icon}</span>
        </div>
      </div>
    );
  };

  // Reconcile summary
  const recStatus = reconcile?.status;
  const recColor  = recStatus === 'ok' ? V.accent : recStatus === 'mismatch' ? V.warn : recStatus === 'error' ? V.danger : V.text3;
  const recLabel  = recStatus === 'ok' ? 'All domains in sync' : recStatus === 'mismatch' ? 'Count mismatch detected' : recStatus === 'error' ? 'Check failed' : 'Not run yet';

  return (
    <div>
      {/* Core metrics */}
      <div style={{ marginBottom:12 }}>
        <HealthRow
          label="Last sync"
          value={fmtAgo(lastSync)}
          status={!lastSync ? 'none' : (Date.now() - new Date(lastSync)) < 3600000 ? 'ok' : 'warn'}
          sub={lastSync ? new Date(lastSync).toLocaleString() : undefined}
        />
        <HealthRow
          label="Offline queue"
          value={pending === 0 ? 'Empty' : `${pending} item${pending !== 1 ? 's' : ''} pending`}
          status={pending === 0 ? 'ok' : 'warn'}
          sub={pending > 0 ? 'Will sync when connection restores' : undefined}
        />
        <HealthRow
          label="Service Worker"
          value={swVer || '…'}
          status={swVer && swVer !== 'not registered' && swVer !== 'unavailable' ? 'ok' : 'error'}
        />
        <HealthRow
          label="Push notifications"
          value={pushOk === null ? 'Checking…' : pushOk ? 'Active' : 'Not subscribed'}
          status={pushOk === null ? 'none' : pushOk ? 'ok' : 'warn'}
          sub={!pushOk && pushOk !== null ? 'Enable in Reminders settings' : undefined}
        />
        <HealthRow
          label="Storage used"
          value={`${fmtBytes(storageInfo.used)}${storageInfo.quota > 0 ? ` / ${fmtBytes(storageInfo.quota)}` : ''} (${storageInfo.pct}%)`}
          status={storageInfo.pct > 80 ? 'error' : storageInfo.pct > 50 ? 'warn' : 'ok'}
          sub={storageInfo.source === 'ls' ? 'Local storage estimate' : 'Origin storage (IndexedDB + cache + localStorage)'}
        />
        {email && (
          <HealthRow
            label="Account"
            value={email}
            status="ok"
          />
        )}
      </div>

      {/* Reconciliation section */}
      <div style={{ background:'rgba(255,255,255,0.02)', border:`1px solid ${V.cardBorder}`,
        borderRadius:12, padding:12, marginBottom:12 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:V.text }}>Data Integrity Check</div>
            <div style={{ fontSize:10, color:V.text3 }}>Compares your local records against server</div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {reconcile && (
              <div style={{ width:8, height:8, borderRadius:4, background:recColor }}/>
            )}
            <button onClick={runCheck} disabled={running || !email}
              style={{ padding:'5px 12px', borderRadius:7, border:'none', cursor:email ? 'pointer' : 'not-allowed',
                background: running ? 'rgba(255,255,255,0.04)' : `${V.accent}15`,
                color: running ? V.text3 : V.accent, fontSize:11, fontWeight:700, fontFamily:V.font,
                WebkitTapHighlightColor:'transparent' }}>
              {running ? '…Checking' : 'Run Check'}
            </button>
          </div>
        </div>

        {reconcile ? (
          <>
            <div style={{ fontSize:11, fontWeight:600, color:recColor, marginBottom:6 }}>{recLabel}</div>
            {reconcile.domains && Object.entries({
              workouts: 'Workouts',
              nutrition: 'Nutrition',
              body: 'Body Metrics',
              photos: 'Photos',
            }).map(([key, label]) => (
              <DomainRow key={key} label={label} result={reconcile.domains[key]} />
            ))}
            <div style={{ fontSize:9, color:V.text3, marginTop:6 }}>
              Last checked {fmtAgo(reconcile.ran_at)}
              {reconcile.status === 'mismatch' && (
                <span style={{ color:V.warn }}> · Push a sync to resolve differences</span>
              )}
            </div>
          </>
        ) : (
          <div style={{ fontSize:11, color:V.text3 }}>
            {email ? 'Tap Run Check to compare your local data with the server.' : 'Sign in to run integrity checks.'}
          </div>
        )}
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
        {[['ok', V.accent, 'Good'], ['warn', V.warn, 'Attention'], ['error', V.danger, 'Action needed']].map(([, color, label]) => (
          <div key={label} style={{ display:'flex', alignItems:'center', gap:4 }}>
            <div style={{ width:6, height:6, borderRadius:3, background:color }}/>
            <span style={{ fontSize:10, color:V.text3 }}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

        desc="Storage, export, demo data, and reset">

          {/* #35: Storage indicator */}
          {(()=>{
            let totalBytes=0;
            try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith("ft-")){totalBytes+=localStorage.getItem(k).length*2;}}}catch(e){}
            const mb=(totalBytes/1024/1024).toFixed(2);
            const maxMB=5;
            const pct=Math.min(100,Math.round((totalBytes/(maxMB*1024*1024))*100));
            return(
              <Card style={{padding:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:V.text}}>Local Storage</span>
                  <span style={{fontSize:11,color:pct>80?V.danger:V.text3,fontFamily:V.mono}}>{mb} / {maxMB} MB ({pct}%)</span>
                </div>
                <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,0.06)"}}>
                  <div style={{height:"100%",borderRadius:3,background:pct>80?V.danger:pct>50?V.warn:V.accent,width:`${pct}%`,transition:"width .3s"}}/>

                {pct>80&&<div style={{fontSize:9,color:V.danger,marginTop:4}}>Storage is getting full. Export your data and consider clearing old photos.</div>}

      </Row>

      <Row id="reminders" icon={Icons.calendar({size:16,color:V.accent})} label="Reminders"
        desc="Notifications for workouts, hydration, check-ins">

          <Btn full onClick={async()=>{
            if("Notification" in window){
              const perm=await Notification.requestPermission();
              if(perm==="granted"){
                LS.set("ft-reminders",true);
                LS.set("ft-push-subscribed",false);
                // Trigger Web Push subscription immediately
                if("serviceWorker" in navigator&&"PushManager" in window){
                  try{
                    const reg=await navigator.serviceWorker.ready;
                    let sub=await reg.pushManager.getSubscription();
                    if(!sub){
                      const vapidKey="BMZyIUQO08nuR7afvqNIWBK_ZOcr7PHwT2YwIxTa_ONwAD1YCaJ8Qkb4q4TTYSx_sTN-7-5vCzR8ApNZuyg-Ttc";
                      const padding='='.repeat((4-vapidKey.length%4)%4);
                      const b64=vapidKey.replace(/-/g,'+').replace(/_/g,'/')+padding;
                      const keyBytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
                      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:keyBytes});

              }else{SuccessToastCtrl.show("Permission denied");}
            }else{SuccessToastCtrl.show("Notifications not supported in this browser");}
          }}>{Icons.activity({size:14,color:V.bg})} Enable Notifications</Btn>
          <div style={{fontSize:10,color:V.text3,lineHeight:1.5}}>

              {Icons.check({size:12,color:V.accent})}
              <span style={{fontSize:11,color:V.accent,fontWeight:600}}>Notifications enabled</span>
            </div>
          )}
        </div>
      </Row>

      {/* System Health — expandable */}

          <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.02)",borderRadius:10,border:`1px solid ${V.cardBorder}`,marginTop:4}}>
            <div style={{fontSize:12,fontWeight:600,color:V.text,marginBottom:4}}>Your Data Rights</div>

            style={{display:"block",padding:"12px 16px",background:"rgba(255,107,107,0.06)",borderRadius:10,
              border:"1px solid rgba(255,107,107,0.12)",textDecoration:"none",textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:V.danger}}>Do Not Sell My Personal Information</div>
            <div style={{fontSize:10,color:V.text3,marginTop:2}}>Opens email to support@ironlog.space</div>
          </a>
        </div>
      </Row>

      {/* Donate */}
      <div style={{marginTop:6,padding:"16px 18px",background:"linear-gradient(135deg,rgba(34,211,238,0.06),rgba(168,85,247,0.06))",
        borderRadius:14,border:`1px solid rgba(34,211,238,0.12)`,textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:700,color:V.text,marginBottom:4}}>IRONLOG is free forever</div>
        <div style={{fontSize:11,color:V.text3,lineHeight:1.5,marginBottom:12}}>
          If you find value in this app, consider donating to support development and keep it ad-free.
        </div>
        <a href="https://www.paypal.com/paypalme/wiseworldir" target="_blank" rel="noopener"
          style={{display:"inline-flex",alignItems:"center",gap:8,padding:"10px 24px",borderRadius:10,
            background:"linear-gradient(135deg,#0070ba,#003087)",border:"none",textDecoration:"none",
            cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>Donate via PayPal</span>
        </a>
        <div style={{fontSize:9,color:V.text3,marginTop:8}}>marketing@wiseworldir.com</div>

        <Sheet title={legalView==="tos"?"Terms of Service":"Privacy Policy"} onClose={()=>setLegalView(null)}

        </Sheet>

  );

// ─── Onboarding Flow ───
function Onboarding({d}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState("");
  const [split,setSplit]=useState("PPL");
  const [units,setUnits]=useState("lbs");
  const [goals,setGoals]=useState({cal:"2400",protein:"180",carbs:"250",fat:"70",goalWeight:"175"});
  const [bw,setBw]=useState("");
  const [sending,setSending]=useState(false);
  const [agreed,setAgreed]=useState(false);
  const [showLegal,setShowLegal]=useState(null);
  const [accountPin,setAccountPin]=useState("");
  const [confirmPin,setConfirmPin]=useState("");
  const [pinError,setPinError]=useState("");
  const [profile,setProfile]=useState({
    firstName:"",lastName:"",nickname:"",email:"",dob:"",sex:"",state:"",
    height:"",fitnessLevel:"",activityLevel:"",weeklyAvailability:""
  });

  const splits={
    "PPL":{desc:"Push / Pull / Legs",days:{1:"Push",2:"Pull",3:"Legs",4:"Push",5:"Pull",6:"Legs",0:"Rest"}},
    "Bro":{desc:"Chest / Back / Shoulders / Arms / Legs",days:{1:"Chest",2:"Back",3:"Shoulders",4:"Arms",5:"Legs",6:"Cardio",0:"Rest"}},
    "Upper/Lower":{desc:"Upper / Lower / Rest / Repeat",days:{1:"Upper",2:"Lower",3:"Rest",4:"Upper",5:"Lower",6:"Cardio",0:"Rest"}},
    "Full Body":{desc:"3x per week full body",days:{1:"Full Body",2:"Rest",3:"Full Body",4:"Rest",5:"Full Body",6:"Cardio",0:"Rest"}},
    "Custom":{desc:"Set your own schedule later",days:{0:"Rest",1:"Rest",2:"Rest",3:"Rest",4:"Rest",5:"Rest",6:"Rest"}},
  };

  const US_STATES=["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware",
    "Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine",
    "Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada",
    "New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma",
    "Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont",
    "Virginia","Washington","West Virginia","Wisconsin","Wyoming","Other"];

  const sendToBackend=async(payload)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/users`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload),
      });
      if(!res.ok)throw new Error("Server error");
      return true;
    }catch(e){
      // Silently fail — data is stored locally regardless
      // sync deferred;
      return false;
    }
  };

  const finish=async()=>{
    // Validate PIN
    if(accountPin.length!==6){setPinError("PIN must be exactly 6 digits");return;}
    if(accountPin!==confirmPin){setPinError("PINs don't match");return;}
    setPinError("");
    setSending(true);

    // Store account PIN locally
    LS.set("ft-account-pin",accountPin);

    // Build full payload
    const payload={
      ...profile,
      currentWeight:parseFloat(bw)||null,
      targetWeight:parseInt(goals.goalWeight)||null,
      units,split,
      goals:{cal:parseInt(goals.cal),protein:parseInt(goals.protein),carbs:parseInt(goals.carbs),fat:parseInt(goals.fat)},
      accountPin:accountPin,
      createdAt:new Date().toISOString(),
      consentedAt:new Date().toISOString(),
      consentVersion:"1.0",
      deviceId:uid(),
    };

    // Send to backend (non-blocking — app works regardless)
    await sendToBackend(payload);

    // Apply to local state
    d({type:"UNITS",u:units});
    d({type:"GOALS",g:{cal:parseInt(goals.cal)||2400,protein:parseInt(goals.protein)||180,
      carbs:parseInt(goals.carbs)||250,fat:parseInt(goals.fat)||70,goalWeight:parseInt(goals.goalWeight)||175}});
    d({type:"SET_SCHEDULE",schedule:{weekly:splits[split].days,overrides:{}}});
    d({type:"SET_PROFILE",profile});
    if(bw){d({type:"ADD_B",b:{id:uid(),date:today(),weight:parseFloat(bw)||0,bf:"",chest:"",waist:"",arms:"",thighs:""}});}
    // Init auth key for this device
    AuthToken.init(profile.email);
    LS.set("ft-device-id",payload.deviceId);
    // Create server-issued session token
    await SessionManager.create(profile.email,accountPin,payload.deviceId);
    d({type:"ONBOARDED"});
    setSending(false);
  };

  // ─── Onboarding Validation ───
  const BLOCKED_WORDS=["fuck","shit","ass","bitch","dick","pussy","cunt","damn","cock","porn",
    "nigger","nigga","faggot","retard","whore","slut","bastard","penis","vagina","nazi","kill","rape"];
  const containsProfanity=(text)=>{
    const lower=(text||"").toLowerCase().replace(/[^a-z]/g,"");
    return BLOCKED_WORDS.some(w=>lower.includes(w));
  };
  const isValidEmail=(email)=>/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
  const getAge=(dob)=>{
    if(!dob)return 0;
    const birth=new Date(dob+"T00:00:00");
    const now=new Date();
    let age=now.getFullYear()-birth.getFullYear();
    if(now.getMonth()<birth.getMonth()||(now.getMonth()===birth.getMonth()&&now.getDate()<birth.getDate()))age--;
    return age;
  };

  const nameClean=!containsProfanity(profile.firstName)&&!containsProfanity(profile.lastName)&&!containsProfanity(profile.nickname);
  const emailValid=isValidEmail(profile.email);
  const ageValid=getAge(profile.dob)>=13;
  const profileValid=profile.firstName.trim()&&profile.lastName.trim()&&profile.email.trim()&&profile.dob&&profile.sex&&profile.state&&agreed&&nameClean&&emailValid&&ageValid;

  const getValidationMsg=()=>{
    if(!agreed)return"Please agree to the Terms of Service and Privacy Policy";
    if(!profile.firstName.trim()||!profile.lastName.trim()||!profile.email.trim()||!profile.dob||!profile.sex||!profile.state)return"Please fill in all required fields (*)";
    if(!nameClean)return"Please use appropriate names";
    if(!emailValid)return"Please enter a valid email address";
    if(!ageValid)return"You must be at least 13 years old to use IRONLOG";
    return"";
  };

  const [showSignIn,setShowSignIn]=useState(false);
  const [signInEmail,setSignInEmail]=useState("");
  const [signInPin,setSignInPin]=useState("");
  const [signInLoading,setSignInLoading]=useState(false);
  const [signInError,setSignInError]=useState("");
  const [signInStep,setSignInStep]=useState("email"); // email | pin

  const signIn=async()=>{
    if(signInStep==="email"){
      if(!signInEmail.trim()||!signInEmail.includes("@")){setSignInError("Enter a valid email");return;}
      setSignInLoading(true);setSignInError("");
      try{
        AuthToken.init(signInEmail);
        const deviceId=uid();LS.set("ft-device-id",deviceId);
        // First pull without PIN to check if account exists and needs PIN
        const result=await CloudSync.pull(signInEmail.trim().toLowerCase(),deviceId,null);
        if(result?.pin_required){
          // Account has PIN — go to PIN step (server blocked data)
          setSignInStep("pin");
        }else if(result&&result.success&&result.data){
          // No PIN set (old account) — server returned data directly
          applyRestore(result.data,signInPin||null);
        }else{
          setSignInError(result?.error||"No account found with this email.");
        }
      }catch(e){
        setSignInError("Could not connect. Check your internet and try again.");
      }
      setSignInLoading(false);
      return;
    }

    // PIN step — validate server-side
    if(signInPin.length!==6){setSignInError("Enter your 6-digit PIN");return;}
    setSignInLoading(true);setSignInError("");
    try{
      const deviceId=LS.get("ft-device-id");
      const result=await CloudSync.pull(signInEmail.trim().toLowerCase(),deviceId,signInPin);
      if(result?.wrong_pin){
        setSignInError(`Wrong PIN. ${result.attempts_remaining} attempt${result.attempts_remaining!==1?"s":""} remaining.`);
        setSignInPin("");
        if(result.locked)setSignInError("Too many attempts. Account locked for 15 minutes.");
      }else if(result?.locked){
        setSignInError(`Account locked. Try again in ${result.retry_minutes} minutes.`);
      }else if(result&&result.success&&result.data){
        applyRestore(result.data,signInPin||null);
      }else{
        setSignInError("Could not restore. Try again.");
      }
    }catch(e){
      setSignInError("Connection failed.");
    }
    setSignInLoading(false);
  };

  const applyRestore=(cloud,pinUsed)=>{
    const merged={
      workouts:cloud.workouts||[],nutrition:cloud.nutrition||[],body:cloud.body||[],
      photos:cloud.photos||[],checkins:(cloud.checkins||[]).filter(c=>!c.deleted),milestones:cloud.milestones||[],
      exercises:cloud.exercises||defaultExercises,
      goals:cloud.goals||{cal:2400,protein:180,carbs:250,fat:70,goalWeight:175},
      schedule:cloud.schedule||defaultSchedule,
      units:cloud.units||"lbs",
      profile:cloud.profile||{email:signInEmail.trim().toLowerCase()},
    };
    d({type:"IMPORT",data:merged});
    d({type:"SET_PROFILE",profile:merged.profile});
    d({type:"UNITS",u:merged.units});
    if(merged.goals)d({type:"GOALS",g:merged.goals});
    if(merged.schedule)d({type:"SET_SCHEDULE",schedule:merged.schedule});
    // vault_pin no longer restored from server (kept local-only)
    if(cloud.phases)d({type:"SET_PHASES",phases:cloud.phases});
    if(cloud.injuries)d({type:"SET_INJURIES",injuries:cloud.injuries});
    if(cloud.privacy)LS.set("ft-privacy",cloud.privacy);
    if(cloud.supplements)LS.set("ft-supplements",cloud.supplements);
    if(cloud.accountability)LS.set("ft-accountability",cloud.accountability);
    // Create server session for this device
    if(pinUsed)SessionManager.create(signInEmail.trim().toLowerCase(),pinUsed,LS.get("ft-device-id"));
    LS.set("ft-guide-done",true);
    d({type:"ONBOARDED"});
    SuccessToastCtrl.show(`Welcome back! Restored ${(cloud.workouts||[]).length} workouts`);
  };

  const [showInstallGuide,setShowInstallGuide]=useState(false);
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isAndroid=/Android/.test(navigator.userAgent);
  const isStandalone=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone;

  const steps=[
    // Step 0: Welcome
    ()=>(
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{width:64,height:64,borderRadius:18,background:`linear-gradient(135deg,${V.accent},${V.accent2})`,
          display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:20}}>
          {Icons.activity({size:32,color:V.bg,strokeWidth:2.5})}
        </div>
        <div style={{fontSize:28,fontWeight:800,marginBottom:8}}>IRON<span style={{color:V.accent}}>LOG</span></div>
        <div style={{fontSize:14,color:V.text3,marginBottom:24,lineHeight:1.5}}>Your personal fitness tracker.<br/>Let's get you set up.</div>
        <Btn full onClick={()=>setStep(1)}>Get Started</Btn>

        {/* Welcome Back — returning users */}
        <div style={{marginTop:16}}>
          {!showSignIn?(
            <button onClick={()=>setShowSignIn(true)} style={{background:"none",border:"none",cursor:"pointer",
              padding:0,fontFamily:V.font,WebkitTapHighlightColor:"transparent"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                padding:"12px 16px",borderRadius:12,background:"rgba(255,255,255,0.03)",border:`1px solid ${V.cardBorder}`}}>
                <span style={{fontSize:16}}>👋</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:12,fontWeight:600,color:V.accent}}>Welcome back?</div>
                  <div style={{fontSize:10,color:V.text3}}>Sign in to restore your data</div>
                </div>
              </div>
            </button>
          ):(
            <div style={{padding:"16px",borderRadius:14,background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`,textAlign:"left"}}>
              {signInStep==="email"?(
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:4}}>Sign in with your email</div>
                  <div style={{fontSize:10,color:V.text3,marginBottom:10}}>Enter the email you used when you created your account.</div>
                  <input type="email" value={signInEmail} onChange={e=>setSignInEmail(e.target.value)}
                    placeholder="you@email.com" autoComplete="email" onKeyDown={e=>{if(e.key==="Enter")signIn();}}
                    style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
                      borderRadius:10,color:V.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:V.font,marginBottom:8}}/>
                </div>
              ):(
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:4}}>Enter your 6-digit PIN</div>
                  <div style={{fontSize:10,color:V.text3,marginBottom:10}}>This is the PIN you created when you signed up.</div>
                  <input type="password" inputMode="numeric" value={signInPin}
                    onChange={e=>setSignInPin(e.target.value.replace(/\D/g,"").slice(0,6))}
                    placeholder="• • • • • •" maxLength={6} autoComplete="current-password"
                    onKeyDown={e=>{if(e.key==="Enter"&&signInPin.length===6)signIn();}}
                    style={{width:"100%",padding:"14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
                      borderRadius:10,color:V.text,fontSize:24,textAlign:"center",fontFamily:V.mono,letterSpacing:12,
                      outline:"none",boxSizing:"border-box",marginBottom:4}}/>
                  <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:8}}>
                    {[0,1,2,3,4,5].map(i=>(
                      <div key={i} style={{width:8,height:8,borderRadius:4,
                        background:i<signInPin.length?V.accent:"rgba(255,255,255,0.1)",transition:"all .15s"}}/>
                    ))}
                  </div>
                </div>
              )}
              {signInError&&<div style={{fontSize:11,color:V.danger,marginBottom:8}}>{signInError}</div>}
              <div style={{display:"flex",gap:8}}>
                <Btn v="secondary" onClick={()=>{setShowSignIn(false);setSignInError("");setSignInStep("email");setSignInPin("");}}>Cancel</Btn>
                <Btn full onClick={signIn} disabled={signInLoading}>
                  {signInLoading?"Checking...":(signInStep==="email"?"Continue":"Sign In")}
                </Btn>
              </div>
            </div>
          )}
        </div>

        {/* Install prompt */}
        {!isStandalone&&(
          <div style={{marginTop:20}}>
            <button onClick={()=>setShowInstallGuide(true)} style={{background:"none",border:"none",cursor:"pointer",
              padding:0,fontFamily:V.font,WebkitTapHighlightColor:"transparent"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                padding:"12px 16px",borderRadius:12,background:"rgba(255,255,255,0.03)",border:`1px dashed ${V.cardBorder}`}}>
                <span style={{fontSize:16}}>{isIOS?"📱":"📲"}</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:12,fontWeight:600,color:V.accent}}>Install as an app</div>
                  <div style={{fontSize:10,color:V.text3}}>Add to home screen for the best experience</div>
                </div>
              </div>
            </button>
          </div>
        )}

        {/* Install guide popup */}
        {showInstallGuide&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.8)",backdropFilter:"blur(6px)"}} onClick={()=>setShowInstallGuide(false)}/>
            <div style={{position:"relative",background:V.sheetBg,borderRadius:20,
              padding:24,maxWidth:340,width:"100%",border:`1px solid ${V.accent}25`,maxHeight:"80vh",overflowY:"auto"}}>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:32,marginBottom:8}}>📱</div>
                <div style={{fontSize:18,fontWeight:800,color:V.text}}>Install IRONLOG</div>
                <div style={{fontSize:12,color:V.text3,marginTop:4}}>Works offline, sends notifications, feels native</div>
              </div>

              {isIOS?(
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{width:32,height:32,borderRadius:10,background:`${V.accent}12`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:14,fontWeight:800,color:V.accent}}>1</span>
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:V.text}}>Tap the Share button</div>
                      <div style={{fontSize:11,color:V.text3,marginTop:2}}>It's the square icon with an arrow at the bottom of Safari</div>
                      <div style={{marginTop:6,padding:"8px 12px",background:"rgba(255,255,255,0.04)",borderRadius:8,display:"inline-flex",alignItems:"center",gap:6}}>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00f5a0" strokeWidth="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        <span style={{fontSize:11,color:V.text2}}>Share</span>
                      </div>
                    </div>
                  </div>

                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{width:32,height:32,borderRadius:10,background:`${V.accent}12`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

// ─── 1RM Calculator Standalone ───
function OneRMCalc({units}){
  const [w,setW]=useState("");
  const [r,setR]=useState("");
  const e1rm=w&&r?calc1RM(parseFloat(w),parseInt(r)):0;
  const pcts=[100,95,90,85,80,75,70,65,60];
  const u=wUnit(units);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <Field label={`Weight (${u})`} type="number" value={w} onChange={setW} placeholder="225"/>
        <Field label="Reps" type="number" value={r} onChange={setR} placeholder="5"/>
      </div>
      {e1rm>0&&(
        <div>
          <div style={{textAlign:"center",padding:16,background:`${V.accent}08`,borderRadius:14,marginBottom:14}}>
            <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em"}}>Estimated 1RM</div>
            <div style={{fontSize:32,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{e1rm}<span style={{fontSize:14}}> {u}</span></div>
          </div>
          <div style={{fontSize:11,color:V.text3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8,fontWeight:600}}>Percentage Chart</div>
          {pcts.map(p=>{
            const val=Math.round(e1rm*p/100);
            const reps=p===100?1:p>=95?2:p>=90?3:p>=85?5:p>=80?6:p>=75?8:p>=70?10:p>=65?12:15;
            return(
              <div key={p} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span style={{width:36,fontSize:12,color:V.accent,fontFamily:V.mono,fontWeight:700}}>{p}%</span>
                <div style={{flex:1,height:6,borderRadius:3,background:"rgba(255,255,255,0.04)"}}>
                  <div style={{width:`${p}%`,height:"100%",borderRadius:3,background:V.accent,opacity:0.5}}/>
                </div>
                <span style={{fontSize:13,color:V.text,fontFamily:V.mono,fontWeight:600,minWidth:50,textAlign:"right"}}>{val} {u}</span>
                <span style={{fontSize:10,color:V.text3,minWidth:30}}>~{reps}r</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── Progress Photos ───
// ─── Image Compression Utility ───
function compressImage(file,maxDim=800,quality=0.7){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      // #B6: Revoke the blob URL immediately after the image loads — it was previously
      // left pinned in memory until page unload, accumulating on every photo logged.
      URL.revokeObjectURL(img.src);
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*(maxDim/w));w=maxDim;}
        else{w=Math.round(w*(maxDim/h));h=maxDim;}
      }
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",quality);
      resolve(compressed);
    };
    img.onerror=()=>{URL.revokeObjectURL(img.src);resolve(null);};
    img.src=URL.createObjectURL(file);
  });
}

function ProgressPhotos({s,d}){
  const fileRef=useRef(null);
  const [compressing,setCompressing]=useState(false);
  const [vaultLocked,setVaultLocked]=useState(true);
  const [pinInput,setPinInput]=useState("");
  const [showSetPin,setShowSetPin]=useState(false);
  const [newPin,setNewPin]=useState("");
  const [tab,setTab]=useState("public"); // public | vault

  const vaultPin=LS.get("ft-vault-pin");
  const hasVault=!!vaultPin;

  const unlockVault=()=>{
    if(pinInput===vaultPin){setVaultLocked(false);setPinInput("");SuccessToastCtrl.show("Vault unlocked");}
    else{SuccessToastCtrl.show("Wrong PIN");setPinInput("");}
  };
  const setupPin=()=>{
    if(newPin.length>=4){
      LS.set("ft-vault-pin",newPin);setNewPin("");setShowSetPin(false);
      SuccessToastCtrl.show("Vault PIN set");
      // Sync PIN to server immediately
      CloudSync.debouncedPush({...s});
    }
  };

  const handlePhoto=async(e,isPrivate)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    setCompressing(true);
    const isVideo=file.type.startsWith("video/");

    if(isVideo){
      // Store video as blob URL (local only — too large for base64 sync)
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const entry={id:uid(),date:today(),data:ev.target.result,note:"",
          size:file.size,original:file.name,private:!!isPrivate,type:"video",mime:file.type};
        d({type:"ADD_PHOTO",photo:entry});
        SuccessToastCtrl.show(isPrivate?"Video saved to vault (local only)":"Video saved (local only — won't sync to cloud)");
        setCompressing(false);
      };
      // Only store videos under 50MB
      if(file.size>50*1024*1024){SuccessToastCtrl.show("Video too large (max 50MB)");setCompressing(false);e.target.value="";return;}
      reader.readAsDataURL(file);
    }else{
      const compressed=await compressImage(file,800,0.7);
      if(compressed){
        const photo={id:uid(),date:today(),data:compressed,note:"",
          size:compressed.length,original:file.name,private:!!isPrivate,type:"photo"};
        d({type:"ADD_PHOTO",photo});
        if(s.profile?.email){
          try{
            await fetch(`${SYNC_URL}/api/photos/upload`,{
              method:"POST",headers:AuthToken.getHeaders(s.profile.email),
              body:JSON.stringify({email:s.profile.email,photoId:photo.id,date:photo.date,
                data:compressed,private:!!isPrivate})
            });
          }catch(e2){console.warn("Photo upload failed:",e2);}
        }
        SuccessToastCtrl.show(isPrivate?"Photo saved to vault":"Photo saved");
      }
      setCompressing(false);
    }
    e.target.value="";
  };

  const publicPhotos=(s.photos||[]).filter(p=>!p.private);
  const vaultPhotos=(s.photos||[]).filter(p=>p.private);

  const [viewPhoto,setViewPhoto]=useState(null); // full-screen photo viewer
  const [viewIdx,setViewIdx]=useState(0);

  const PhotoViewer=()=>{
    if(!viewPhoto)return null;
    const allPhotos=tab==="vault"?vaultPhotos:publicPhotos;
    const p=viewPhoto;
    const idx=allPhotos.findIndex(x=>x.id===p.id);
    const hasPrev=idx>0;
    const hasNext=idx<allPhotos.length-1;
    return(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:2000,background:"rgba(0,0,0,0.95)",display:"flex",flexDirection:"column",
        touchAction:"none"}} onClick={()=>setViewPhoto(null)}>

            <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{fmtFull(p.date)}</div>
            {p.private&&<div style={{fontSize:9,color:V.purple}}>🔒 Private</div>}
          </div>
          <button onClick={()=>setViewPhoto(null)} style={{background:"rgba(255,255,255,0.1)",border:"none",
            width:36,height:36,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>

            style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:V.danger,fontFamily:V.font}}>

  const PhotoGrid=({photos,isVault})=>(

          border:`1px solid ${isVault?"rgba(168,85,247,0.3)":V.cardBorder}`,cursor:"pointer"}}>
          {p.type==="video"?(
            <video src={p.data} muted playsInline preload="metadata" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          ):(
            <img loading="lazy" src={p.data} alt={`Progress photo from ${fmtShort(p.date)}`} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          )}
          {p.type==="video"&&(
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
              width:36,height:36,borderRadius:18,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center"}}>

            </div>
          )}
          <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"20px 10px 8px",

            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              {p.type==="video"&&<span style={{fontSize:8,color:V.accent2}}>🎥 Video</span>}
              {isVault&&<span style={{fontSize:8,color:V.purple}}>🔒 Private</span>}
            </div>
          </div>
          <button onClick={e=>{e.stopPropagation();ConfirmCtrl.show(`Delete this ${p.type==="video"?"video":"photo"}?`,"This cannot be undone.",()=>{Undo.set("Deleted",p,"photo");d({type:"DEL_PHOTO",id:p.id});SuccessToastCtrl.show("Deleted");});}} style={{position:"absolute",top:6,right:6,
            width:28,height:28,borderRadius:8,background:"rgba(0,0,0,0.6)",border:"none",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center"}}>{Icons.x({size:12,color:"#fff"})}</button>
        </div>
      ))}
    </div>
  );

  return(
    <div>
      <PhotoViewer/>
      {/* Tab toggle */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <button onClick={()=>setTab("public")} style={{flex:1,padding:"8px",borderRadius:8,
          border:`1.5px solid ${tab==="public"?V.accent:V.cardBorder}`,
          background:tab==="public"?`${V.accent}10`:"transparent",
          cursor:"pointer",fontSize:11,fontWeight:700,color:tab==="public"?V.accent:V.text3,fontFamily:V.font}}>
          📸 Photos
        </button>
        <button onClick={()=>setTab("vault")} style={{flex:1,padding:"8px",borderRadius:8,
          border:`1.5px solid ${tab==="vault"?"#a855f7":V.cardBorder}`,
          background:tab==="vault"?"rgba(168,85,247,0.08)":"transparent",
          cursor:"pointer",fontSize:11,fontWeight:700,color:tab==="vault"?"#a855f7":V.text3,fontFamily:V.font}}>

      {tab==="public"?(

          <Btn full onClick={()=>fileRef.current?.click()} disabled={compressing}>
            {compressing?<span>Compressing…</span>:<span>{Icons.plus({size:16,color:V.bg})} Add Photo or Video</span>}

                <Btn onClick={unlockVault} s={{background:"#a855f7"}}>Unlock</Btn>

      return r.ok?await r.json():null;}catch(e){return null;}
  };
  useEffect(()=>{
    af("dashboard").then(setDash);

    if(initialView==="moderation")loadGroups();

    if(filter==="inactive")f=f.filter(u=>!u.lastSync||new Date(u.lastSync)<new Date(Date.now()-30*86400000));

    f.sort((a,b)=>{let va=a[sort.key],vb=b[sort.key];
      if(typeof va==="string")return sort.dir==="asc"?(va||"").localeCompare(vb||""):(vb||"").localeCompare(va||"");
      return sort.dir==="asc"?(va||0)-(vb||0):(vb||0)-(va||0);});

  const ago2=(d)=>{if(!d)return"Never";const ms=Date.now()-new Date(d).getTime();const h=Math.floor(ms/3600000);
    if(h<1)return"Just now";if(h<24)return`${h}h ago`;const days=Math.floor(h/24);return days<7?`${days}d ago`:`${Math.floor(days/7)}w ago`;};

  // ═══ USER DETAIL ═══
  if(view==="detail"&&userData)return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Fullscreen photo viewer */}
      {enlargedPhoto&&(
        <div onClick={()=>setEnlargedPhoto(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,
          background:"rgba(0,0,0,0.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16,cursor:"pointer"}}>
          <button onClick={()=>setEnlargedPhoto(null)} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.1)",
            border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
            {Icons.x({size:18,color:"#fff"})}</button>

              {l:"THIS WEEK",v:dash.workouts7d,c:V.accent2},
              {l:"NUTRITION",v:dash.totalNutrition,c:"#f97316"},{l:"PHOTOS",v:dash.totalPhotos,c:V.purple},

            ].map(st=><div key={st.l} style={{textAlign:"center",padding:6,borderRadius:6,background:"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:16,fontWeight:800,color:st.c,fontFamily:V.mono}}>{st.v}</div>
              <div style={{fontSize:7,color:V.text3}}>{st.l}</div>
            </div>)}
          </div>
        </Card>

        {dash.chartData&&<Card style={{padding:12}}>
          <div style={{fontSize:11,fontWeight:700,color:V.text,marginBottom:8}}>14-Day Trend</div>
          <ResponsiveContainer width="100%" height={120}>
            <BarChart data={dash.chartData} barSize={6}>
              <CartesianGrid {...chartCfg.grid} vertical={false}/>
              <XAxis dataKey="date" {...chartCfg.axis} interval={2}/>
              <YAxis {...chartCfg.axis} width={20}/>
              <Tooltip {...chartCfg.tip}/>
              <Bar dataKey="workouts" fill={V.accent} radius={[2,2,0,0]}/>
              <Bar dataKey="signups" fill="#ec4899" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:4}}>
            <span style={{fontSize:9,color:V.accent}}>■ Workouts</span>
            <span style={{fontSize:9,color:"#ec4899"}}>■ Signups</span>
          </div>
        </Card>}
      </>)}

      {/* Health */}
      {health&&<Card style={{padding:14}}>
        <div style={{fontSize:12,fontWeight:700,color:V.text,marginBottom:6}}>Platform Health</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{health.totalActive}</div><div style={{fontSize:8,color:V.text3}}>Active Sessions</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:V.warn,fontFamily:V.mono}}>{health.staleUsers}</div><div style={{fontSize:8,color:V.text3}}>Stale (30d+)</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:V.danger,fontFamily:V.mono}}>{health.activeNotSyncing}</div><div style={{fontSize:8,color:V.text3}}>Not Syncing</div></div>
        </div>
        {health.notSyncingList?.length>0&&<div style={{fontSize:8,color:V.text3,marginTop:6}}>Not syncing: {health.notSyncingList.slice(0,5).join(", ")}</div>}
      </Card>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Btn full onClick={()=>{loadUsers();setView("users");}}>{Icons.target({size:14,color:V.bg})} Users</Btn>
        <Btn full onClick={()=>{loadGroups();setView("moderation");}} s={{background:V.purple}}>{Icons.activity({size:14,color:V.bg})} Moderation</Btn>
      </div>
      <Btn v="secondary" full onClick={()=>{loadHealth();af("dashboard").then(setDash);}}>Refresh All</Btn>
    </div>
  );
}


function DataManager({s,d}){
  const fileRef=useRef(null);
  const [msg,setMsg]=useState(null);
  const [restoring,setRestoring]=useState(false);
  const lastSync=LS.get("ft-last-sync");

  const exportData=()=>{
    const data={
      _ironlog:{version:APP_VERSION,exported:new Date().toISOString(),platform:`IRONLOG v${APP_VERSION}`},
      workouts:s.workouts,nutrition:s.nutrition,body:s.body,exercises:s.exercises,
      goals:s.goals,schedule:s.schedule,units:s.units,photos:s.photos||[],profile:s.profile||{},checkins:s.checkins||[],milestones:s.milestones||[],phases:s.phases||[],injuries:s.injuries||[]
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`ironlog-backup-${today()}.json`;a.click();
    URL.revokeObjectURL(url);
    setMsg({type:"success",text:`Exported ${s.workouts.length} workouts, ${s.nutrition.length} nutrition logs, ${s.body.length} measurements`});
    setTimeout(()=>setMsg(null),4000);
  };

  const importData=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const raw=JSON.parse(ev.target.result);
        const data={...raw};delete data._ironlog;
        const existingWIds=new Set(s.workouts.map(w=>w.id));
        const existingNIds=new Set(s.nutrition.map(n=>n.id));
        const existingBIds=new Set(s.body.map(b=>b.id));
        const newW=(data.workouts||[]).filter(w=>!existingWIds.has(w.id)).length;
        const newN=(data.nutrition||[]).filter(n=>!existingNIds.has(n.id)).length;
        const newB=(data.body||[]).filter(b=>!existingBIds.has(b.id)).length;
        const merged={
          ...data,
          workouts:[...s.workouts,...(data.workouts||[]).filter(w=>!existingWIds.has(w.id))],
          nutrition:[...s.nutrition,...(data.nutrition||[]).filter(n=>!existingNIds.has(n.id))],
          body:[...s.body,...(data.body||[]).filter(b=>!existingBIds.has(b.id))],
          exercises:[...s.exercises,...(data.exercises||[]).filter(e=>!s.exercises.some(x=>x.id===e.id))],
        };
        d({type:"IMPORT",data:merged});
        setMsg({type:"success",text:`Imported! +${newW} workouts, +${newN} nutrition, +${newB} measurements`});
        setTimeout(()=>setMsg(null),5000);
      }catch(err){
        setMsg({type:"error",text:"Invalid backup file. Make sure it's an IRONLOG JSON export."});
        setTimeout(()=>setMsg(null),4000);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const [restorePin,setRestorePin]=useState("");
  const [showRestorePin,setShowRestorePin]=useState(false);

  const restoreFromCloud=async(pinOverride)=>{
    const email=s.profile?.email;
    if(!email){setMsg({type:"error",text:"No email found. Complete your profile first."});setTimeout(()=>setMsg(null),4000);return;}
    setRestoring(true);
    const pin=pinOverride||restorePin||LS.get("ft-account-pin")||null;
    const result=await CloudSync.pull(email,LS.get("ft-device-id"),pin);

    if(result?.pin_required){
      setRestoring(false);setShowRestorePin(true);
      setMsg({type:"info",text:"Enter your account PIN to restore data."});
      return;
    }
    if(result?.wrong_pin){
      setRestoring(false);setRestorePin("");
      setMsg({type:"error",text:`Wrong PIN. ${result.attempts_remaining} attempts remaining.${result.locked?" Account locked for 15 minutes.":""}`});
      setTimeout(()=>setMsg(null),5000);return;
    }
    if(result?.locked){
      setRestoring(false);
      setMsg({type:"error",text:`Account locked. Try again in ${result.retry_minutes} minutes.`});
      setTimeout(()=>setMsg(null),5000);return;
    }

    if(result&&result.success){
      setShowRestorePin(false);setRestorePin("");
      const cloud=result.data;
      // Smart merge cloud data into local
      const existingWIds=new Set(s.workouts.map(w=>w.id));
      const existingNIds=new Set(s.nutrition.map(n=>n.id));
      const existingBIds=new Set(s.body.map(b=>b.id));
      const newW=(cloud.workouts||[]).filter(w=>!existingWIds.has(w.id));
      const newN=(cloud.nutrition||[]).filter(n=>!existingNIds.has(n.id));
      const newB=(cloud.body||[]).filter(b=>!existingBIds.has(b.id));
      const newP=(cloud.photos||[]).filter(p=>!s.photos.some(x=>x.id===p.id));
      const existingCheckinDates=new Set((s.checkins||[]).map(c=>c.date));
      const newC=(cloud.checkins||[]).filter(c=>!c.deleted&&!existingCheckinDates.has(c.date));
      const existingMIds=new Set((s.milestones||[]).map(m=>m.id));
      const newM=(cloud.milestones||[]).filter(m=>!existingMIds.has(m.id));

      const merged={
        workouts:[...s.workouts,...newW].sort((a,b)=>b.date.localeCompare(a.date)),
        nutrition:[...s.nutrition,...newN].sort((a,b)=>b.date.localeCompare(a.date)),
        body:[...s.body,...newB].sort((a,b)=>b.date.localeCompare(a.date)),
        photos:[...s.photos,...newP],
        checkins:[...(s.checkins||[]),...newC],
        milestones:[...(s.milestones||[]),...newM],
        exercises:cloud.exercises||s.exercises,
        goals:cloud.goals||s.goals,
        schedule:cloud.schedule||s.schedule,
        units:cloud.units||s.units,
        profile:cloud.profile||s.profile,
      };
      d({type:"IMPORT",data:merged});
      // Restore vault PIN from cloud if it exists
      // vault_pin no longer restored from server (kept local-only)
      if(cloud.phases)d({type:"SET_PHASES",phases:cloud.phases});
      if(cloud.injuries)d({type:"SET_INJURIES",injuries:cloud.injuries});
      if(cloud.privacy)LS.set("ft-privacy",cloud.privacy);
      if(cloud.supplements)LS.set("ft-supplements",cloud.supplements);
    if(cloud.accountability)LS.set("ft-accountability",cloud.accountability);
      setMsg({type:"success",text:`Restored from cloud! +${newW.length} workouts, +${newN.length} nutrition, +${newB.length} measurements, +${newC.length} check-ins, +${newM.length} goals`});
    }else{
      setMsg({type:"error",text:"No cloud backup found for this account, or server is unreachable."});
    }
    setRestoring(false);
    setTimeout(()=>setMsg(null),5000);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {msg&&(
        <div style={{padding:"10px 14px",borderRadius:10,fontSize:12,fontWeight:600,
          background:msg.type==="success"?`${V.accent}12`:`${V.danger}12`,
          color:msg.type==="success"?V.accent:V.danger,
          border:`1px solid ${msg.type==="success"?V.accent:V.danger}20`}}>
          {msg.text}
        </div>
      )}

      {/* Sync status */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",
        background:"rgba(255,255,255,0.02)",borderRadius:8,border:`1px solid ${V.cardBorder}`}}>
        <div>
          <div style={{fontSize:11,color:V.text3}}>Cloud Sync</div>
          <div style={{fontSize:10,color:s.profile?.email?V.accent:V.text3,fontFamily:V.mono}}>
            {s.profile?.email?`Linked: ${s.profile.email}`:"Not linked — complete profile"}
          </div>
        </div>
        {lastSync&&(
          <div style={{fontSize:9,color:V.text3,textAlign:"right"}}>
            Last sync<br/><span style={{fontFamily:V.mono}}>{new Date(lastSync).toLocaleString()}</span>
          </div>
        )}
      </div>

      <div style={{fontSize:11,color:V.text3,marginBottom:2}}>
        {s.workouts.length} workouts · {s.nutrition.length} nutrition logs · {s.body.length} measurements
      </div>

      {/* Cloud restore */}
      {showRestorePin&&(
        <div style={{padding:14,borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`,marginBottom:6}}>
          <div style={{fontSize:12,fontWeight:700,color:V.text,marginBottom:4}}>🔒 Account PIN Required</div>
          <div style={{fontSize:10,color:V.text3,marginBottom:8}}>Enter your 6-digit PIN to access cloud data.</div>
          <div style={{display:"flex",gap:8}}>
            <input type="password" inputMode="numeric" value={restorePin} onChange={e=>setRestorePin(e.target.value.replace(/\D/g,"").slice(0,6))}
              placeholder="• • • • • •" maxLength={6} autoComplete="current-password"
              onKeyDown={e=>{if(e.key==="Enter"&&restorePin.length===6)restoreFromCloud(restorePin);}}
              style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,
                borderRadius:10,color:V.text,fontSize:20,textAlign:"center",fontFamily:V.mono,letterSpacing:10,outline:"none"}}/>
            <Btn onClick={()=>restoreFromCloud(restorePin)} disabled={restorePin.length!==6||restoring}>
              {restoring?"...":"Go"}
            </Btn>
          </div>
        </div>
      )}
      <Btn full onClick={()=>restoreFromCloud()} disabled={restoring}>
        {restoring?(
          <span style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
            <div style={{width:14,height:14,borderRadius:7,border:"2px solid rgba(255,255,255,0.2)",
              borderTopColor:V.bg,animation:"spin 0.8s linear infinite"}}/>
            Restoring...
          </span>
        ):(
          <span>{Icons.download({size:16,color:V.bg})} Restore from Cloud</span>
        )}
      </Btn>
      <div style={{fontSize:10,color:V.text3}}>Pull your data from the server. Use this on a new device to get all your workouts, nutrition, and measurements back.</div>

      {/* Local export/import */}
      <div style={{borderTop:`1px solid ${V.cardBorder}`,paddingTop:10,marginTop:4}}>
        <div style={{fontSize:11,fontWeight:600,color:V.text3,marginBottom:8}}>Local Backup</div>
        <Btn v="secondary" full onClick={exportData}>{Icons.download({size:14,color:V.text2})} Export JSON</Btn>
        <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
        <Btn v="secondary" full onClick={()=>fileRef.current?.click()} s={{marginTop:6}}>{Icons.upload({size:14,color:V.text2})} Import JSON</Btn>
        <div style={{fontSize:10,color:V.text3,marginTop:4}}>Import merges data — your existing entries won't be duplicated or lost.</div>
      </div>

      {/* #4 Cloud vs Local Parity Checker */}
      <div style={{borderTop:`1px solid ${V.cardBorder}`,paddingTop:10,marginTop:4}}>
        <div style={{fontSize:11,fontWeight:600,color:V.text3,marginBottom:8}}>Data Health Check</div>
        <Btn v="secondary" full onClick={async()=>{
          const email=s.profile?.email;
          if(!email){setMsg({type:"error",text:"No email — complete your profile first."});setTimeout(()=>setMsg(null),4000);return;}
          setMsg({type:"info",text:"Checking cloud parity..."});
          try{
            // Try with session token first, then with stored PIN
            const pin=LS.get("ft-account-pin")||null;
            const result=await CloudSync.pull(email,LS.get("ft-device-id"),pin);

            if(result?.pin_required){
              setMsg({type:"error",text:"PIN required for cloud access. Use Restore from Cloud below."});
              setTimeout(()=>setMsg(null),5000);return;
            }
            if(!result||!result.success){
              setMsg({type:"error",text:result?.error||"Could not reach cloud. Try again later."});
              setTimeout(()=>setMsg(null),4000);return;
            }
            const cloud=result.data;
            const report=[];
            const checks=[
              {name:"Workouts",local:s.workouts.length,cloud:(cloud.workouts||[]).length},
              {name:"Nutrition",local:s.nutrition.length,cloud:(cloud.nutrition||[]).length},
              {name:"Body",local:s.body.length,cloud:(cloud.body||[]).length},
              {name:"Photos",local:(s.photos||[]).length,cloud:(cloud.photos||[]).length},
              {name:"Check-ins",local:(s.checkins||[]).length,cloud:(cloud.checkins||[]).length},
              {name:"Goals",local:(s.milestones||[]).length,cloud:(cloud.milestones||[]).length},
            ];
            let allMatch=true;
            checks.forEach(c=>{
              if(c.local!==c.cloud){allMatch=false;report.push(`${c.name}: ${c.local} local / ${c.cloud} cloud`);}
            });
            const cloudWIds=new Set((cloud.workouts||[]).map(w=>w.id));
            const unsyncedW=s.workouts.filter(w=>!cloudWIds.has(w.id)).length;
            if(unsyncedW>0){allMatch=false;report.push(`${unsyncedW} workout(s) not yet in cloud`);}
            const cloudNIds=new Set((cloud.nutrition||[]).map(n=>n.id));
            const unsyncedN=s.nutrition.filter(n=>!cloudNIds.has(n.id)).length;
            if(unsyncedN>0){allMatch=false;report.push(`${unsyncedN} nutrition log(s) not yet in cloud`);}

            if(allMatch){
              setMsg({type:"success",text:`✅ All in sync — ${s.workouts.length} workouts, ${s.nutrition.length} nutrition, ${s.body.length} body`});
            }else{
              setMsg({type:"warn",text:`⚠️ Differences:\n${report.join("\n")}`});
            }
            setTimeout(()=>setMsg(null),10000);
          }catch(e){
            setMsg({type:"error",text:"Health check failed: "+e.message});
            setTimeout(()=>setMsg(null),4000);
          }
        }}>{Icons.activity({size:14,color:V.text2})} Run Health Check</Btn>
        <div style={{fontSize:10,color:V.text3,marginTop:4}}>Compare local data against cloud to find unsynced entries.</div>
        {msg&&msg.text?.includes("Differences")&&(
          <Btn v="secondary" full onClick={async()=>{
            setMsg({type:"info",text:"Pushing all local data to cloud..."});
            try{
              await CloudSync.push(s);
              setMsg({type:"success",text:"✅ Sync complete!"});
            }catch(e){
              setMsg({type:"error",text:"Sync failed — check connection"});
            }
            setTimeout(()=>setMsg(null),4000);
          }} s={{marginTop:6}}>
            {Icons.refresh({size:14,color:V.text2})} Force Sync Now
          </Btn>
        )}
      </div>
    </div>
  );
}

const MUSCLE_LABELS={chest:"Chest",back:"Back",front_delts:"Front Delts",side_delts:"Side Delts",rear_delts:"Rear Delts",traps:"Traps",biceps:"Biceps",triceps:"Triceps",quads:"Quads",hamstrings:"Hamstrings",glutes:"Glutes",calves:"Calves",core:"Core"};

// ─── Progressive Overload Engine (Enhanced) ───
function getOverloadSuggestion(exerciseId, workouts, units){
  // Find last 3 sessions with this exercise
  const sessions=[];
  for(const w of workouts){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets.some(s=>s.weight>0)){sessions.push({date:w.date,sets:ex.sets});if(sessions.length>=3)break;}
  }
  if(sessions.length===0)return null;

  const latest=sessions[0];
  const bestSet=latest.sets.reduce((m,st)=>parseFloat(st.weight)>parseFloat(m.weight)?st:m,{weight:0,reps:0});
  const w=parseFloat(bestSet.weight)||0;
  const r=parseInt(bestSet.reps)||0;
  if(w===0)return null;

  const e1rm=Math.round(w*(1+r/30));
  const inc=units==="kg"?2.5:5;
  const targetReps=8;

  // Check if all sets hit target reps
  const allSetsHit=latest.sets.every(st=>parseInt(st.reps)>=targetReps);
  // Check for failure pattern (last 2-3 sessions struggling)
  const failCount=sessions.filter(sess=>{
    const bst=sess.sets.reduce((m,st)=>parseFloat(st.weight)>parseFloat(m.weight)?st:m,{weight:0,reps:0});
    return parseInt(bst.reps)<targetReps-2;
  }).length;

  let type,sugWeight,sugReps,reason;
  if(failCount>=2){
    // Deload
    sugWeight=Math.round((w-inc*2)/inc)*inc;
    sugReps=targetReps;
    type="deload";
    reason="Struggling multiple sessions — deload to rebuild";
  }else if(allSetsHit){
    // Increase weight
    sugWeight=w+inc;
    sugReps=r;
    type="increase";
    reason="All sets completed — increase weight";
  }else if(r<targetReps-1){
    // Keep same, failed reps
    sugWeight=w;
    sugReps=targetReps;
    type="repeat";
    reason="Missed reps — repeat and aim higher";
  }else{
    // Keep same, almost there
    sugWeight=w;
    sugReps=r+1;
    type="reps";
    reason="Close to target — add a rep";
  }

  const zone80=Math.round(e1rm*0.80);
  const zone70=Math.round(e1rm*0.70);

  return{type,last:`${w}×${r}`,suggest:`${sugWeight}×${sugReps}`,e1rm,zone80,zone70,reason,
    allSets:latest.sets.map(st=>`${st.weight}×${st.reps}`).join("  "),date:sessions[0].date};
}

// ─── Muscle Heat Map Calculator ───
function calcMuscleHeat(workouts,exercises,days=10){
  const now=new Date();
  const scores={};
  ALL_MUSCLES.forEach(m=>{scores[m]=0;});

  workouts.forEach(w=>{
    const daysAgo=Math.max(0,(now-new Date(w.date))/(1000*60*60*24));
    if(daysAgo>days)return;
    const decay=Math.max(0,1-daysAgo/days);

    w.exercises.forEach(ex=>{
      const map=MUSCLE_MAP[ex.exerciseId];
      if(!map)return;
      const setCount=ex.sets.length;
      const volume=ex.sets.reduce((s,st)=>(parseFloat(st.weight)||0)*(parseInt(st.reps)||0)+s,0);
      const intensity=Math.min(1,volume/5000)+setCount*0.3;

      map.primary.forEach(m=>{scores[m]+=(intensity*3)*decay;});
      map.secondary.forEach(m=>{scores[m]+=(intensity*1.5)*decay;});
    });
  });

  // Normalize 0-10
  const mx=Math.max(...Object.values(scores),1);
  const norm={};
  ALL_MUSCLES.forEach(m=>{norm[m]=Math.min(10,Math.round(scores[m]/mx*10*10)/10);});
  return norm;
}

function getMuscleColor(score){
  if(score<=0.5)return"rgba(255,255,255,0.06)";
  if(score<=3)return"rgba(250,204,21,0.4)";   // yellow
  if(score<=6)return"rgba(0,245,160,0.5)";     // green
  if(score<=8)return"rgba(0,245,160,0.8)";     // bright green
  return"rgba(255,107,107,0.7)";                // red (high fatigue)
}

function getMuscleLabel(score){
  if(score<=0.5)return"Untrained";
  if(score<=3)return"Light";
  if(score<=6)return"Moderate";
  if(score<=8)return"Well Trained";
  return"High Volume";
}

function VolumeTracker({s}){
  const data=useMemo(()=>{
    const weekWorkouts=s.workouts.filter(w=>w.date>=ago(7));
    const map={};
    // Map exercise categories to muscle groups
    const catToMuscle={Chest:"Chest",Back:"Back",Legs:"Legs",Shoulders:"Shoulders",Biceps:"Arms",Triceps:"Arms",
      Arms:"Arms",Core:"Core",Glutes:"Legs",Cardio:"Cardio"};
    weekWorkouts.forEach(w=>w.exercises.forEach(ex=>{
      const info=s.exercises.find(e=>e.id===ex.exerciseId);
      const muscle=catToMuscle[info?.cat]||info?.cat||"Other";
      if(!map[muscle])map[muscle]={sets:0,exercises:new Set(),workouts:new Set()};
      map[muscle].sets+=ex.sets.length;
      map[muscle].exercises.add(info?.name||ex.exerciseId);
      map[muscle].workouts.add(w.date);
    }));
    // Recommended ranges (weekly sets)
    const recs={Chest:{min:10,max:20},Back:{min:10,max:20},Legs:{min:10,max:20},Shoulders:{min:8,max:16},
      Arms:{min:8,max:16},Core:{min:6,max:12},Cardio:{min:2,max:5}};
    return Object.entries(map).map(([muscle,d])=>{
      const rec=recs[muscle]||{min:8,max:16};
      const status=d.sets<rec.min?"low":d.sets>rec.max?"high":"good";
      return{muscle,sets:d.sets,exercises:d.exercises.size,workouts:d.workouts.size,rec,status};
    }).sort((a,b)=>b.sets-a.sets);
  },[s.workouts,s.exercises]);

  const totalSets=data.reduce((a,d)=>a+d.sets,0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

        </div>
      </Card>

      {data.map((d,i)=>(
        <Card key={i} style={{padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:V.text}}>{d.muscle}</div>
              <div style={{fontSize:9,color:V.text3}}>{d.exercises} exercises · {d.workouts} sessions</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:18,fontWeight:800,color:d.status==="good"?V.accent:d.status==="low"?V.danger:V.warn,fontFamily:V.mono}}>{d.sets}</div>
              <div style={{fontSize:8,color:V.text3}}>{d.rec.min}-{d.rec.max} rec</div>
            </div>
          </div>
          <div style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.06)"}}>
            <div style={{height:"100%",borderRadius:2,transition:"width .3s",
              background:d.status==="good"?V.accent:d.status==="low"?V.danger:V.warn,
              width:`${Math.min(100,d.sets/d.rec.max*100)}%`}}/>
          </div>
          {d.status==="low"&&<div style={{fontSize:9,color:V.danger,marginTop:4}}>⚠️ Below minimum — add {d.rec.min-d.sets} more sets</div>}
          {d.status==="high"&&<div style={{fontSize:9,color:V.warn,marginTop:4}}>📈 Above recommended — watch for overtraining</div>}
          {d.status==="good"&&<div style={{fontSize:9,color:V.accent,marginTop:4}}>✅ In optimal range</div>}
        </Card>
      ))}
      {data.length===0&&<Card style={{padding:20,textAlign:"center"}}><div style={{fontSize:12,color:V.text3}}>Log workouts this week to see volume breakdown</div></Card>}
    </div>
  );
}

      if(score<=0)return"rgba(255,255,255,0.04)";
      if(score<=3)return"rgba(255,70,70,0.55)"; // fatigued (recently trained hard)
      if(score<=6)return"rgba(255,160,50,0.5)"; // recovering
      return"rgba(0,245,160,0.45)"; // recovered
    }
    if(score<=0)return"rgba(255,255,255,0.04)";
    if(score<=2)return"rgba(250,204,21,0.3)";
    if(score<=4)return"rgba(250,204,21,0.5)";
    if(score<=6)return"rgba(0,245,160,0.45)";
    if(score<=8)return"rgba(0,245,160,0.65)";
    return"rgba(255,70,70,0.6)";

// ─── Strength Score System ───
function calcStrengthScore(workouts,bodyWeight){
  const bw=parseFloat(bodyWeight)||180;
  const lifts={bench:0,squat:0,deadlift:0};

  // Find best e1RM for each lift
  workouts.forEach(w=>{
    w.exercises.forEach(ex=>{
      if(lifts.hasOwnProperty(ex.exerciseId)){
        ex.sets.forEach(st=>{
          const wt=parseFloat(st.weight)||0;
          const rp=parseInt(st.reps)||0;
          if(wt>0&&rp>0){
            const e1rm=Math.round(wt*(1+rp/30));
            lifts[ex.exerciseId]=Math.max(lifts[ex.exerciseId],e1rm);
          }
        });
      }
    });
  });

  const benchRatio=lifts.bench/bw;
  const squatRatio=lifts.squat/bw;
  const deadRatio=lifts.deadlift/bw;
  const score=benchRatio*0.30+squatRatio*0.35+deadRatio*0.35;

  let rank,rankColor;
  if(score<0.5){rank="Novice";rankColor=V.text3;}
  else if(score<1.0){rank="Beginner";rankColor=V.warn;}
  else if(score<1.5){rank="Intermediate";rankColor=V.accent2;}
  else if(score<2.0){rank="Advanced";rankColor=V.accent;}
  else{rank="Elite";rankColor=V.purple;}

  // Badges
  const badges=[];
  if(benchRatio>=1.5)badges.push({label:"Bench 1.5x BW",icon:"🏋️"});
  if(benchRatio>=2.0)badges.push({label:"Bench 2x BW",icon:"💎"});
  if(squatRatio>=2.0)badges.push({label:"Squat 2x BW",icon:"🦵"});
  if(squatRatio>=2.5)badges.push({label:"Squat 2.5x BW",icon:"👑"});
  if(deadRatio>=2.5)badges.push({label:"Dead 2.5x BW",icon:"🔥"});
  if(deadRatio>=3.0)badges.push({label:"Dead 3x BW",icon:"⚡"});
  if(score>=1.0)badges.push({label:"1000lb Club",icon:"🏆",cond:lifts.bench+lifts.squat+lifts.deadlift>=1000});

  return{score:Math.round(score*100)/100,rank,rankColor,lifts,benchRatio:Math.round(benchRatio*100)/100,
    squatRatio:Math.round(squatRatio*100)/100,deadRatio:Math.round(deadRatio*100)/100,
    badges:badges.filter(b=>b.cond===undefined||b.cond),total:lifts.bench+lifts.squat+lifts.deadlift,bw};
}

function StrengthScoreCard({s}){
  const bw=s.body.find(b=>b.weight)?.weight||s.goals.goalWeight||180;
  const data=useMemo(()=>calcStrengthScore(s.workouts,bw),[s.workouts,bw]);
  const u=wUnit(s.units);

  // Monthly trend
  const trend=useMemo(()=>{
    const months={};
    s.workouts.forEach(w=>{
      const mo=w.date.slice(0,7);
      if(!months[mo])months[mo]=[];
      months[mo].push(w);
    });
    return Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6).map(([mo,wks])=>{
      const sc=calcStrengthScore(wks,bw);
      return{date:mo.slice(5),score:sc.score};
    });
  },[s.workouts,bw]);

  // Score ring
  const pct=Math.min(100,data.score/2.5*100);
  const r=44,circ=2*Math.PI*r,offset=circ*(1-pct/100);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Main Score */}

            </div>
          ))}
        </div>
      </Card>

      {/* Badges */}
      {data.badges.length>0&&(
        <Card style={{padding:12}}>
          <span style={{fontSize:12,color:V.text3,fontWeight:600,display:"block",marginBottom:8}}>Badges Earned</span>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {data.badges.map((b,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",

                <span style={{fontSize:10,color:V.accent,fontWeight:600}}>{b.label}</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* #24: Individual Lift Standards */}
      <Card style={{padding:12}}>
        <span style={{fontSize:12,color:V.text3,fontWeight:600,display:"block",marginBottom:8}}>Lift Standards</span>
        <div style={{fontSize:9,color:V.text3,marginBottom:10}}>Based on {bw} {u} body weight · ratios from strength standards</div>
        {[{l:"Bench Press",id:"bench",ratios:[0.5,0.75,1.0,1.25,1.5]},
          {l:"Squat",id:"squat",ratios:[0.75,1.0,1.25,1.75,2.25]},
          {l:"Deadlift",id:"deadlift",ratios:[1.0,1.25,1.5,2.0,2.5]},
          {l:"OHP",id:"ohp",ratios:[0.35,0.45,0.6,0.75,0.9]}].map(lift=>{
          const best=(()=>{let b=0;s.workouts.forEach(w=>w.exercises.forEach(e=>{if(e.exerciseId===lift.id)e.sets.forEach(st=>{
            const e1=calc1RM(parseFloat(st.weight)||0,parseInt(st.reps)||0);if(e1>b)b=e1;});}));return b;})();
          const ratio=best>0?best/parseFloat(bw):0;
          const levels=["Beginner","Novice","Intermediate","Advanced","Elite"];
          const colors=[V.text3,V.warn,V.accent2,V.accent,V.purple];
          let level=0;
          for(let i=0;i<lift.ratios.length;i++){if(ratio>=lift.ratios[i])level=i;}
          const nextRatio=level<4?lift.ratios[level+1]:null;
          const nextWeight=nextRatio?Math.round(nextRatio*parseFloat(bw)):null;
          return(
            <div key={lift.id} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid rgba(255,255,255,0.03)`}}>

                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14,fontWeight:800,color:colors[level],fontFamily:V.mono}}>{best||"--"}</span>
                  <span style={{padding:"2px 6px",borderRadius:4,background:`${colors[level]}15`,fontSize:8,fontWeight:700,color:colors[level]}}>{levels[level]}</span>

                {levels.map((lv,li)=>(
                  <div key={li} style={{flex:1,height:4,borderRadius:2,background:li<=level?colors[li]:"rgba(255,255,255,0.04)"}}/>
                ))}
              </div>
              {nextWeight&&best>0&&<div style={{fontSize:8,color:V.text3,marginTop:3}}>{nextWeight-best} {u} to {levels[level+1]} ({nextWeight} {u})</div>}
            </div>
          );
        })}
      </Card>

      {/* Trend */}
      {trend.length>1&&(
        <Card style={{padding:12}}>
          <span style={{fontSize:12,color:V.text3,fontWeight:600,display:"block",marginBottom:8}}>Score Trend</span>
          <ResponsiveContainer width="100%" height={100}>
            <AreaChart data={trend}>
              <defs><linearGradient id="ssGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={V.accent} stopOpacity={0.2}/>
                <stop offset="100%" stopColor={V.accent} stopOpacity={0}/>
              </linearGradient></defs>
              <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
              <YAxis {...chartCfg.axis} width={26} domain={[0,'dataMax+0.3']}/>
              <Tooltip {...chartCfg.tip}/>
              <Area type="monotone" dataKey="score" stroke={V.accent} strokeWidth={2} fill="url(#ssGrad)"/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
      )}
    </div>
  );
}
